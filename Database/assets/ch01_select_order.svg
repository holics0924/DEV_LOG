<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 480" width="580" height="480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
      text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }
    </style>
  </defs>

  <rect width="580" height="480" rx="12" fill="#0d1117"/>
  <text x="290" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">SELECT 실행 순서</text>

  <!-- Step 1: FROM -->
  <rect x="20" y="40" width="540" height="52" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="54" cy="66" r="14" fill="#3fb950"/>
  <text x="54" y="71" text-anchor="middle" fill="white" font-size="11" font-weight="700">01</text>
  <text x="80" y="61" fill="#3fb950" font-size="13" font-weight="700">FROM</text>
  <text x="80" y="78" fill="#6e7681" font-size="10">테이블 전체를 가져온다</text>

  <!-- Arrow 1 -->
  <line x1="290" y1="92" x2="290" y2="106" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="284,106 296,106 290,116" fill="#30363d"/>

  <!-- Step 2: WHERE -->
  <rect x="20" y="118" width="540" height="52" rx="8" fill="#2a2210" stroke="#e3b341" stroke-width="1.5"/>
  <circle cx="54" cy="144" r="14" fill="#e3b341"/>
  <text x="54" y="149" text-anchor="middle" fill="white" font-size="11" font-weight="700">02</text>
  <text x="80" y="139" fill="#e3b341" font-size="13" font-weight="700">WHERE</text>
  <text x="80" y="156" fill="#6e7681" font-size="10">행 단위로 필터링한다 (집계함수 사용 불가)</text>

  <!-- Arrow 2 -->
  <line x1="290" y1="170" x2="290" y2="184" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="284,184 296,184 290,194" fill="#30363d"/>

  <!-- Step 3: GROUP BY -->
  <rect x="20" y="196" width="540" height="52" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <circle cx="54" cy="222" r="14" fill="#58a6ff"/>
  <text x="54" y="227" text-anchor="middle" fill="white" font-size="11" font-weight="700">03</text>
  <text x="80" y="217" fill="#58a6ff" font-size="13" font-weight="700">GROUP BY</text>
  <text x="80" y="234" fill="#6e7681" font-size="10">기준 컬럼별로 행을 묶는다. 개별 행이 그룹으로 압축된다</text>

  <!-- Arrow 3 -->
  <line x1="290" y1="248" x2="290" y2="262" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="284,262 296,262 290,272" fill="#30363d"/>

  <!-- Step 4: HAVING -->
  <rect x="20" y="274" width="540" height="52" rx="8" fill="#2a2210" stroke="#e3b341" stroke-width="1.5"/>
  <circle cx="54" cy="300" r="14" fill="#e3b341"/>
  <text x="54" y="305" text-anchor="middle" fill="white" font-size="11" font-weight="700">04</text>
  <text x="80" y="295" fill="#e3b341" font-size="13" font-weight="700">HAVING</text>
  <text x="80" y="312" fill="#6e7681" font-size="10">그룹을 필터링한다 (집계함수 사용 가능)</text>

  <!-- Arrow 4 -->
  <line x1="290" y1="326" x2="290" y2="340" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="284,340 296,340 290,350" fill="#30363d"/>

  <!-- Step 5: SELECT -->
  <rect x="20" y="352" width="540" height="52" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="54" cy="378" r="14" fill="#3fb950"/>
  <text x="54" y="383" text-anchor="middle" fill="white" font-size="11" font-weight="700">05</text>
  <text x="80" y="373" fill="#3fb950" font-size="13" font-weight="700">SELECT</text>
  <text x="80" y="390" fill="#6e7681" font-size="10">컬럼을 추출한다. 별칭(AS)이 여기서 확정된다</text>

  <!-- Arrow 5 -->
  <line x1="290" y1="404" x2="290" y2="418" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="284,418 296,418 290,428" fill="#30363d"/>

  <!-- Step 6: ORDER BY -->
  <rect x="20" y="430" width="540" height="52" rx="8" fill="#21262d" stroke="#8b949e" stroke-width="1.5"/>
  <circle cx="54" cy="456" r="14" fill="#8b949e"/>
  <text x="54" y="461" text-anchor="middle" fill="white" font-size="11" font-weight="700">06</text>
  <text x="80" y="451" fill="#8b949e" font-size="13" font-weight="700">ORDER BY</text>
  <text x="80" y="468" fill="#6e7681" font-size="10">결과를 정렬한다</text>
</svg>
