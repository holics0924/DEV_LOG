<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg:#0f172a; --s1:#1e293b; --s2:#162032; --bd:#334155;
    --tx:#e2e8f0; --mu:#64748b; --bl:#3b82f6; --gr:#10b981;
    --rd:#ef4444; --am:#f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--tx); font-family: 'Segoe UI', system-ui, sans-serif; padding: 24px 16px 48px; max-width: 860px; margin: 0 auto; }
  h1 { font-size: 1.1rem; color: #cbd5e1; margin-bottom: 4px; }
  .sub { font-size: .78rem; color: var(--mu); margin-bottom: 20px; }

  .query-box {
    background: #0d1117; border: 1px solid var(--bd); border-radius: 8px;
    padding: 12px 16px; font-family: monospace; font-size: .8rem;
    color: #e2e8f0; margin-bottom: 16px; line-height: 1.9;
  }
  .kw { color: var(--am); font-weight: 700; }
  .kw-active { color: #fff; background: rgba(245,158,11,0.25); border-radius: 3px; padding: 1px 4px; }

  .controls { display: flex; gap: 10px; margin-bottom: 20px; }
  button { padding: 9px 18px; border-radius: 7px; font-size: .85rem; font-weight: 700; border: none; cursor: pointer; }
  .btn-next { background: var(--bl); color: #fff; }
  .btn-next:disabled { background: var(--s1); color: var(--mu); border: 1px solid var(--bd); cursor: default; }
  .btn-reset { background: var(--s1); color: var(--mu); border: 1px solid var(--bd); }

  .step-card { background: var(--s1); border: 1px solid var(--bd); border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; }
  .step-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; color: var(--mu); margin-bottom: 4px; }
  .step-desc { font-size: .88rem; color: #cbd5e1; line-height: 1.65; }

  .table-wrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: .82rem; }
  th { background: var(--s2); color: var(--mu); padding: 8px 14px; text-align: left; border-bottom: 1px solid var(--bd); font-weight: 600; font-size: .75rem; text-transform: uppercase; }
  td { padding: 8px 14px; border-bottom: 1px solid var(--bd); color: var(--tx); }
  tr:last-child td { border-bottom: none; }

  .row-a td:first-child { border-left: 3px solid var(--bl); }
  .row-b td:first-child { border-left: 3px solid var(--gr); }
  .row-a { background: rgba(59,130,246,0.06); }
  .row-b { background: rgba(16,185,129,0.06); }
  .removed { opacity: 0.35; }
  .removed td { text-decoration: line-through; }
  .pass { color: var(--gr); font-weight: 700; }
  .fail { color: var(--rd); font-weight: 700; }
</style>
</head>
<body>

<h1>GROUP BY 단계별 시각화</h1>
<p class="sub">쿼리 실행 순서에 따라 테이블이 어떻게 바뀌는지 확인한다</p>

<div class="query-box">
  <span id="kSELECT" class="kw">SELECT</span> customer_id, <span id="kSUM" class="kw">SUM</span>(amount) <span class="kw">AS</span> total<br>
  <span class="kw">FROM</span> orders<br>
  <span id="kGROUP" class="kw">GROUP BY</span> customer_id<br>
  <span id="kHAVING" class="kw">HAVING</span> SUM(amount) &gt;= 100000<br>
  <span id="kORDER" class="kw">ORDER BY</span> total <span class="kw">DESC</span>
</div>

<div class="controls">
  <button class="btn-reset" onclick="reset()">↺</button>
  <button class="btn-next" id="btnNext" onclick="next()">다음 단계 →</button>
</div>

<div class="step-card">
  <div class="step-label" id="stepLabel">단계 1 / 5 — 원본 데이터</div>
  <div class="step-desc" id="stepDesc">orders 테이블의 전체 데이터다. customer_id는 A와 B 두 그룹이 섞여 있다.</div>
</div>

<div class="table-wrap" id="tableWrap"></div>

<script>
const steps = [
  {
    label: '원본 데이터',
    desc: 'orders 테이블의 전체 데이터다. customer_id는 A와 B 두 그룹이 섞여 있다.',
    active: [],
    html: `<table>
      <thead><tr><th>customer_id</th><th>amount</th></tr></thead>
      <tbody>
        <tr class="row-a"><td>A</td><td>30,000</td></tr>
        <tr class="row-b"><td>B</td><td>15,000</td></tr>
        <tr class="row-a"><td>A</td><td>50,000</td></tr>
        <tr class="row-b"><td>B</td><td>80,000</td></tr>
        <tr class="row-a"><td>A</td><td>20,000</td></tr>
      </tbody>
    </table>`
  },
  {
    label: 'GROUP BY customer_id 적용',
    desc: 'customer_id 기준으로 행들이 그룹으로 묶인다. 개별 행은 그룹 안으로 흡수되고 두 그룹만 남는다.',
    active: ['kGROUP'],
    html: `<table>
      <thead><tr><th>customer_id</th><th>amount (그룹 내 값들)</th></tr></thead>
      <tbody>
        <tr class="row-a"><td>A</td><td>30,000 · 50,000 · 20,000</td></tr>
        <tr class="row-b"><td>B</td><td>15,000 · 80,000</td></tr>
      </tbody>
    </table>`
  },
  {
    label: 'SUM(amount) 집계',
    desc: '각 그룹의 amount를 합산해 하나의 값으로 압축한다. 집계함수를 통해서만 그룹 내 값에 접근할 수 있다.',
    active: ['kSUM'],
    html: `<table>
      <thead><tr><th>customer_id</th><th>SUM(amount)</th></tr></thead>
      <tbody>
        <tr class="row-a"><td>A</td><td>100,000</td></tr>
        <tr class="row-b"><td>B</td><td>95,000</td></tr>
      </tbody>
    </table>`
  },
  {
    label: 'HAVING SUM(amount) >= 100000',
    desc: '집계 결과를 기준으로 그룹을 필터링한다. B(95,000)는 조건을 만족하지 못해 제거된다.',
    active: ['kHAVING'],
    html: `<table>
      <thead><tr><th>customer_id</th><th>SUM(amount)</th><th>HAVING 결과</th></tr></thead>
      <tbody>
        <tr class="row-a"><td>A</td><td>100,000</td><td class="pass">✓ 통과</td></tr>
        <tr class="row-b removed"><td>B</td><td>95,000</td><td class="fail">✗ 제거</td></tr>
      </tbody>
    </table>`
  },
  {
    label: '최종 결과 — ORDER BY total DESC',
    desc: '조건을 통과한 그룹만 남아 정렬된 최종 결과가 반환된다.',
    active: ['kSELECT', 'kORDER'],
    html: `<table>
      <thead><tr><th>customer_id</th><th>total</th></tr></thead>
      <tbody>
        <tr class="row-a"><td>A</td><td>100,000</td></tr>
      </tbody>
    </table>`
  }
];

let cur = 0;

const ids = ['kSELECT','kSUM','kGROUP','kHAVING','kORDER'];

function render() {
  const s = steps[cur];
  document.getElementById('stepLabel').textContent = `단계 ${cur + 1} / ${steps.length} — ${s.label}`;
  document.getElementById('stepDesc').textContent = s.desc;
  document.getElementById('tableWrap').innerHTML = s.html;
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = s.active.includes(id) ? 'kw-active' : 'kw';
  });
  document.getElementById('btnNext').disabled = cur >= steps.length - 1;
}

function next() { if (cur < steps.length - 1) { cur++; render(); } }
function reset() { cur = 0; render(); }

render();
</script>
</body>
</html>
