<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
      text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="700" height="420" fill="#0d1117" rx="12"/>

  <!-- 제목 -->
  <text x="350" y="30" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">MVCC — 버전 체인 구조</text>

  <!-- 타임라인 레이블 -->
  <text x="30" y="62" fill="#6e7681" font-size="10" font-weight="700">타임라인 →</text>
  <text x="200" y="62" text-anchor="middle" fill="#6e7681" font-size="10">T1</text>
  <text x="390" y="62" text-anchor="middle" fill="#6e7681" font-size="10">T2</text>
  <text x="530" y="62" text-anchor="middle" fill="#6e7681" font-size="10">T3</text>

  <!-- 트랜잭션 B (읽기) -->
  <rect x="30" y="72" width="640" height="66" fill="#1c2333" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="46" y="92" fill="#58a6ff" font-size="11" font-weight="700">트랜잭션 B  (trx_id = 101)</text>
  <rect x="160" y="100" width="110" height="26" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="6"/>
  <text x="215" y="117" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">BEGIN (T1 시작)</text>
  <rect x="468" y="100" width="140" height="26" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="6"/>
  <text x="538" y="117" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">SELECT → 10만원 읽힘</text>

  <!-- 트랜잭션 A (쓰기) -->
  <rect x="30" y="154" width="640" height="66" fill="#161b22" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="46" y="174" fill="#3fb950" font-size="11" font-weight="700">트랜잭션 A  (trx_id = 102)</text>
  <rect x="316" y="182" width="176" height="26" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="6"/>
  <text x="404" y="199" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">UPDATE 5만원 + COMMIT (T2)</text>

  <!-- 화살표: SELECT → undo log (수직에 가까운 방향) -->
  <line x1="538" y1="126" x2="510" y2="300" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)" stroke-dasharray="5,3"/>

  <!-- 주석: 화살표 왼쪽, 트랜잭션 행 아래의 빈 공간에 배치 -->
  <text x="490" y="242" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="700">trx_id 102 &gt; 101</text>
  <text x="490" y="256" text-anchor="middle" fill="#58a6ff" font-size="9">→ undo log 통해 이전 버전 읽기</text>

  <!-- DISK 레이블 -->
  <text x="350" y="288" text-anchor="middle" fill="#6e7681" font-size="10" font-weight="700">DISK</text>

  <!-- 현재 행 박스 -->
  <rect x="30" y="298" width="290" height="96" fill="#21262d" stroke="#e3b341" stroke-width="1.5" rx="8"/>
  <text x="175" y="317" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="700">현재 행 (최신 버전)</text>
  <text x="46" y="338" fill="#8b949e" font-size="10">잔액</text>
  <text x="308" y="338" text-anchor="end" fill="#e6edf3" font-size="11" font-weight="700">5만원</text>
  <text x="46" y="356" fill="#8b949e" font-size="10">DB_TRX_ID</text>
  <text x="308" y="356" text-anchor="end" fill="#e3b341" font-size="10" font-weight="700">102</text>
  <text x="46" y="374" fill="#8b949e" font-size="10">DB_ROLL_PTR</text>
  <text x="308" y="374" text-anchor="end" fill="#e3b341" font-size="10" font-weight="700">→ undo log</text>

  <!-- 화살표: 현재 행 → undo log -->
  <line x1="322" y1="346" x2="370" y2="346" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- undo log 박스 -->
  <rect x="376" y="298" width="290" height="96" fill="#21262d" stroke="#8b949e" stroke-width="1.5" rx="8"/>
  <text x="521" y="317" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700">undo log (이전 버전)</text>
  <text x="392" y="338" fill="#8b949e" font-size="10">잔액</text>
  <text x="656" y="338" text-anchor="end" fill="#e6edf3" font-size="11" font-weight="700">10만원</text>
  <text x="392" y="356" fill="#8b949e" font-size="10">DB_TRX_ID</text>
  <text x="656" y="356" text-anchor="end" fill="#8b949e" font-size="10" font-weight="700">99</text>
  <text x="392" y="374" fill="#8b949e" font-size="10">생성 시점</text>
  <text x="656" y="374" text-anchor="end" fill="#8b949e" font-size="10" font-weight="700">trx 102 수정 전 저장</text>
</svg>
