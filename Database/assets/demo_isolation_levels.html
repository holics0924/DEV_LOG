<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>격리 수준 시나리오</title>
<style>
  :root {
    --bg:#0f172a; --s1:#1e293b; --s2:#162032; --bd:#334155;
    --tx:#e2e8f0; --mu:#64748b; --bl:#3b82f6; --gr:#10b981;
    --rd:#ef4444; --am:#f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--tx); font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 24px 16px 48px; max-width: 860px; margin: 0 auto; }
  h1 { font-size: 1.1rem; color: #cbd5e1; margin-bottom: 4px; }
  p.sub { font-size: .78rem; color: var(--mu); margin-bottom: 20px; }

  .tab-bar { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .tab { padding: 7px 14px; border-radius: 7px; font-size: .82rem; font-weight: 700;
    cursor: pointer; border: 1px solid var(--bd); background: var(--s1); color: var(--mu);
    transition: all .15s; }
  .tab.active { background: var(--bl); color: #fff; border-color: var(--bl); }

  .scenario-label { font-size: .68rem; font-weight: 700; text-transform: uppercase;
    color: var(--mu); letter-spacing: .06em; margin-bottom: 10px; }
  .desc { font-size: .85rem; color: #cbd5e1; line-height: 1.65; margin-bottom: 18px;
    background: var(--s1); border: 1px solid var(--bd); border-radius: 10px; padding: 14px 18px; }

  .timeline { display: grid; grid-template-columns: 90px 1fr 1fr; gap: 0;
    border: 1px solid var(--bd); border-radius: 10px; overflow: hidden; margin-bottom: 18px; }
  .tl-header { background: #0d1b2e; padding: 10px 14px; font-size: .75rem;
    font-weight: 700; color: var(--mu); text-transform: uppercase; border-bottom: 1px solid var(--bd); }
  .tl-cell { padding: 10px 14px; font-size: .82rem; border-bottom: 1px solid var(--bd);
    border-left: 1px solid var(--bd); min-height: 48px; display: flex; align-items: center; }
  .tl-step { padding: 10px 14px; font-size: .78rem; color: var(--mu); border-bottom: 1px solid var(--bd);
    display: flex; align-items: center; font-weight: 700; }
  .tl-row:last-child .tl-step,
  .tl-row:last-child .tl-cell { border-bottom: none; }
  .tl-row { display: contents; }

  .tag-a { color: #60a5fa; font-weight: 700; }
  .tag-b { color: #34d399; font-weight: 700; }
  .highlight { background: #1c2d3a; border-left: 3px solid var(--bl); padding-left: 10px !important; }
  .problem { background: #2d1b1b; border-left: 3px solid var(--rd); padding-left: 10px !important; color: var(--rd) !important; }
  .ok { background: #0d2119; border-left: 3px solid var(--gr); padding-left: 10px !important; color: var(--gr) !important; }

  .step-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .btn { padding: 9px 18px; border-radius: 7px; font-size: .85rem; font-weight: 700;
    cursor: pointer; border: none; transition: opacity .15s; }
  .btn-next { background: var(--bl); color: #fff; }
  .btn-reset { background: var(--s1); color: var(--mu); border: 1px solid var(--bd); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .step-count { font-size: .8rem; color: var(--mu); }

  .result-box { border-radius: 10px; padding: 14px 18px; font-size: .88rem;
    line-height: 1.65; border: 1px solid var(--bd); min-height: 56px; }
  .result-label { font-size: .68rem; font-weight: 700; text-transform: uppercase;
    color: var(--mu); margin-bottom: 6px; letter-spacing: .06em; }
</style>
</head>
<body>
<h1>격리 수준 시나리오</h1>
<p class="sub">각 시나리오를 선택하고 단계별로 진행해 격리 수준이 어떻게 다른지 확인한다.</p>

<div class="tab-bar">
  <button class="tab active" onclick="selectScenario('dirty')">Dirty Read</button>
  <button class="tab" onclick="selectScenario('nonrep')">Non-Repeatable Read</button>
  <button class="tab" onclick="selectScenario('phantom')">Phantom Read</button>
</div>

<div id="app"></div>

<script>
const scenarios = {
  dirty: {
    title: "Dirty Read 시나리오",
    desc: "트랜잭션 A가 잔액을 수정하는 도중(커밋 전), 트랜잭션 B가 그 값을 읽는다. A가 롤백하면 B는 존재하지 않았던 값을 읽은 것이 된다.",
    steps: [
      { label: "초기 상태", a: "—", b: "— (잔액: 10만원)" },
      { label: "T1", a: "BEGIN", b: "BEGIN" },
      { label: "T2", a: "UPDATE 잔액 → 5만원\n(아직 커밋 안 함)", b: "—" },
      { label: "T3", a: "—", b: "SELECT 잔액 → ???" },
      { label: "T4", a: "ROLLBACK (5만원 취소)", b: "—" },
      { label: "결과", a: "잔액: 10만원 (원상복구)", b: "읽었던 5만원은 존재하지 않았던 값" },
    ],
    readStep: 3,
    readLevels: {
      "Read Uncommitted": { value: "5만원 읽힘", ok: false, note: "커밋 안 된 데이터 읽음 → Dirty Read 발생" },
      "Read Committed": { value: "10만원 읽힘", ok: true, note: "커밋된 데이터만 읽음 → Dirty Read 차단" },
      "Repeatable Read": { value: "10만원 읽힘", ok: true, note: "스냅샷 읽기 → Dirty Read 차단" },
      "Serializable": { value: "10만원 읽힘", ok: true, note: "완전 직렬 실행 → Dirty Read 차단" },
    }
  },
  nonrep: {
    title: "Non-Repeatable Read 시나리오",
    desc: "트랜잭션 B가 같은 행을 두 번 읽는 사이에, 트랜잭션 A가 그 행을 수정하고 커밋한다. 같은 트랜잭션 안에서 같은 쿼리가 다른 결과를 반환한다.",
    steps: [
      { label: "초기 상태", a: "—", b: "— (잔액: 10만원)" },
      { label: "T1", a: "BEGIN", b: "BEGIN" },
      { label: "T2", a: "—", b: "SELECT 잔액 → 10만원 (1차 읽기)" },
      { label: "T3", a: "UPDATE 잔액 → 5만원\nCOMMIT", b: "—" },
      { label: "T4", a: "—", b: "SELECT 잔액 → ???  (2차 읽기)" },
      { label: "결과", a: "—", b: "같은 트랜잭션, 같은 쿼리인데 값이 달라짐" },
    ],
    readStep: 4,
    readLevels: {
      "Read Uncommitted": { value: "5만원 읽힘", ok: false, note: "A 커밋 후 값을 읽음 → Non-Repeatable Read 발생" },
      "Read Committed": { value: "5만원 읽힘", ok: false, note: "매 읽기마다 최신 커밋 값 → Non-Repeatable Read 발생" },
      "Repeatable Read": { value: "10만원 읽힘", ok: true, note: "트랜잭션 시작 시점 스냅샷 유지 → 차단" },
      "Serializable": { value: "10만원 읽힘", ok: true, note: "완전 직렬 실행 → 차단" },
    }
  },
  phantom: {
    title: "Phantom Read 시나리오",
    desc: "트랜잭션 B가 조건으로 행 집합을 두 번 조회하는 사이에, 트랜잭션 A가 그 조건에 해당하는 새 행을 삽입하고 커밋한다. 조회 결과 행 수가 달라진다.",
    steps: [
      { label: "초기 상태", a: "—", b: "— (잔액 > 5만원인 행: 2건)" },
      { label: "T1", a: "BEGIN", b: "BEGIN" },
      { label: "T2", a: "—", b: "SELECT WHERE 잔액 > 5만원\n→ 2건 (1차 조회)" },
      { label: "T3", a: "INSERT 잔액 8만원\nCOMMIT", b: "—" },
      { label: "T4", a: "—", b: "SELECT WHERE 잔액 > 5만원\n→ ???  (2차 조회)" },
      { label: "결과", a: "—", b: "같은 조건인데 행 수가 달라짐" },
    ],
    readStep: 4,
    readLevels: {
      "Read Uncommitted": { value: "3건 조회됨", ok: false, note: "새 행 포함 → Phantom Read 발생" },
      "Read Committed": { value: "3건 조회됨", ok: false, note: "커밋된 새 행 포함 → Phantom Read 발생" },
      "Repeatable Read": { value: "2건 조회됨 *", ok: true, note: "* InnoDB의 Gap Lock이 INSERT를 막아 차단 (이론상은 발생)" },
      "Serializable": { value: "2건 조회됨", ok: true, note: "완전 직렬 실행 → INSERT 자체가 대기 → 차단" },
    }
  }
};

let current = 'dirty';
let step = 0;
let level = "Read Uncommitted";
const levels = ["Read Uncommitted", "Read Committed", "Repeatable Read", "Serializable"];

function selectScenario(key) {
  current = key;
  step = 0;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['dirty','nonrep','phantom'][i] === key);
  });
  render();
}

function nextStep() {
  const sc = scenarios[current];
  if (step < sc.steps.length - 1) step++;
  render();
}

function reset() { step = 0; render(); }

function selectLevel(l) { level = l; render(); }

function render() {
  const sc = scenarios[current];
  const maxStep = sc.steps.length - 1;
  const visibleSteps = sc.steps.slice(0, step + 1);
  const showResult = step === sc.readStep;
  const info = showResult ? sc.readLevels[level] : null;

  let levelBtns = levels.map(l =>
    `<button class="tab ${l === level ? 'active' : ''}" onclick="selectLevel('${l}')" style="font-size:.75rem;padding:5px 10px">${l}</button>`
  ).join('');

  let rows = visibleSteps.map((s, i) => {
    const isReadStep = i === sc.readStep;
    const bClass = isReadStep && showResult
      ? (info.ok ? 'ok' : 'problem')
      : (s.b.includes('읽기') || s.b.includes('조회') ? 'highlight' : '');
    const bText = isReadStep && showResult
      ? `${info.value}` : s.b;

    return `
      <div class="tl-row">
        <div class="tl-step">${s.label}</div>
        <div class="tl-cell tag-a">${s.a.replace(/\n/g,'<br>')}</div>
        <div class="tl-cell tag-b ${bClass}">${bText.replace(/\n/g,'<br>')}</div>
      </div>`;
  }).join('');

  let resultHtml = '';
  if (showResult && info) {
    resultHtml = `
      <div class="result-label">격리 수준 선택</div>
      <div class="tab-bar" style="margin-bottom:14px">${levelBtns}</div>
      <div class="result-label">결과</div>
      <div class="result-box ${info.ok ? 'ok' : 'problem'}">${info.note}</div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="scenario-label">${sc.title}</div>
    <div class="desc">${sc.desc}</div>
    <div class="step-nav">
      <button class="btn btn-reset" onclick="reset()">↺</button>
      <button class="btn btn-next" onclick="nextStep()" ${step >= maxStep ? 'disabled' : ''}>다음 단계 →</button>
      <span class="step-count">${step + 1} / ${sc.steps.length}</span>
    </div>
    <div class="timeline">
      <div class="tl-header">단계</div>
      <div class="tl-header" style="border-left:1px solid var(--bd)">트랜잭션 A</div>
      <div class="tl-header" style="border-left:1px solid var(--bd)">트랜잭션 B</div>
      ${rows}
    </div>
    ${resultHtml}
  `;
}

render();
</script>
</body>
</html>
