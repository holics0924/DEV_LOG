<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg:#0f172a; --s1:#1e293b; --bd:#334155;
    --tx:#e2e8f0; --mu:#64748b; --bl:#3b82f6; --gr:#10b981; --am:#f59e0b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--tx); font-family:'Segoe UI',system-ui,sans-serif; padding:24px 16px 48px; max-width:860px; margin:0 auto; }
  h1 { font-size:1.1rem; color:#cbd5e1; margin-bottom:6px; }
  p.sub { font-size:.78rem; color:var(--mu); margin-bottom:20px; }
  svg { display:block; width:100%; }
  .step-card { background:var(--s1); border:1px solid var(--bd); border-radius:10px; padding:14px 18px; margin:16px 0; }
  .step-label { font-size:.68rem; font-weight:700; text-transform:uppercase; color:var(--mu); margin-bottom:6px; }
  .step-desc { font-size:.88rem; color:#cbd5e1; line-height:1.65; }
  .btns { display:flex; gap:10px; }
  button { padding:9px 18px; border-radius:7px; font-size:.85rem; font-weight:700; cursor:pointer; border:none; }
  .btn-next { background:var(--bl); color:#fff; }
  .btn-next:disabled { background:var(--mu); cursor:not-allowed; }
  .btn-reset { background:var(--s1); color:var(--mu); border:1px solid var(--bd); }
  .status-row { display:flex; justify-content:space-between; margin-top:8px; }
  .status-tag { font-size:.72rem; font-weight:700; padding:3px 10px; border-radius:4px; }
  .s-idle { background:#1e293b; color:var(--mu); }
  .s-wait { background:#2a1f0a; color:var(--am); }
  .s-done { background:#0d2a1a; color:var(--gr); }
</style>
</head>
<body>
<h1>TCP 3-way Handshake</h1>
<p class="sub">연결을 맺기까지 양쪽이 어떤 것을 확인하는지 단계별로 본다.</p>

<svg id="diagram" viewBox="0 0 700 260" style="height:260px">
  <defs>
    <marker id="arr-g" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect x="10" y="10" width="110" height="32" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="6"/>
  <text x="65" y="31" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">클라이언트</text>

  <!-- Server -->
  <rect x="580" y="10" width="110" height="32" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="6"/>
  <text x="635" y="31" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">서버</text>

  <!-- Vertical lines -->
  <line x1="65" y1="42" x2="65" y2="248" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="635" y1="42" x2="635" y2="248" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- SYN -->
  <g id="g-syn" opacity="0" style="transition:opacity .4s">
    <line x1="65" y1="75" x2="619" y2="93" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-g)"/>
    <text x="350" y="70" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">SYN</text>
    <text x="350" y="84" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">연결 요청</text>
  </g>

  <!-- SYN-ACK -->
  <g id="g-synack" opacity="0" style="transition:opacity .4s">
    <line x1="635" y1="130" x2="81" y2="148" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-g)"/>
    <text x="350" y="125" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">SYN-ACK</text>
    <text x="350" y="139" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">수신 확인 + 서버도 연결 요청</text>
  </g>

  <!-- ACK -->
  <g id="g-ack" opacity="0" style="transition:opacity .4s">
    <line x1="65" y1="183" x2="619" y2="201" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-g)"/>
    <text x="350" y="178" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">ACK</text>
    <text x="350" y="192" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">서버 요청 확인 → 연결 완료</text>
  </g>

  <!-- Status -->
  <text id="st-client" x="65" y="250" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">대기 중</text>
  <text id="st-server" x="635" y="250" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">대기 중</text>
</svg>

<div class="step-card">
  <div class="step-label">현재 단계</div>
  <div class="step-desc" id="desc">다음 단계 버튼을 눌러 핸드셰이크를 시작한다.</div>
</div>

<div class="btns">
  <button class="btn-reset" onclick="reset()">↺</button>
  <button class="btn-next" id="btn" onclick="next()">다음 단계 →</button>
</div>

<script>
const steps = [
  {
    show: 'g-syn',
    desc: '클라이언트가 SYN을 전송한다. "나 연결하고 싶어"라는 신호다. 서버는 이 SYN을 받는 순간 클라이언트→서버 방향이 작동함을 확인한다. 서버→클라이언트 방향은 아직 모른다.',
    sc: '분홍(SYN 전송)', ss: 'SYN 수신', cc: 's-wait', sc2: 's-wait'
  },
  {
    show: 'g-synack',
    desc: '서버가 SYN-ACK를 응답한다. "받았어, 나도 연결하고 싶어"다. 클라이언트는 이 응답을 받는 순간 두 가지를 확인한다. 클라이언트→서버(SYN이 도달했음), 서버→클라이언트(응답이 돌아옴). 클라이언트 입장에서 양방향 모두 확인 완료.',
    sc: '양방향 확인 완료', ss: 'SYN-ACK 전송 중', cc: 's-done', sc2: 's-wait'
  },
  {
    show: 'g-ack',
    desc: '클라이언트가 ACK를 전송한다. 서버가 이 ACK를 받아야 서버→클라이언트 방향이 뚫렸음을 확인한다. 이 시점에 양쪽 모두 연결 완료. 데이터 전송이 가능해진다.',
    sc: '연결 완료', ss: '연결 완료', cc: 's-done', sc2: 's-done'
  }
];
let cur = -1;

function next() {
  cur++;
  const s = steps[cur];
  document.getElementById(s.show).style.opacity = '1';
  document.getElementById('desc').textContent = s.desc;
  document.getElementById('st-client').textContent = s.sc;
  document.getElementById('st-client').setAttribute('fill', s.cc === 's-done' ? '#10b981' : s.cc === 's-wait' ? '#f59e0b' : '#64748b');
  document.getElementById('st-server').textContent = s.ss;
  document.getElementById('st-server').setAttribute('fill', s.sc2 === 's-done' ? '#10b981' : s.sc2 === 's-wait' ? '#f59e0b' : '#64748b');
  if (cur >= steps.length - 1) document.getElementById('btn').disabled = true;
}

function reset() {
  cur = -1;
  ['g-syn','g-synack','g-ack'].forEach(id => document.getElementById(id).style.opacity = '0');
  document.getElementById('desc').textContent = '다음 단계 버튼을 눌러 핸드셰이크를 시작한다.';
  document.getElementById('st-client').textContent = '대기 중';
  document.getElementById('st-client').setAttribute('fill','#64748b');
  document.getElementById('st-server').textContent = '대기 중';
  document.getElementById('st-server').setAttribute('fill','#64748b');
  document.getElementById('btn').disabled = false;
}
</script>
</body>
</html>
