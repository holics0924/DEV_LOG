<svg xmlns="http://www.w3.org/2000/svg" width="640" height="510" viewBox="0 0 640 510">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');</style>
    <marker id="ag" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect width="640" height="510" fill="#0d1117" rx="12"/>

  <!-- ─── 3-WAY HANDSHAKE ─── -->
  <text x="320" y="23" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700" fill="#6e7681" text-anchor="middle">TCP 3-WAY HANDSHAKE</text>

  <rect x="20" y="32" width="110" height="32" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="75" y="53" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">클라이언트</text>

  <rect x="510" y="32" width="110" height="32" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="565" y="53" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">서버</text>

  <line x1="75" y1="64" x2="75" y2="238" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,3" opacity="0.35"/>
  <line x1="565" y1="64" x2="565" y2="238" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- SYN → -->
  <line x1="80" y1="88" x2="552" y2="106" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="320" y="91" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700" fill="#3fb950" text-anchor="middle">SYN</text>
  <text x="320" y="104" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">연결 요청</text>

  <!-- SYN-ACK ← -->
  <line x1="560" y1="131" x2="88" y2="149" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="320" y="134" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700" fill="#3fb950" text-anchor="middle">SYN-ACK</text>
  <text x="320" y="147" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">수신 확인 + 서버도 연결 요청</text>

  <!-- ACK → -->
  <line x1="80" y1="172" x2="552" y2="190" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="320" y="175" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700" fill="#3fb950" text-anchor="middle">ACK</text>
  <text x="320" y="188" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">서버 요청 확인 → 연결 완료</text>

  <text x="75" y="228" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">✓ 연결 완료</text>
  <text x="565" y="228" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">✓ 연결 완료</text>

  <!-- Divider -->
  <line x1="20" y1="248" x2="620" y2="248" stroke="#21262d" stroke-width="1"/>

  <!-- ─── 4-WAY TERMINATION ─── -->
  <text x="320" y="270" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700" fill="#6e7681" text-anchor="middle">TCP 4-WAY TERMINATION</text>

  <rect x="20" y="278" width="110" height="32" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="75" y="299" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700" fill="#58a6ff" text-anchor="middle">클라이언트</text>

  <rect x="510" y="278" width="110" height="32" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="565" y="299" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700" fill="#58a6ff" text-anchor="middle">서버</text>

  <line x1="75" y1="310" x2="75" y2="488" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3" opacity="0.35"/>
  <line x1="565" y1="310" x2="565" y2="488" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- FIN → -->
  <line x1="80" y1="330" x2="552" y2="346" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="320" y="333" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle">FIN</text>
  <text x="320" y="346" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">나 더 보낼 데이터 없어</text>

  <!-- ACK ← -->
  <line x1="560" y1="368" x2="88" y2="384" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="320" y="371" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle">ACK</text>
  <text x="320" y="384" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">알겠어</text>

  <!-- FIN ← -->
  <line x1="560" y1="406" x2="88" y2="422" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="320" y="409" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle">FIN</text>
  <text x="320" y="422" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">나도 다 보냈어</text>

  <!-- ACK → -->
  <line x1="80" y1="444" x2="552" y2="460" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="320" y="447" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle">ACK</text>
  <text x="320" y="460" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">알겠어</text>

  <rect x="14" y="468" width="122" height="22" fill="#162032" stroke="#58a6ff" stroke-width="1" rx="6"/>
  <text x="75" y="483" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9" font-weight="700" fill="#58a6ff" text-anchor="middle">TIME_WAIT (2 MSL)</text>
  <text x="565" y="483" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9" fill="#6e7681" text-anchor="middle">CLOSED</text>
</svg>
