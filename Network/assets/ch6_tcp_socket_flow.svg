<svg xmlns="http://www.w3.org/2000/svg" width="700" height="480" viewBox="0 0 700 480">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');</style>
  </defs>

  <!-- Background -->
  <rect width="700" height="480" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">TCP 소켓 통신 흐름</text>

  <!-- Column headers -->
  <rect x="60" y="38" width="200" height="30" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="160" y="58" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">서버 (Server)</text>

  <rect x="440" y="38" width="200" height="30" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="540" y="58" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">클라이언트 (Client)</text>

  <!-- Vertical timeline lines -->
  <line x1="160" y1="72" x2="160" y2="455" stroke="#21262d" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="540" y1="72" x2="540" y2="455" stroke="#21262d" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Server: socket() -->
  <rect x="60" y="80" width="200" height="32" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="160" y="101" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">socket()</text>

  <!-- Server: bind() -->
  <rect x="60" y="126" width="200" height="32" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="160" y="147" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">bind()  — 포트 8080 선점</text>

  <!-- Server: listen() -->
  <rect x="60" y="172" width="200" height="32" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="160" y="193" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">listen(fd, backlog)</text>

  <!-- Annotation: client not needed yet -->
  <text x="275" y="192" fill="#6e7681" font-size="9" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">← 클라이언트 없어도 실행</text>

  <!-- Server: accept() blocking -->
  <rect x="60" y="218" width="200" height="36" fill="#2a2210" stroke="#e3b341" stroke-width="1.5" rx="8"/>
  <text x="160" y="233" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">accept()</text>
  <text x="160" y="248" text-anchor="middle" fill="#6e7681" font-size="9" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">클라이언트 올 때까지 블로킹</text>

  <!-- Client: socket() -->
  <rect x="440" y="218" width="200" height="32" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="540" y="239" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">socket()</text>

  <!-- Client: connect() -->
  <rect x="440" y="264" width="200" height="32" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="540" y="285" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">connect()</text>

  <!-- 3-way Handshake arrow (horizontal, center area) -->
  <line x1="440" y1="280" x2="260" y2="258" stroke="#58a6ff" stroke-width="1.5"/>
  <polygon points="260,258 272,253 270,265" fill="#58a6ff"/>
  <rect x="296" y="256" width="110" height="18" fill="#0d1117" rx="4"/>
  <text x="351" y="269" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">3-way Handshake</text>

  <!-- Server: accept() returns new FD -->
  <rect x="60" y="318" width="200" height="38" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="160" y="334" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">accept() 반환</text>
  <text x="160" y="350" text-anchor="middle" fill="#6e7681" font-size="9" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">new FD — 이 클라이언트 전용</text>

  <!-- Server: read/write -->
  <rect x="60" y="376" width="200" height="32" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="160" y="397" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">read() / write()</text>

  <!-- Client: read/write -->
  <rect x="440" y="376" width="200" height="32" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="540" y="397" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">read() / write()</text>

  <!-- Bidirectional data arrow -->
  <line x1="260" y1="392" x2="440" y2="392" stroke="#3fb950" stroke-width="1.5"/>
  <polygon points="260,392 272,387 272,397" fill="#3fb950"/>
  <polygon points="440,392 428,387 428,397" fill="#3fb950"/>
  <rect x="318" y="380" width="64" height="16" fill="#0d1117" rx="4"/>
  <text x="350" y="392" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">데이터 교환</text>

  <!-- Server: close() -->
  <rect x="60" y="428" width="200" height="32" fill="#21262d" stroke="#8b949e" stroke-width="1.5" rx="8"/>
  <text x="160" y="449" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">close()</text>

  <!-- Client: close() -->
  <rect x="440" y="428" width="200" height="32" fill="#21262d" stroke="#8b949e" stroke-width="1.5" rx="8"/>
  <text x="540" y="449" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">close()</text>
</svg>
