<svg width="780" height="320" viewBox="0 0 780 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text{font-family:'Nunito','Trebuchet MS',Arial,sans-serif}</style>
  <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#6e7681"/>
  </marker>
  <marker id="arr-r" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
    <polygon points="8 0,0 3,8 6" fill="#6e7681"/>
  </marker>
</defs>
<rect width="780" height="320" fill="#0d1117" rx="12"/>

<!-- 서버 -->
<rect x="20" y="100" width="120" height="80" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
<text x="80" y="133" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">서버</text>
<text x="80" y="150" text-anchor="middle" fill="#6e7681" font-size="9">cwnd 관리</text>
<text x="80" y="165" text-anchor="middle" fill="#6e7681" font-size="9">rwnd 수신</text>

<!-- 라우터 -->
<rect x="300" y="100" width="150" height="80" rx="8" fill="#2a1f1f" stroke="#f0883e" stroke-width="1.5"/>
<text x="375" y="128" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">라우터</text>
<text x="375" y="145" text-anchor="middle" fill="#6e7681" font-size="9">패킷 큐 (용량 제한)</text>
<text x="375" y="160" text-anchor="middle" fill="#6e7681" font-size="9">꽉 차면 조용히 드랍</text>
<text x="375" y="175" text-anchor="middle" fill="#6e7681" font-size="9">TCP에게 직접 알리지 않음</text>

<!-- 클라이언트 -->
<rect x="610" y="90" width="150" height="100" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
<text x="685" y="118" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">클라이언트</text>
<rect x="626" y="128" width="118" height="34" rx="4" fill="#0d2540" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,2"/>
<text x="685" y="143" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="700">수신 버퍼</text>
<text x="685" y="156" text-anchor="middle" fill="#6e7681" font-size="8">rwnd = 남은 공간</text>

<!-- 데이터 흐름 화살표 -->
<line x1="140" y1="138" x2="300" y2="138" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="450" y1="138" x2="610" y2="138" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="220" y="130" text-anchor="middle" fill="#6e7681" font-size="9">데이터</text>
<text x="530" y="130" text-anchor="middle" fill="#6e7681" font-size="9">데이터</text>

<!-- rwnd ACK 화살표 (클라이언트 → 서버, 점선) -->
<line x1="610" y1="158" x2="450" y2="158" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-r)"/>
<line x1="300" y1="158" x2="140" y2="158" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-r)"/>
<text x="530" y="172" text-anchor="middle" fill="#58a6ff" font-size="8">ACK + rwnd</text>
<text x="220" y="172" text-anchor="middle" fill="#58a6ff" font-size="8">ACK + rwnd</text>

<!-- 혼잡 제어: 라우터를 가리키는 레이블 -->
<rect x="270" y="222" width="210" height="46" rx="6" fill="#2a1f1f" stroke="#f0883e" stroke-width="1.5"/>
<text x="375" y="239" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="700">혼잡 제어</text>
<text x="375" y="253" text-anchor="middle" fill="#6e7681" font-size="8.5">라우터 큐 보호</text>
<text x="375" y="264" text-anchor="middle" fill="#6e7681" font-size="8.5">서버가 cwnd로 스스로 추정·조절</text>
<line x1="375" y1="222" x2="375" y2="200" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="3,2"/>

<!-- 흐름 제어: 클라이언트 수신 버퍼를 가리키는 레이블 -->
<rect x="570" y="222" width="190" height="46" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
<text x="665" y="239" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">흐름 제어</text>
<text x="665" y="253" text-anchor="middle" fill="#6e7681" font-size="8.5">클라이언트 수신 버퍼 보호</text>
<text x="665" y="264" text-anchor="middle" fill="#6e7681" font-size="8.5">클라이언트가 rwnd로 서버에 통보</text>
<line x1="665" y1="222" x2="685" y2="200" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="3,2"/>

<!-- 핵심 설명: 둘 다 서버가 조절 -->
<rect x="20" y="222" width="240" height="46" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="140" y="239" text-anchor="middle" fill="#6e7681" font-size="9" font-weight="700">두 메커니즘 모두</text>
<text x="140" y="253" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">서버가 전송량을 조절</text>
<text x="140" y="265" text-anchor="middle" fill="#6e7681" font-size="8.5">이유만 다름 (버퍼 vs 네트워크)</text>
</svg>
