<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WiFi 브로드캐스트</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0f172a;--s1:#1e293b;--s2:#162032;--bd:#334155;--tx:#e2e8f0;--mu:#64748b;--bl:#3b82f6;--gr:#10b981;--am:#f59e0b;--rd:#ef4444}
  body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;padding:24px 16px 48px;max-width:860px;margin:0 auto}
  h1{font-size:1.1rem;color:#cbd5e1;margin-bottom:4px}
  .sub{font-size:.78rem;color:var(--mu);margin-bottom:20px}

  /* frame info */
  .frame-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:.82rem}
  .frame-card .label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:8px}
  .frow{display:flex;align-items:center;gap:10px;margin-bottom:5px;font-family:monospace}
  .frow:last-child{margin-bottom:0}
  .fname{color:var(--mu);width:80px;flex-shrink:0;font-size:.78rem}
  .fval{color:var(--tx);font-size:.82rem}
  .fval.hi{color:var(--am)}

  /* diagram */
  .diagram{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
  .router-wrap{display:flex;justify-content:center}
  .router-box{background:var(--s1);border:2px solid var(--bd);border-radius:10px;padding:10px 28px;text-align:center;font-size:.85rem;color:#94a3b8;transition:border-color .3s,box-shadow .3s}
  .router-box.broadcasting{border-color:var(--am);box-shadow:0 0 18px rgba(245,158,11,.3)}
  .router-icon{font-size:20px;margin-bottom:2px}

  .wires{display:flex;width:340px;height:32px;justify-content:space-between;padding:0 32px}
  .wire{width:2px;height:32px;background:var(--bd);transition:background .4s}
  .wire.on{background:var(--am)}

  .devices{display:flex;justify-content:center;gap:24px}
  .device{display:flex;flex-direction:column;align-items:center;gap:5px;width:90px}
  .dev-icon{width:56px;height:56px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--s1);border:2px solid var(--bd);position:relative;transition:border-color .3s,background .3s,box-shadow .3s,opacity .3s}
  .dev-icon.receiving{border-color:var(--am);box-shadow:0 0 12px rgba(245,158,11,.25)}
  .dev-icon.accepted{border-color:var(--gr);background:#052e16;box-shadow:0 0 14px rgba(16,185,129,.35)}
  .dev-icon.rejected{border-color:#1e293b;opacity:.35}
  .badge{position:absolute;top:-10px;right:-10px;font-size:14px;opacity:0;transition:opacity .3s}
  .badge.show{opacity:1}
  .dev-mac{font-size:.68rem;color:var(--mu);font-family:monospace}
  .dev-name{font-size:.78rem;color:#94a3b8}
  .dev-result{font-size:.7rem;min-height:14px;opacity:0;transition:opacity .3s;text-align:center;font-family:monospace;line-height:1.3}
  .dev-result.show{opacity:1}
  .dev-result.match{color:var(--gr)}
  .dev-result.miss{color:var(--mu)}

  /* step card */
  .step-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:14px}
  .step-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:5px}
  .step-desc{font-size:.88rem;color:#cbd5e1;line-height:1.65}

  .controls{display:flex;gap:9px;flex-wrap:wrap}
  button{padding:9px 18px;border:none;border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:700;font-family:inherit;transition:all .12s}
  #btnNext{background:var(--bl);color:#fff;flex:1}
  #btnNext:hover:not(:disabled){background:#2563eb}
  #btnNext:disabled{background:#1e3a5f;color:#334155;cursor:not-allowed}
  #btnReset{background:var(--s1);color:var(--mu);border:1px solid var(--bd)}
  #btnReset:hover{background:#334155}
</style>
</head>
<body>

<h1>WiFi 브로드캐스트 + MAC 필터링</h1>
<p class="sub">같은 네트워크의 모든 기기가 신호를 수신한다 — MAC 주소가 수신 여부를 결정한다</p>

<div class="frame-card">
  <div class="label">전송할 프레임</div>
  <div class="frow"><span class="fname">MAC 목적지</span><span class="fval hi">AA:BB:CC (내 PC)</span></div>
  <div class="frow"><span class="fname">MAC 출발</span><span class="fval">11:22:33 (공유기)</span></div>
  <div class="frow"><span class="fname">IP 목적지</span><span class="fval">192.168.0.5</span></div>
</div>

<div class="diagram">
  <div class="router-wrap">
    <div class="router-box" id="router">
      <div class="router-icon">📡</div>
      공유기
    </div>
  </div>
  <div class="wires">
    <div class="wire" id="w0"></div>
    <div class="wire" id="w1"></div>
    <div class="wire" id="w2"></div>
  </div>
  <div class="devices">
    <div class="device">
      <div class="dev-icon" id="d0">💻<span class="badge" id="b0"></span></div>
      <div class="dev-mac">AA:BB:CC</div>
      <div class="dev-name">내 PC</div>
      <div class="dev-result" id="r0"></div>
    </div>
    <div class="device">
      <div class="dev-icon" id="d1">📱<span class="badge" id="b1"></span></div>
      <div class="dev-mac">DD:EE:FF</div>
      <div class="dev-name">내 폰</div>
      <div class="dev-result" id="r1"></div>
    </div>
    <div class="device">
      <div class="dev-icon" id="d2">🖥️<span class="badge" id="b2"></span></div>
      <div class="dev-mac">77:88:99</div>
      <div class="dev-name">다른 기기</div>
      <div class="dev-result" id="r2"></div>
    </div>
  </div>
</div>

<div class="step-card">
  <div class="step-label" id="stepLabel">초기 상태 — 1 / 4</div>
  <div class="step-desc"  id="stepDesc">공유기가 목적지 MAC AA:BB:CC (내 PC)를 담은 프레임을 전송한다. WiFi는 전파이므로 신호를 보내면 범위 안의 모든 기기가 물리적으로 수신한다.</div>
</div>

<div class="controls">
  <button id="btnReset">↺</button>
  <button id="btnNext">다음 단계 →</button>
</div>

<script>
let step = 0;

const steps = [
  { label:'전파 전송 — 2 / 4',
    desc:'WiFi 전파가 퍼진다. 내 PC, 내 폰, 다른 기기 모두 신호를 물리적으로 수신했다. 아직 어떤 기기도 프레임을 처리하지 않았다.',
    action: () => {
      document.getElementById('router').classList.add('broadcasting');
      ['w0','w1','w2'].forEach(id => document.getElementById(id).classList.add('on'));
      setTimeout(() => ['d0','d1','d2'].forEach(id => document.getElementById(id).classList.add('receiving')), 350);
    }
  },
  { label:'MAC 비교 — 3 / 4',
    desc:'각 기기의 NIC이 프레임의 목적지 MAC(AA:BB:CC)과 자신의 MAC을 비교한다.',
    action: () => {
      const data = [
        { match:true,  text:'AA:BB:CC = AA:BB:CC' },
        { match:false, text:'AA:BB:CC ≠ DD:EE:FF' },
        { match:false, text:'AA:BB:CC ≠ 77:88:99' }
      ];
      data.forEach((d,i) => {
        const r = document.getElementById('r'+i);
        r.textContent = d.text;
        r.className = 'dev-result show '+(d.match ? 'match' : 'miss');
      });
    }
  },
  { label:'수락 / 폐기 — 4 / 4',
    desc:'내 PC만 프레임을 수락하고 상위 계층으로 올린다. 내 폰과 다른 기기는 MAC이 일치하지 않으므로 버린다. MAC 헤더가 없었다면 세 기기 모두 처리해야 했을 것이다.',
    action: () => {
      document.getElementById('d0').classList.remove('receiving'); document.getElementById('d0').classList.add('accepted');
      document.getElementById('b0').textContent='✓'; document.getElementById('b0').classList.add('show');
      document.getElementById('d1').classList.remove('receiving'); document.getElementById('d1').classList.add('rejected');
      document.getElementById('b1').textContent='✗'; document.getElementById('b1').classList.add('show');
      document.getElementById('w1').classList.remove('on');
      document.getElementById('d2').classList.remove('receiving'); document.getElementById('d2').classList.add('rejected');
      document.getElementById('b2').textContent='✗'; document.getElementById('b2').classList.add('show');
      document.getElementById('w2').classList.remove('on');
      document.getElementById('btnNext').disabled = true;
    }
  }
];

function next() {
  if (step >= steps.length) return;
  const s = steps[step];
  document.getElementById('stepLabel').textContent = s.label;
  document.getElementById('stepDesc').textContent = s.desc;
  s.action();
  step++;
}

function reset() {
  step = 0;
  document.getElementById('stepLabel').textContent = '초기 상태 — 1 / 4';
  document.getElementById('stepDesc').textContent = '공유기가 목적지 MAC AA:BB:CC (내 PC)를 담은 프레임을 전송한다. WiFi는 전파이므로 신호를 보내면 범위 안의 모든 기기가 물리적으로 수신한다.';
  document.getElementById('router').classList.remove('broadcasting');
  ['w0','w1','w2'].forEach(id => document.getElementById(id).classList.remove('on'));
  [0,1,2].forEach(i => {
    document.getElementById('d'+i).className = 'dev-icon';
    document.getElementById('b'+i).className = 'badge'; document.getElementById('b'+i).textContent='';
    document.getElementById('r'+i).className = 'dev-result'; document.getElementById('r'+i).textContent='';
  });
  document.getElementById('btnNext').disabled = false;
}

document.getElementById('btnNext').addEventListener('click', next);
document.getElementById('btnReset').addEventListener('click', reset);
</script>
</body>
</html>
