<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
    text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  </defs>
  <rect width="680" height="260" fill="#0d1117" rx="12"/>
  <text x="340" y="22" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">계층별 대표 기기 — 어느 계층까지 이해하느냐</text>

  <!-- Hub -->
  <rect x="20" y="34" width="196" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="118" y="55" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">Hub</text>
  <text x="118" y="73" text-anchor="middle" fill="#6e7681" font-size="10">1계층 장비</text>

  <rect x="20" y="94"  width="196" height="38" rx="6" fill="#0d1117"/>
  <text x="36"  y="117" fill="#21262d" font-size="11" font-weight="600">3. 네트워크 (IP)</text>
  <rect x="20" y="136" width="196" height="38" rx="6" fill="#0d1117"/>
  <text x="36"  y="159" fill="#21262d" font-size="11" font-weight="600">2. 데이터링크 (MAC)</text>
  <rect x="20" y="178" width="196" height="38" rx="6" fill="#21262d" stroke="#8b949e" stroke-width="1"/>
  <text x="36"  y="201" fill="#8b949e" font-size="11" font-weight="600">1. 물리 ← 여기만</text>

  <text x="118" y="232" text-anchor="middle" fill="#6e7681" font-size="10">신호를 모든 포트로 복사</text>
  <text x="118" y="248" text-anchor="middle" fill="#30363d" font-size="10">MAC/IP 무관</text>

  <!-- Switch -->
  <rect x="242" y="34" width="196" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="340" y="55" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">Switch</text>
  <text x="340" y="73" text-anchor="middle" fill="#6e7681" font-size="10">2계층 장비</text>

  <rect x="242" y="94"  width="196" height="38" rx="6" fill="#0d1117"/>
  <text x="258" y="117" fill="#21262d" font-size="11" font-weight="600">3. 네트워크 (IP)</text>
  <rect x="242" y="136" width="196" height="38" rx="6" fill="#2a1f1f" stroke="#f0883e" stroke-width="1"/>
  <text x="258" y="159" fill="#f0883e" font-size="11" font-weight="600">2. 데이터링크 (MAC) ←</text>
  <rect x="242" y="178" width="196" height="38" rx="6" fill="#21262d" stroke="#8b949e" stroke-width="1"/>
  <text x="258" y="201" fill="#8b949e" font-size="11" font-weight="600">1. 물리</text>

  <text x="340" y="232" text-anchor="middle" fill="#6e7681" font-size="10">MAC 확인 → 해당 포트로만</text>
  <text x="340" y="248" text-anchor="middle" fill="#30363d" font-size="10">같은 네트워크 내 전달</text>

  <!-- Router -->
  <rect x="464" y="34" width="196" height="52" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="562" y="55" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">Router</text>
  <text x="562" y="73" text-anchor="middle" fill="#6e7681" font-size="10">3계층 장비</text>

  <rect x="464" y="94"  width="196" height="38" rx="6" fill="#2a2210" stroke="#e3b341" stroke-width="1"/>
  <text x="480" y="117" fill="#e3b341" font-size="11" font-weight="600">3. 네트워크 (IP) ←</text>
  <rect x="464" y="136" width="196" height="38" rx="6" fill="#2a1f1f" stroke="#f0883e" stroke-width="1"/>
  <text x="480" y="159" fill="#f0883e" font-size="11" font-weight="600">2. 데이터링크 (MAC)</text>
  <rect x="464" y="178" width="196" height="38" rx="6" fill="#21262d" stroke="#8b949e" stroke-width="1"/>
  <text x="480" y="201" fill="#8b949e" font-size="11" font-weight="600">1. 물리</text>

  <text x="562" y="232" text-anchor="middle" fill="#6e7681" font-size="10">IP 확인 → 다음 네트워크로</text>
  <text x="562" y="248" text-anchor="middle" fill="#30363d" font-size="10">네트워크 간 라우팅</text>
</svg>
