<svg xmlns="http://www.w3.org/2000/svg" width="640" height="520" viewBox="0 0 640 520">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334155"/>
    </marker>
  </defs>
  <rect width="640" height="520" rx="12" fill="#0d1117"/>

  <!-- ① 클라이언트 -->
  <rect x="220" y="22" width="200" height="48" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="320" y="42" text-anchor="middle" fill="#58a6ff" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="13" font-weight="700">클라이언트</text>
  <text x="320" y="59" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">브라우저 / 앱</text>

  <!-- Arrow ① → ② -->
  <line x1="320" y1="70" x2="320" y2="107" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="338" y="93" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">HTTPS</text>

  <!-- ② CDN 엣지 -->
  <rect x="145" y="110" width="350" height="58" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="320" y="133" text-anchor="middle" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="13" font-weight="700">CDN 엣지 (PoP)</text>
  <text x="320" y="151" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">정적 파일 캐시 응답 · Origin Pull · Cache-Control 연동</text>

  <!-- Arrow ② → ③ -->
  <line x1="320" y1="168" x2="320" y2="207" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="338" y="192" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">동적 요청</text>

  <!-- ③ L7 LB / 리버스 프록시 -->
  <rect x="95" y="210" width="450" height="62" rx="8" fill="#2a2210" stroke="#e3b341" stroke-width="1.5"/>
  <text x="320" y="234" text-anchor="middle" fill="#e3b341" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="13" font-weight="700">L7 로드밸런서 / 리버스 프록시</text>
  <text x="320" y="252" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">SSL Termination · URL 기반 라우팅 · Health Check</text>

  <!-- Fan arrows ③ → ④ (T-bus pattern) -->
  <!-- Vertical stem -->
  <line x1="320" y1="272" x2="320" y2="300" stroke="#334155" stroke-width="1.5"/>
  <!-- Horizontal bus -->
  <line x1="120" y1="300" x2="520" y2="300" stroke="#334155" stroke-width="1.5"/>
  <!-- Drop to servers -->
  <line x1="120" y1="300" x2="120" y2="328" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="320" y1="300" x2="320" y2="328" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="520" y1="300" x2="520" y2="328" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="200" y="295" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9">HTTP (내부망)</text>

  <!-- ④ 서버들 -->
  <rect x="45" y="330" width="150" height="50" rx="8" fill="#2a1f1f" stroke="#f0883e" stroke-width="1.5"/>
  <text x="120" y="351" text-anchor="middle" fill="#f0883e" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">서버 A</text>
  <text x="120" y="368" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">비즈니스 로직</text>

  <rect x="245" y="330" width="150" height="50" rx="8" fill="#2a1f1f" stroke="#f0883e" stroke-width="1.5"/>
  <text x="320" y="351" text-anchor="middle" fill="#f0883e" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">서버 B</text>
  <text x="320" y="368" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">비즈니스 로직</text>

  <rect x="445" y="330" width="150" height="50" rx="8" fill="#2a1f1f" stroke="#f0883e" stroke-width="1.5"/>
  <text x="520" y="351" text-anchor="middle" fill="#f0883e" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">서버 C</text>
  <text x="520" y="368" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">비즈니스 로직</text>

  <!-- Arrows ④ → ⑤ (bus to storage) -->
  <line x1="120" y1="380" x2="120" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="320" y1="380" x2="320" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="520" y1="380" x2="520" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="120" y1="408" x2="520" y2="408" stroke="#334155" stroke-width="1.5"/>
  <line x1="163" y1="408" x2="163" y2="428" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="477" y1="408" x2="477" y2="428" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Redis -->
  <rect x="55" y="430" width="215" height="50" rx="8" fill="#21262d" stroke="#8b949e" stroke-width="1.5"/>
  <text x="163" y="452" text-anchor="middle" fill="#8b949e" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">Redis</text>
  <text x="163" y="469" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">세션 · 캐시 (인메모리)</text>

  <!-- DB -->
  <rect x="370" y="430" width="215" height="50" rx="8" fill="#21262d" stroke="#8b949e" stroke-width="1.5"/>
  <text x="477" y="452" text-anchor="middle" fill="#8b949e" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">DB</text>
  <text x="477" y="469" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">영구 데이터</text>

</svg>
