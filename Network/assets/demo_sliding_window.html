<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>슬라이딩 윈도우</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--s1:#1e293b;--s2:#162032;--bd:#334155;--tx:#e2e8f0;--mu:#64748b;--bl:#3b82f6;--gr:#10b981;--rd:#ef4444;--am:#f59e0b}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;padding:24px 16px 48px;max-width:860px;margin:0 auto}
h1{font-size:1.05rem;color:#cbd5e1;margin-bottom:4px}
.sub{font-size:.78rem;color:var(--mu);margin-bottom:20px}
.seg-row{display:flex;gap:6px;justify-content:center;margin:24px 0 8px;position:relative}
.seg{width:58px;height:58px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;border:2px solid;transition:all .3s;position:relative}
.seg.unsent{background:#1e293b;border-color:#334155;color:#64748b}
.seg.inflight{background:#172554;border-color:#3b82f6;color:#93c5fd}
.seg.acked{background:#052e16;border-color:#10b981;color:#6ee7b7}
.seg-num{font-size:1.1rem;margin-bottom:2px}
.seg-label{font-size:.6rem;opacity:.8}
.window-bracket{position:absolute;bottom:-22px;left:0;right:0;height:2px}
.window-line{height:2px;background:#3b82f6;position:absolute;transition:all .3s}
.legend{display:flex;gap:20px;justify-content:center;margin-bottom:20px;font-size:.78rem;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:14px;height:14px;border-radius:3px;border:2px solid}
.step-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:16px;min-height:64px}
.step-label{font-size:.68rem;font-weight:700;text-transform:uppercase;color:var(--mu);margin-bottom:6px;letter-spacing:.5px}
.step-desc{font-size:.88rem;color:#cbd5e1;line-height:1.65}
.stats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat{flex:1;min-width:100px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;text-align:center}
.stat-label{font-size:.68rem;color:var(--mu);margin-bottom:4px}
.stat-val{font-size:1.2rem;font-weight:700;font-family:monospace}
.btn-row{display:flex;gap:10px;justify-content:center}
button{padding:9px 20px;border-radius:7px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.btn-next{background:#3b82f6;color:#fff}
.btn-next:hover{background:#2563eb}
.btn-reset{background:var(--s1);color:var(--mu);border:1px solid var(--bd)}
.btn-reset:hover{color:var(--tx)}
.btn-next:disabled{background:#334155;color:#64748b;cursor:not-allowed}
</style>
</head>
<body>
<h1>슬라이딩 윈도우 (Sliding Window)</h1>
<p class="sub">cwnd = 4 MSS 기준 · ACK가 도착할 때마다 윈도우가 오른쪽으로 이동</p>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#1e293b;border-color:#334155"></div><span style="color:#64748b">미전송</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#172554;border-color:#3b82f6"></div><span style="color:#93c5fd">전송 중 (ACK 대기)</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#052e16;border-color:#10b981"></div><span style="color:#6ee7b7">ACK 완료</span></div>
</div>

<div class="seg-row" id="segRow"></div>
<div style="height:28px"></div>

<div class="stats">
  <div class="stat"><div class="stat-label">윈도우 시작</div><div class="stat-val" id="winStart" style="color:#93c5fd">1</div></div>
  <div class="stat"><div class="stat-label">윈도우 끝</div><div class="stat-val" id="winEnd" style="color:#93c5fd">4</div></div>
  <div class="stat"><div class="stat-label">ACK 완료</div><div class="stat-val" id="ackCount" style="color:#6ee7b7">0</div></div>
  <div class="stat"><div class="stat-label">전송 중</div><div class="stat-val" id="inflightCount" style="color:#93c5fd">4</div></div>
</div>

<div class="step-card">
  <div class="step-label">현재 상태</div>
  <div class="step-desc" id="stepDesc">세그먼트 1~4를 동시에 전송했다. cwnd=4이므로 ACK 없이 4개까지 보낼 수 있다.</div>
</div>

<div class="btn-row">
  <button class="btn-reset" onclick="reset()">↺</button>
  <button class="btn-next" id="btnNext" onclick="next()">다음 단계 →</button>
</div>

<script>
const TOTAL = 9;
const CWND = 4;
const steps = [
  { acked: 0, desc: "세그먼트 1~4를 동시에 전송했다. cwnd=4이므로 ACK 없이 4개까지 보낼 수 있다." },
  { acked: 1, desc: "ACK 1 도착. 세그먼트 1 확인 완료. 윈도우가 오른쪽으로 한 칸 이동 → 세그먼트 5를 새로 전송한다." },
  { acked: 2, desc: "ACK 2 도착. 세그먼트 2 확인 완료. 윈도우 이동 → 세그먼트 6 전송." },
  { acked: 3, desc: "ACK 3 도착. 세그먼트 3 확인 완료. 윈도우 이동 → 세그먼트 7 전송." },
  { acked: 4, desc: "ACK 4 도착. 세그먼트 4 확인 완료. 윈도우 이동 → 세그먼트 8 전송." },
  { acked: 5, desc: "ACK 5 도착. 윈도우 이동 → 세그먼트 9 전송. 이제 9개 모두 전송 범위 안에 들어왔다." },
  { acked: 6, desc: "ACK 6 도착. 세그먼트 6 완료. 윈도우는 계속 이동하지만 새로 보낼 세그먼트가 없다." },
  { acked: 7, desc: "ACK 7 도착. 세그먼트 7 완료." },
  { acked: 8, desc: "ACK 8 도착. 세그먼트 8 완료." },
  { acked: 9, desc: "ACK 9 도착. 모든 세그먼트 전송 완료. 윈도우가 끝까지 이동했다." },
];

let step = 0;

function render() {
  const s = steps[step];
  const acked = s.acked;
  const winStart = acked + 1;
  const winEnd = Math.min(acked + CWND, TOTAL);

  const row = document.getElementById('segRow');
  row.innerHTML = '';
  for (let i = 1; i <= TOTAL; i++) {
    const div = document.createElement('div');
    div.className = 'seg';
    let state, label;
    if (i <= acked) { div.classList.add('acked'); label = 'ACK'; }
    else if (i >= winStart && i <= winEnd) { div.classList.add('inflight'); label = '전송중'; }
    else { div.classList.add('unsent'); label = '대기'; }
    div.innerHTML = `<span class="seg-num">${i}</span><span class="seg-label">${label}</span>`;
    row.appendChild(div);
  }

  document.getElementById('winStart').textContent = winStart > TOTAL ? '-' : winStart;
  document.getElementById('winEnd').textContent = winEnd > TOTAL ? TOTAL : winEnd;
  document.getElementById('ackCount').textContent = acked;
  document.getElementById('inflightCount').textContent = Math.max(0, winEnd - acked);
  document.getElementById('stepDesc').textContent = s.desc;
  document.getElementById('btnNext').disabled = step >= steps.length - 1;
}

function next() { if (step < steps.length - 1) { step++; render(); } }
function reset() { step = 0; render(); }
render();
</script>
</body>
</html>
