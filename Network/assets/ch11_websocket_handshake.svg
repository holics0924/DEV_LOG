<svg xmlns="http://www.w3.org/2000/svg" width="700" height="490" viewBox="0 0 700 490">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');</style>
    <marker id="ar-y" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e3b341"/>
    </marker>
    <marker id="ar-b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="ar-g" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="700" height="490" fill="#0d1117" rx="12"/>

  <!-- Client -->
  <rect x="40" y="20" width="110" height="34" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="95" y="42" text-anchor="middle" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700" fill="#58a6ff">클라이언트</text>

  <!-- Server -->
  <rect x="550" y="20" width="110" height="34" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="605" y="42" text-anchor="middle" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700" fill="#3fb950">서버</text>

  <!-- Timeline lines -->
  <line x1="95" y1="54" x2="95" y2="460" stroke="#21262d" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="605" y1="54" x2="605" y2="460" stroke="#21262d" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Phase label: HTTP Handshake -->
  <text x="350" y="85" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="700" fill="#6e7681">— HTTP 핸드셰이크 —</text>

  <!-- Step 1: Client → Server (Upgrade request) -->
  <line x1="95" y1="100" x2="597" y2="100" stroke="#e3b341" stroke-width="2" marker-end="url(#ar-y)"/>

  <rect x="175" y="110" width="350" height="78" fill="#2a2210" stroke="#e3b341" stroke-width="1" rx="6"/>
  <text x="350" y="128" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="700" fill="#e3b341">GET /chat HTTP/1.1</text>
  <text x="350" y="146" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" fill="#8b949e">Host: example.com</text>
  <text x="350" y="162" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" fill="#e3b341">Upgrade: websocket</text>
  <text x="350" y="178" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" fill="#e3b341">Connection: Upgrade</text>

  <!-- Step 2: Server → Client (101) -->
  <line x1="605" y1="205" x2="103" y2="205" stroke="#e3b341" stroke-width="2" marker-end="url(#ar-y)"/>

  <rect x="175" y="215" width="350" height="62" fill="#2a2210" stroke="#e3b341" stroke-width="1" rx="6"/>
  <text x="350" y="234" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="700" fill="#e3b341">HTTP/1.1 101 Switching Protocols</text>
  <text x="350" y="252" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" fill="#8b949e">Upgrade: websocket</text>
  <text x="350" y="268" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" fill="#8b949e">Connection: Upgrade</text>

  <!-- Connection established -->
  <rect x="105" y="292" width="490" height="22" fill="#1a2a1a" stroke="#3fb950" stroke-width="1.5" rx="6"/>
  <text x="350" y="307" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="700" fill="#3fb950">── WebSocket 연결 수립 · HTTP 프로토콜 종료 ──</text>

  <!-- Phase label: WebSocket frames -->
  <text x="350" y="345" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="700" fill="#6e7681">— WebSocket 프레임 교환 —</text>

  <!-- Server → Client (no request) -->
  <line x1="605" y1="362" x2="103" y2="362" stroke="#3fb950" stroke-width="2" marker-end="url(#ar-g)"/>
  <text x="350" y="358" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" font-weight="700" fill="#3fb950">서버 → 클라이언트 (요청 없이 서버가 먼저 전송)</text>

  <!-- Client → Server -->
  <line x1="95" y1="390" x2="597" y2="390" stroke="#58a6ff" stroke-width="2" marker-end="url(#ar-b)"/>
  <text x="350" y="386" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" font-weight="700" fill="#58a6ff">클라이언트 → 서버</text>

  <!-- Server → Client again -->
  <line x1="605" y1="418" x2="103" y2="418" stroke="#3fb950" stroke-width="2" marker-end="url(#ar-g)"/>
  <text x="350" y="414" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" font-weight="700" fill="#3fb950">서버 → 클라이언트 (요청 없이 서버가 먼저 전송)</text>

  <!-- Frame size note -->
  <text x="350" y="462" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" fill="#6e7681">프레임 헤더: 2~10바이트  ·  HTTP 헤더 수백 바이트 대비 1/100 수준</text>
</svg>
