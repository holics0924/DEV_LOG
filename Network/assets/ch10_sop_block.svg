<svg width="720" height="340" viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
      text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }
    </style>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect width="720" height="340" rx="12" fill="#0d1117"/>
  <text x="360" y="28" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">SAME-ORIGIN POLICY</text>

  <!-- Browser box -->
  <rect x="20" y="44" width="272" height="272" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="156" y="62" text-anchor="middle" fill="#6e7681" font-size="10" font-weight="700">BROWSER</text>

  <!-- evil.com JS (orange) -->
  <rect x="38" y="70" width="236" height="80" rx="8" fill="#2a1f1f" stroke="#f0883e" stroke-width="1.5"/>
  <text x="156" y="91" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="700">evil.com JavaScript</text>
  <text x="156" y="110" text-anchor="middle" fill="#6e7681" font-size="10">fetch("mybank.com/balance")</text>
  <text x="156" y="128" text-anchor="middle" fill="#6e7681" font-size="10">응답을 읽으려 함</text>

  <!-- Cookie (yellow) -->
  <rect x="38" y="162" width="236" height="46" rx="8" fill="#2a2210" stroke="#e3b341" stroke-width="1.5"/>
  <text x="156" y="182" text-anchor="middle" fill="#e3b341" font-size="10" font-weight="700">COOKIE (자동 첨부)</text>
  <text x="156" y="199" text-anchor="middle" fill="#6e7681" font-size="10">session_id=abc123</text>

  <!-- Blocked (red) -->
  <rect x="38" y="220" width="236" height="78" rx="8" fill="#2a1010" stroke="#ef4444" stroke-width="1.5"/>
  <text x="88" y="267" text-anchor="middle" fill="#ef4444" font-size="26" font-weight="700">✕</text>
  <text x="180" y="252" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">응답 차단</text>
  <text x="180" y="270" text-anchor="middle" fill="#6e7681" font-size="10">출처: evil.com</text>
  <text x="180" y="287" text-anchor="middle" fill="#6e7681" font-size="10">JS에 전달 불가</text>

  <!-- Server box (blue) -->
  <rect x="428" y="68" width="272" height="210" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="564" y="91" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">mybank.com 서버</text>
  <text x="564" y="116" text-anchor="middle" fill="#6e7681" font-size="10">쿠키 확인</text>
  <text x="564" y="134" text-anchor="middle" fill="#3fb950" font-size="10">session_id=abc123  ✓</text>
  <text x="564" y="153" text-anchor="middle" fill="#6e7681" font-size="10">정상 요청으로 판단</text>

  <rect x="452" y="170" width="224" height="88" rx="6" fill="#162032" stroke="#3fb950" stroke-width="1.5"/>
  <text x="564" y="194" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">응답</text>
  <text x="564" y="213" text-anchor="middle" fill="#6e7681" font-size="10">{ balance: 5000000 }</text>
  <text x="564" y="232" text-anchor="middle" fill="#6e7681" font-size="10">HTTP 200 OK</text>
  <text x="564" y="250" text-anchor="middle" fill="#30363d" font-size="10">누가 요청했는지 서버는 모름</text>

  <!-- Request arrow → -->
  <line x1="294" y1="162" x2="426" y2="162" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="360" y="153" text-anchor="middle" fill="#58a6ff" font-size="10">① GET /balance + Cookie</text>

  <!-- Response arrow ← dashed -->
  <line x1="426" y1="232" x2="294" y2="250" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <text x="360" y="222" text-anchor="middle" fill="#8b949e" font-size="10">② 응답 도착 (차단됨)</text>

  <!-- Bottom note -->
  <text x="360" y="328" text-anchor="middle" fill="#6e7681" font-size="10">요청은 서버에 도달하고 실행된다 — 브라우저가 막는 것은 JS의 응답 읽기다</text>
</svg>
