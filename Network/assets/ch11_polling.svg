<svg xmlns="http://www.w3.org/2000/svg" width="560" height="380" viewBox="0 0 560 380">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');</style>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#6e7681"/>
    </marker>
    <marker id="ar-b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect width="560" height="380" fill="#0d1117" rx="12"/>

  <!-- Client -->
  <rect x="40" y="20" width="100" height="30" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="90" y="40" text-anchor="middle" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700" fill="#58a6ff">클라이언트</text>

  <!-- Server -->
  <rect x="420" y="20" width="100" height="30" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="470" y="40" text-anchor="middle" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700" fill="#3fb950">서버</text>

  <!-- Timeline -->
  <line x1="90" y1="50" x2="90" y2="330" stroke="#21262d" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="470" y1="50" x2="470" y2="330" stroke="#21262d" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Polling interval bracket -->
  <line x1="30" y1="75" x2="30" y2="130" stroke="#30363d" stroke-width="1"/>
  <line x1="30" y1="75" x2="40" y2="75" stroke="#30363d" stroke-width="1"/>
  <line x1="30" y1="130" x2="40" y2="130" stroke="#30363d" stroke-width="1"/>
  <text x="26" y="106" text-anchor="middle" font-family="Nunito,sans-serif" font-size="8" fill="#6e7681" transform="rotate(-90,26,106)">1초 간격</text>

  <!-- Round 1 -->
  <line x1="90" y1="80" x2="462" y2="80" stroke="#6e7681" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="280" y="76" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">GET /api/messages</text>
  <line x1="470" y1="100" x2="98" y2="100" stroke="#6e7681" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="280" y="115" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#30363d">200 OK  { data: [] }  — 비어있음</text>

  <!-- Round 2 -->
  <line x1="90" y1="135" x2="462" y2="135" stroke="#6e7681" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="280" y="131" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">GET /api/messages</text>
  <line x1="470" y1="155" x2="98" y2="155" stroke="#6e7681" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="280" y="170" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#30363d">200 OK  { data: [] }  — 비어있음</text>

  <!-- Round 3 -->
  <line x1="90" y1="190" x2="462" y2="190" stroke="#6e7681" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="280" y="186" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">GET /api/messages</text>
  <line x1="470" y1="210" x2="98" y2="210" stroke="#6e7681" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="280" y="225" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#30363d">200 OK  { data: [] }  — 비어있음</text>

  <!-- Event marker on server -->
  <rect x="452" y="232" width="36" height="16" fill="#1a3a27" stroke="#3fb950" stroke-width="1" rx="3"/>
  <text x="470" y="244" text-anchor="middle" font-family="Nunito,sans-serif" font-size="8" fill="#3fb950">이벤트!</text>

  <!-- Round 4 - data! -->
  <line x1="90" y1="258" x2="462" y2="258" stroke="#6e7681" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="280" y="254" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">GET /api/messages</text>
  <line x1="470" y1="278" x2="98" y2="278" stroke="#58a6ff" stroke-width="2" marker-end="url(#ar-b)"/>
  <text x="280" y="293" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="700" fill="#58a6ff">200 OK  { data: [...] }  — 수신 성공</text>

  <!-- Bottom note -->
  <rect x="60" y="318" width="440" height="22" fill="#1c1c1c" rx="4"/>
  <text x="280" y="333" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" fill="#6e7681">이벤트 발생 시점과 감지 시점 사이에 최대 N초 지연  ·  빈 응답이 대부분의 요청을 차지</text>
</svg>
