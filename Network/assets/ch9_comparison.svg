<svg width="720" height="340" viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
      text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }
    </style>
  </defs>

  <rect width="720" height="340" rx="12" fill="#0d1117"/>

  <!-- 제목 -->
  <text x="360" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="#6e7681">쿠키 vs 세션 vs JWT</text>

  <!-- 열 헤더 -->
  <text x="140" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#58a6ff">쿠키</text>
  <text x="360" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#3fb950">세션</text>
  <text x="580" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#e3b341">JWT</text>

  <!-- 구분선 -->
  <line x1="240" y1="44" x2="240" y2="330" stroke="#21262d" stroke-width="1"/>
  <line x1="460" y1="44" x2="460" y2="330" stroke="#21262d" stroke-width="1"/>

  <!-- 행 1: 저장 위치 -->
  <rect x="16" y="66" width="688" height="48" rx="6" fill="#161b22"/>
  <text x="20" y="84" font-size="10" font-weight="700" fill="#6e7681">저장 위치</text>
  <text x="140" y="84" text-anchor="middle" font-size="11" fill="#58a6ff">브라우저</text>
  <text x="140" y="100" text-anchor="middle" font-size="10" fill="#6e7681">(클라이언트 측)</text>
  <text x="360" y="84" text-anchor="middle" font-size="11" fill="#3fb950">서버 메모리</text>
  <text x="360" y="100" text-anchor="middle" font-size="10" fill="#6e7681">+ 브라우저(세션 ID)</text>
  <text x="580" y="84" text-anchor="middle" font-size="11" fill="#e3b341">브라우저</text>
  <text x="580" y="100" text-anchor="middle" font-size="10" fill="#6e7681">(클라이언트 측)</text>

  <!-- 행 2: 서버 부담 -->
  <rect x="16" y="120" width="688" height="48" rx="6" fill="#0d1117"/>
  <text x="20" y="138" font-size="10" font-weight="700" fill="#6e7681">서버 부담</text>
  <text x="140" y="138" text-anchor="middle" font-size="11" fill="#58a6ff">없음</text>
  <text x="140" y="154" text-anchor="middle" font-size="10" fill="#6e7681">서버 저장 불필요</text>
  <text x="360" y="138" text-anchor="middle" font-size="11" fill="#f0883e">있음</text>
  <text x="360" y="154" text-anchor="middle" font-size="10" fill="#6e7681">유저 수만큼 메모리 사용</text>
  <text x="580" y="138" text-anchor="middle" font-size="11" fill="#58a6ff">없음</text>
  <text x="580" y="154" text-anchor="middle" font-size="10" fill="#6e7681">서버 저장 불필요</text>

  <!-- 행 3: 변조 방어 -->
  <rect x="16" y="174" width="688" height="48" rx="6" fill="#161b22"/>
  <text x="20" y="192" font-size="10" font-weight="700" fill="#6e7681">변조 방어</text>
  <text x="140" y="192" text-anchor="middle" font-size="11" fill="#ef4444">없음</text>
  <text x="140" y="208" text-anchor="middle" font-size="10" fill="#6e7681">값을 직접 바꿀 수 있음</text>
  <text x="360" y="192" text-anchor="middle" font-size="11" fill="#3fb950">있음</text>
  <text x="360" y="208" text-anchor="middle" font-size="10" fill="#6e7681">의미 없는 ID만 노출</text>
  <text x="580" y="192" text-anchor="middle" font-size="11" fill="#3fb950">있음</text>
  <text x="580" y="208" text-anchor="middle" font-size="10" fill="#6e7681">서명으로 위조 불가</text>

  <!-- 행 4: 스케일아웃 -->
  <rect x="16" y="228" width="688" height="48" rx="6" fill="#0d1117"/>
  <text x="20" y="246" font-size="10" font-weight="700" fill="#6e7681">스케일아웃</text>
  <text x="140" y="246" text-anchor="middle" font-size="11" fill="#3fb950">자유로움</text>
  <text x="140" y="262" text-anchor="middle" font-size="10" fill="#6e7681">서버 상태 없음</text>
  <text x="360" y="246" text-anchor="middle" font-size="11" fill="#ef4444">어려움</text>
  <text x="360" y="262" text-anchor="middle" font-size="10" fill="#6e7681">공유 저장소 필요</text>
  <text x="580" y="246" text-anchor="middle" font-size="11" fill="#3fb950">자유로움</text>
  <text x="580" y="262" text-anchor="middle" font-size="10" fill="#6e7681">비밀 키만 공유하면 됨</text>

  <!-- 행 5: 강제 무효화 -->
  <rect x="16" y="282" width="688" height="46" rx="6" fill="#161b22"/>
  <text x="20" y="300" font-size="10" font-weight="700" fill="#6e7681">강제 무효화</text>
  <text x="140" y="300" text-anchor="middle" font-size="11" fill="#ef4444">불가</text>
  <text x="360" y="300" text-anchor="middle" font-size="11" fill="#3fb950">가능</text>
  <text x="360" y="316" text-anchor="middle" font-size="10" fill="#6e7681">서버에서 세션 삭제</text>
  <text x="580" y="300" text-anchor="middle" font-size="11" fill="#f0883e">어려움</text>
  <text x="580" y="316" text-anchor="middle" font-size="10" fill="#6e7681">Refresh Token DB 삭제로 완화</text>
</svg>
