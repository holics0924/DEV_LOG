<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
    text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  </defs>

  <rect width="800" height="300" fill="#0d1117" rx="12"/>
  <text x="400" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">HTTP 버전 진화</text>

  <!-- 화살표 -->
  <line x1="200" y1="158" x2="212" y2="158" stroke="#30363d" stroke-width="2"/>
  <polygon points="212,153 222,158 212,163" fill="#30363d"/>
  <line x1="393" y1="158" x2="405" y2="158" stroke="#30363d" stroke-width="2"/>
  <polygon points="405,153 415,158 405,163" fill="#30363d"/>
  <line x1="586" y1="158" x2="598" y2="158" stroke="#30363d" stroke-width="2"/>
  <polygon points="598,153 608,158 598,163" fill="#30363d"/>

  <!-- ===== HTTP/1.0 ===== -->
  <rect x="18" y="42" width="178" height="234" fill="#21262d" rx="8" stroke="#8b949e" stroke-width="1.5"/>
  <text x="107" y="70" text-anchor="middle" fill="#c9d1d9" font-size="15" font-weight="700">HTTP/1.0</text>
  <text x="107" y="88" text-anchor="middle" fill="#6e7681" font-size="10">1996</text>
  <line x1="30" y1="100" x2="184" y2="100" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="118" fill="#6e7681" font-size="9" font-weight="700">특징</text>
  <text x="30" y="138" fill="#8b949e" font-size="12">기본 HTTP 확립</text>
  <line x1="30" y1="162" x2="184" y2="162" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="180" fill="#ef4444" font-size="9" font-weight="700">문제</text>
  <text x="30" y="200" fill="#b03030" font-size="11">매 요청마다</text>
  <text x="30" y="218" fill="#b03030" font-size="11">새 TCP 연결</text>

  <!-- ===== HTTP/1.1 ===== -->
  <rect x="226" y="42" width="163" height="234" fill="#2a2210" rx="8" stroke="#e3b341" stroke-width="1.5"/>
  <text x="307" y="70" text-anchor="middle" fill="#e3b341" font-size="15" font-weight="700">HTTP/1.1</text>
  <text x="307" y="88" text-anchor="middle" fill="#6e7681" font-size="10">1997</text>
  <line x1="238" y1="100" x2="377" y2="100" stroke="#5a4a20" stroke-width="1"/>
  <text x="238" y="118" fill="#6e7681" font-size="9" font-weight="700">개선</text>
  <text x="238" y="138" fill="#b38620" font-size="12">Keep-Alive</text>
  <text x="238" y="156" fill="#b38620" font-size="11">연결 재사용</text>
  <line x1="238" y1="170" x2="377" y2="170" stroke="#5a4a20" stroke-width="1"/>
  <text x="238" y="188" fill="#ef4444" font-size="9" font-weight="700">문제</text>
  <text x="238" y="208" fill="#b03030" font-size="11">HOL Blocking</text>
  <text x="238" y="226" fill="#b03030" font-size="10">(응답 순서 제약)</text>

  <!-- ===== HTTP/2 ===== -->
  <rect x="419" y="42" width="163" height="234" fill="#1c3a5e" rx="8" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="500" y="70" text-anchor="middle" fill="#58a6ff" font-size="15" font-weight="700">HTTP/2</text>
  <text x="500" y="88" text-anchor="middle" fill="#6e7681" font-size="10">2015</text>
  <line x1="431" y1="100" x2="570" y2="100" stroke="#2d5480" stroke-width="1"/>
  <text x="431" y="118" fill="#6e7681" font-size="9" font-weight="700">개선</text>
  <text x="431" y="138" fill="#3d7db8" font-size="12">멀티플렉싱</text>
  <text x="431" y="156" fill="#3d7db8" font-size="11">동시 요청 처리</text>
  <line x1="431" y1="170" x2="570" y2="170" stroke="#2d5480" stroke-width="1"/>
  <text x="431" y="188" fill="#ef4444" font-size="9" font-weight="700">문제</text>
  <text x="431" y="208" fill="#b03030" font-size="11">TCP 레벨</text>
  <text x="431" y="226" fill="#b03030" font-size="11">HOL Blocking</text>

  <!-- ===== HTTP/3 ===== -->
  <rect x="612" y="42" width="170" height="234" fill="#1a3a27" rx="8" stroke="#3fb950" stroke-width="1.5"/>
  <text x="697" y="70" text-anchor="middle" fill="#3fb950" font-size="15" font-weight="700">HTTP/3</text>
  <text x="697" y="88" text-anchor="middle" fill="#6e7681" font-size="10">2022</text>
  <line x1="624" y1="100" x2="770" y2="100" stroke="#1a5230" stroke-width="1"/>
  <text x="624" y="118" fill="#6e7681" font-size="9" font-weight="700">개선</text>
  <text x="624" y="138" fill="#2d7a3d" font-size="12">QUIC</text>
  <text x="624" y="156" fill="#2d7a3d" font-size="11">UDP 기반</text>
  <line x1="624" y1="170" x2="770" y2="170" stroke="#1a5230" stroke-width="1"/>
  <rect x="632" y="188" width="128" height="30" fill="#0d2016" rx="6" stroke="#3fb950" stroke-width="1"/>
  <text x="696" y="208" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">현재 표준 ✓</text>
</svg>
