<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
    text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  </defs>

  <rect width="720" height="380" fill="#0d1117" rx="12"/>

  <text x="360" y="28" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">서브넷 마스크 AND 연산 — 같은 네트워크인지 판단</text>

  <!-- Column headers -->
  <text x="130" y="58" text-anchor="middle" fill="#6e7681" font-size="10" font-weight="700">10진수</text>
  <text x="400" y="58" text-anchor="middle" fill="#6e7681" font-size="10" font-weight="700">2진수 (32비트)</text>
  <text x="630" y="58" text-anchor="middle" fill="#6e7681" font-size="10" font-weight="700">결과</text>

  <!-- Case A: 192.168.1.100 / 24 -->
  <rect x="16" y="66" width="688" height="128" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="84" fill="#6e7681" font-size="10" font-weight="700">예시 A</text>

  <!-- IP A -->
  <text x="30" y="104" fill="#58a6ff" font-size="10" font-weight="700">IP</text>
  <text x="130" y="104" text-anchor="middle" fill="#58a6ff" font-size="10">192.168.1.100</text>
  <text x="390" y="104" text-anchor="middle" fill="#58a6ff" font-size="10" letter-spacing="1">11000000.10101000.00000001.01100100</text>

  <!-- Mask -->
  <text x="30" y="124" fill="#e3b341" font-size="10" font-weight="700">MASK</text>
  <text x="130" y="124" text-anchor="middle" fill="#e3b341" font-size="10">255.255.255.0</text>
  <text x="390" y="124" text-anchor="middle" fill="#e3b341" font-size="10" letter-spacing="1">11111111.11111111.11111111.00000000</text>
  <text x="630" y="124" text-anchor="middle" fill="#6e7681" font-size="9">(/24)</text>

  <line x1="30" y1="132" x2="694" y2="132" stroke="#30363d" stroke-width="1"/>

  <!-- AND result A -->
  <text x="30" y="151" fill="#3fb950" font-size="10" font-weight="700">AND</text>
  <text x="130" y="151" text-anchor="middle" fill="#3fb950" font-size="10">192.168.1.0</text>
  <text x="390" y="151" text-anchor="middle" fill="#3fb950" font-size="10" letter-spacing="1">11000000.10101000.00000001.00000000</text>
  <text x="630" y="151" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">네트워크 주소</text>

  <text x="30" y="180" fill="#6e7681" font-size="9">뒤 8비트(호스트 부분)가 0으로 날아간다 — 앞 24비트(네트워크 부분)만 남음</text>

  <!-- Case B: 192.168.2.100 / 24 -->
  <rect x="16" y="210" width="688" height="110" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="30" y="228" fill="#6e7681" font-size="10" font-weight="700">예시 B</text>

  <text x="30" y="248" fill="#58a6ff" font-size="10" font-weight="700">IP</text>
  <text x="130" y="248" text-anchor="middle" fill="#58a6ff" font-size="10">192.168.2.100</text>
  <text x="390" y="248" text-anchor="middle" fill="#58a6ff" font-size="10" letter-spacing="1">11000000.10101000.00000010.01100100</text>

  <text x="30" y="268" fill="#e3b341" font-size="10" font-weight="700">MASK</text>
  <text x="130" y="268" text-anchor="middle" fill="#e3b341" font-size="10">255.255.255.0</text>
  <text x="390" y="268" text-anchor="middle" fill="#e3b341" font-size="10" letter-spacing="1">11111111.11111111.11111111.00000000</text>

  <line x1="30" y1="276" x2="694" y2="276" stroke="#30363d" stroke-width="1"/>

  <text x="30" y="296" fill="#ef4444" font-size="10" font-weight="700">AND</text>
  <text x="130" y="296" text-anchor="middle" fill="#ef4444" font-size="10">192.168.2.0</text>
  <text x="390" y="296" text-anchor="middle" fill="#ef4444" font-size="10" letter-spacing="1">11000000.10101000.00000010.00000000</text>
  <text x="630" y="296" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">네트워크 주소</text>

  <text x="30" y="316" fill="#6e7681" font-size="9">세 번째 옥텟이 다르다 (00000001 vs 00000010) — 다른 네트워크</text>

  <!-- Verdict -->
  <rect x="16" y="336" width="688" height="34" rx="8" fill="#1a1f26" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="358" text-anchor="middle" fill="#8b949e" font-size="11">예시 A (→ 192.168.1.0)  ≠  예시 B (→ 192.168.2.0) — 두 기기는 다른 네트워크, 라우터를 거쳐야 한다</text>
</svg>
