<svg xmlns="http://www.w3.org/2000/svg" width="560" height="420" viewBox="0 0 560 420">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');</style>
    <marker id="ar-y" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e3b341"/>
    </marker>
    <marker id="ar-b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="ar-g" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="560" height="420" fill="#0d1117" rx="12"/>

  <!-- Client -->
  <rect x="40" y="20" width="100" height="30" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="90" y="40" text-anchor="middle" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700" fill="#58a6ff">클라이언트</text>

  <!-- Server -->
  <rect x="420" y="20" width="100" height="30" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="470" y="40" text-anchor="middle" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700" fill="#3fb950">서버</text>

  <!-- Timeline -->
  <line x1="90" y1="50" x2="90" y2="390" stroke="#21262d" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="470" y1="50" x2="470" y2="390" stroke="#21262d" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Phase label: HTTP Handshake -->
  <text x="280" y="78" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="700" fill="#6e7681">— HTTP 핸드셰이크 —</text>

  <!-- Upgrade request -->
  <line x1="90" y1="92" x2="462" y2="92" stroke="#e3b341" stroke-width="2" marker-end="url(#ar-y)"/>
  <text x="280" y="88" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="700" fill="#e3b341">GET /chat  ·  Upgrade: websocket</text>

  <!-- 101 response -->
  <line x1="470" y1="118" x2="98" y2="118" stroke="#e3b341" stroke-width="2" marker-end="url(#ar-y)"/>
  <text x="280" y="114" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="700" fill="#e3b341">101 Switching Protocols</text>

  <!-- Connection established -->
  <rect x="60" y="134" width="440" height="22" fill="#1a2a1a" stroke="#3fb950" stroke-width="1.5" rx="6"/>
  <text x="280" y="149" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="700" fill="#3fb950">── WebSocket 연결 수립 · HTTP 프로토콜 종료 ──</text>

  <!-- Phase label: WebSocket frames -->
  <text x="280" y="184" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" font-weight="700" fill="#6e7681">— WebSocket 프레임 교환 (요청 없이 자유롭게) —</text>

  <!-- Server → Client (1) -->
  <line x1="470" y1="200" x2="98" y2="200" stroke="#3fb950" stroke-width="2" marker-end="url(#ar-g)"/>
  <text x="280" y="196" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#3fb950">서버 → 클라이언트  (서버가 먼저 전송)</text>

  <!-- Client → Server -->
  <line x1="90" y1="232" x2="462" y2="232" stroke="#58a6ff" stroke-width="2" marker-end="url(#ar-b)"/>
  <text x="280" y="228" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#58a6ff">클라이언트 → 서버</text>

  <!-- Server → Client (2) -->
  <line x1="470" y1="264" x2="98" y2="264" stroke="#3fb950" stroke-width="2" marker-end="url(#ar-g)"/>
  <text x="280" y="260" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#3fb950">서버 → 클라이언트  (서버가 먼저 전송)</text>

  <!-- Client → Server (2) -->
  <line x1="90" y1="296" x2="462" y2="296" stroke="#58a6ff" stroke-width="2" marker-end="url(#ar-b)"/>
  <text x="280" y="292" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#58a6ff">클라이언트 → 서버</text>

  <!-- Separator line between phases -->
  <line x1="60" y1="162" x2="500" y2="162" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom info boxes -->
  <rect x="60" y="320" width="200" height="42" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1" rx="6"/>
  <text x="160" y="337" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" font-weight="700" fill="#58a6ff">HTTP 헤더 오버헤드</text>
  <text x="160" y="353" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" fill="#6e7681">수백 바이트 / 요청</text>

  <rect x="300" y="320" width="200" height="42" fill="#1a2a1a" stroke="#3fb950" stroke-width="1" rx="6"/>
  <text x="400" y="337" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" font-weight="700" fill="#3fb950">WebSocket 프레임 헤더</text>
  <text x="400" y="353" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" fill="#6e7681">2~10바이트 / 프레임</text>

  <text x="280" y="395" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" fill="#30363d">vs</text>
</svg>
