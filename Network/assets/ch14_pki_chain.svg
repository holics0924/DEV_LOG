<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
      text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }
    </style>
    <marker id="arr-yellow-d" markerWidth="8" markerHeight="7" refX="4" refY="7" orient="auto">
      <path d="M0,0 L4,7 L8,0 z" fill="#e3b341"/>
    </marker>
    <marker id="arr-blue-r" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#58a6ff"/>
    </marker>
    <marker id="arr-gray-l" markerWidth="8" markerHeight="7" refX="2" refY="3.5" orient="auto-start-reverse">
      <path d="M8,0 L8,7 L0,3.5 z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="720" height="420" fill="#0d1117" rx="12"/>
  <text x="360" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#6e7681">PKI 신뢰 체인 구조</text>

  <!-- ─── Root CA ─── -->
  <rect x="220" y="42" width="280" height="80" fill="#2a2210" stroke="#e3b341" stroke-width="2" rx="8"/>
  <text x="360" y="66" text-anchor="middle" font-size="13" font-weight="700" fill="#e3b341">Root CA</text>
  <text x="360" y="83" text-anchor="middle" font-size="10" fill="#6e7681">브라우저 / OS에 공개키 내장</text>
  <text x="360" y="98" text-anchor="middle" font-size="9" fill="#6e7681">개인키: HSM 보관 · 인터넷 비연결 (오프라인)</text>
  <text x="360" y="113" text-anchor="middle" font-size="9" fill="#e3b341">신뢰 출발점 — 전 세계 수십 개뿐</text>

  <!-- Root CA → Intermediate CA 화살표 -->
  <line x1="360" y1="122" x2="360" y2="158" stroke="#e3b341" stroke-width="2" marker-end="url(#arr-yellow-d)"/>
  <rect x="378" y="130" width="136" height="20" fill="#0d1117" rx="4"/>
  <text x="446" y="144" text-anchor="middle" font-size="9" fill="#e3b341">Root CA 개인키로 서명</text>

  <!-- ─── Intermediate CA ─── -->
  <rect x="220" y="160" width="280" height="70" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="360" y="183" text-anchor="middle" font-size="13" font-weight="700" fill="#58a6ff">Intermediate CA</text>
  <text x="360" y="200" text-anchor="middle" font-size="10" fill="#6e7681">실제 인증서 발급 담당</text>
  <text x="360" y="215" text-anchor="middle" font-size="9" fill="#6e7681">Root CA 리스크 격리 · 온라인 운영</text>
  <text x="360" y="228" text-anchor="middle" font-size="9" fill="#58a6ff">Root CA가 신뢰를 위임한 기관</text>

  <!-- Intermediate CA → 서버 인증서 화살표 -->
  <line x1="360" y1="230" x2="360" y2="265" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-yellow-d)"/>
  <rect x="378" y="238" width="136" height="20" fill="#0d1117" rx="4"/>
  <text x="446" y="252" text-anchor="middle" font-size="9" fill="#58a6ff">Intermediate CA 개인키로 서명</text>

  <!-- ─── 서버 인증서 ─── -->
  <rect x="170" y="267" width="190" height="70" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="265" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#3fb950">서버 인증서</text>
  <text x="265" y="307" text-anchor="middle" font-size="10" fill="#6e7681">naver.com</text>
  <text x="265" y="322" text-anchor="middle" font-size="9" fill="#6e7681">도메인 + 공개키 + CA 서명</text>
  <text x="265" y="337" text-anchor="middle" font-size="9" fill="#3fb950">유효기간: ~13개월</text>

  <!-- ─── 브라우저 검증 박스 ─── -->
  <rect x="460" y="267" width="220" height="110" fill="#21262d" stroke="#8b949e" stroke-width="1.5" rx="8"/>
  <text x="570" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#8b949e">브라우저 검증</text>
  <text x="570" y="308" text-anchor="middle" font-size="9" fill="#6e7681">내장된 Root CA 공개키로</text>
  <text x="570" y="322" text-anchor="middle" font-size="9" fill="#6e7681">인증서 서명 검증</text>
  <text x="570" y="340" text-anchor="middle" font-size="9" fill="#3fb950">✓ 체인 유효 → 공개키 신뢰</text>
  <text x="570" y="356" text-anchor="middle" font-size="9" fill="#ef4444">✗ 체인 무효 → 경고 표시</text>
  <text x="570" y="370" text-anchor="middle" font-size="9" fill="#6e7681">CA 서버에 매번 조회하지 않음</text>

  <!-- 서버 인증서 → 브라우저 화살표 -->
  <line x1="360" y1="302" x2="456" y2="302" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr-blue-r)"/>
  <text x="408" y="296" text-anchor="middle" font-size="9" fill="#6e7681">인증서 전달</text>

  <!-- ─── 하단 설명 ─── -->
  <rect x="20" y="390" width="680" height="22" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="360" y="405" text-anchor="middle" font-size="9" fill="#6e7681">검증 경로: 서버 인증서 → Intermediate CA 인증서 → Root CA (브라우저 내장) — 체인 끝까지 서명이 유효하면 신뢰</text>

</svg>
