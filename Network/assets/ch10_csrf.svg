<svg width="720" height="300" viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
      text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }
    </style>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#30363d"/>
    </marker>
  </defs>

  <rect width="720" height="300" rx="12" fill="#0d1117"/>

  <!-- Divider -->
  <line x1="360" y1="28" x2="360" y2="278" stroke="#21262d" stroke-width="1.5"/>

  <!-- ── LEFT: CSRF 공격 ── -->
  <text x="178" y="22" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">SameSite 없음 — CSRF 공격 성공</text>

  <!-- evil.com box (left) -->
  <rect x="20" y="36" width="120" height="60" rx="8" fill="#2a1f1f" stroke="#f0883e" stroke-width="1.5"/>
  <text x="80" y="62" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="700">evil.com</text>
  <text x="80" y="80" text-anchor="middle" fill="#6e7681" font-size="9">JS 실행 중</text>

  <!-- Server box (left col) -->
  <rect x="220" y="36" width="120" height="60" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="280" y="58" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">mybank.com</text>
  <text x="280" y="76" text-anchor="middle" fill="#6e7681" font-size="9">서버</text>

  <!-- Arrow → (solid blue, cookie attached) -->
  <line x1="142" y1="66" x2="218" y2="66" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="180" y="57" text-anchor="middle" fill="#58a6ff" font-size="10">POST /transfer</text>
  <text x="180" y="80" text-anchor="middle" fill="#e3b341" font-size="9">Cookie 자동 첨부</text>

  <!-- Result box (left) -->
  <rect x="20" y="118" width="320" height="56" rx="8" fill="#2a1010" stroke="#ef4444" stroke-width="1.5"/>
  <text x="180" y="141" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">이체 실행됨</text>
  <text x="180" y="160" text-anchor="middle" fill="#6e7681" font-size="10">쿠키가 자동으로 붙어 서버가 정상 요청으로 판단</text>

  <!-- Caption (left) -->
  <rect x="20" y="192" width="320" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="180" y="213" text-anchor="middle" fill="#6e7681" font-size="10">SOP/CORS는 응답 읽기를 막는다</text>
  <text x="180" y="231" text-anchor="middle" fill="#6e7681" font-size="10">응답을 읽지 않아도</text>
  <text x="180" y="249" text-anchor="middle" fill="#ef4444" font-size="10">요청 자체가 서버에 도달하고 실행된다</text>

  <!-- ── RIGHT: SameSite 방어 ── -->
  <text x="542" y="22" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">SameSite=Strict — CSRF 차단</text>

  <!-- evil.com box (right) -->
  <rect x="380" y="36" width="120" height="60" rx="8" fill="#2a1f1f" stroke="#f0883e" stroke-width="1.5"/>
  <text x="440" y="62" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="700">evil.com</text>
  <text x="440" y="80" text-anchor="middle" fill="#6e7681" font-size="9">JS 실행 중</text>

  <!-- Server box (right col) -->
  <rect x="580" y="36" width="120" height="60" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="640" y="58" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">mybank.com</text>
  <text x="640" y="76" text-anchor="middle" fill="#6e7681" font-size="9">서버</text>

  <!-- Arrow → (dashed gray, no cookie) -->
  <line x1="502" y1="66" x2="578" y2="66" stroke="#30363d" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <text x="540" y="57" text-anchor="middle" fill="#8b949e" font-size="10">POST /transfer</text>
  <text x="540" y="80" text-anchor="middle" fill="#3fb950" font-size="9">쿠키 없음 (SameSite 차단)</text>

  <!-- X mark on arrow -->
  <circle cx="540" cy="66" r="10" fill="#0d1117" stroke="#ef4444" stroke-width="1.5"/>
  <text x="540" y="71" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">✕</text>

  <!-- Result box (right) -->
  <rect x="380" y="118" width="320" height="56" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="540" y="141" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">401 거절</text>
  <text x="540" y="160" text-anchor="middle" fill="#6e7681" font-size="10">쿠키 없음 — 서버가 인증 실패로 처리</text>

  <!-- Caption (right) -->
  <rect x="380" y="192" width="320" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="540" y="213" text-anchor="middle" fill="#6e7681" font-size="10">SameSite=Strict</text>
  <text x="540" y="231" text-anchor="middle" fill="#6e7681" font-size="10">다른 Site에서 시작된 요청에는</text>
  <text x="540" y="249" text-anchor="middle" fill="#3fb950" font-size="10">쿠키를 붙이지 않음</text>

  <!-- Bottom note -->
  <text x="360" y="288" text-anchor="middle" fill="#6e7681" font-size="10">CSRF 방어의 핵심은 쿠키 자동 첨부를 막는 것이다 — 응답 읽기와 무관</text>
</svg>
