<svg xmlns="http://www.w3.org/2000/svg" width="700" height="490" viewBox="0 0 700 490">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');</style>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f0883e"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto-reverse">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arr-gl" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto-reverse">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="arr-ol" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto-reverse">
      <polygon points="0 0, 8 3, 0 6" fill="#f0883e"/>
    </marker>
  </defs>
  <rect width="700" height="490" rx="12" fill="#0d1117"/>

  <!-- Actors at top -->
  <!-- 한국 사용자 -->
  <rect x="20" y="25" width="130" height="55" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="85" y="47" text-anchor="middle" fill="#58a6ff" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">한국 사용자</text>
  <text x="85" y="65" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">서울</text>

  <!-- CDN 서울 엣지 -->
  <rect x="270" y="25" width="160" height="55" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="350" y="47" text-anchor="middle" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">CDN 서울 엣지</text>
  <text x="350" y="65" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">PoP · 캐시 서버</text>

  <!-- Origin 서버 미국 -->
  <rect x="540" y="25" width="140" height="55" rx="8" fill="#2a1f1f" stroke="#f0883e" stroke-width="1.5"/>
  <text x="610" y="47" text-anchor="middle" fill="#f0883e" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">Origin 서버</text>
  <text x="610" y="65" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">미국 (원본)</text>

  <!-- Vertical timeline lines -->
  <line x1="85" y1="80" x2="85" y2="440" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="350" y1="80" x2="350" y2="440" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="610" y1="80" x2="610" y2="440" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== Cache Miss scenario ===== -->
  <text x="20" y="103" fill="#e3b341" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10" font-weight="700">CACHE MISS</text>

  <!-- Step 1: 사용자 → CDN, GET /image.png -->
  <line x1="90" y1="118" x2="342" y2="118" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="215" y="113" text-anchor="middle" fill="#58a6ff" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10" font-weight="700">GET /image.png</text>

  <!-- Step 2: CDN Cache Miss 표시 -->
  <rect x="295" y="130" width="110" height="26" rx="6" fill="#2a1f1f" stroke="#ef4444" stroke-width="1"/>
  <text x="350" y="148" text-anchor="middle" fill="#ef4444" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700">Cache Miss</text>

  <!-- Step 3: CDN → Origin, Origin Pull -->
  <line x1="358" y1="175" x2="602" y2="175" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <text x="480" y="170" text-anchor="middle" fill="#f0883e" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10" font-weight="700">Origin Pull</text>

  <!-- Step 4: Origin → CDN, 응답 전송 -->
  <line x1="602" y1="215" x2="358" y2="215" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-gl)"/>
  <text x="480" y="210" text-anchor="middle" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10" font-weight="700">응답 전송</text>

  <!-- CDN 저장 표시 -->
  <rect x="295" y="226" width="110" height="26" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1"/>
  <text x="350" y="244" text-anchor="middle" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700">캐시 저장</text>

  <!-- Step 5: CDN → 사용자, 응답 -->
  <line x1="342" y1="265" x2="93" y2="265" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="215" y="260" text-anchor="middle" fill="#58a6ff" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10" font-weight="700">응답 (140ms+)</text>

  <!-- Separator -->
  <line x1="30" y1="288" x2="670" y2="288" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="350" y="305" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">두 번째 이후 요청</text>

  <!-- ===== Cache Hit scenario ===== -->
  <text x="20" y="330" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10" font-weight="700">CACHE HIT</text>

  <!-- Step 6: 사용자 → CDN -->
  <line x1="90" y1="345" x2="342" y2="345" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="215" y="340" text-anchor="middle" fill="#58a6ff" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10" font-weight="700">GET /image.png</text>

  <!-- Step 7: CDN Cache Hit -->
  <rect x="295" y="357" width="110" height="26" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1"/>
  <text x="350" y="375" text-anchor="middle" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700">Cache Hit ✓</text>

  <!-- Note: Origin 서버 안 감 -->
  <text x="610" y="375" text-anchor="middle" fill="#30363d" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">요청 없음</text>

  <!-- Step 8: CDN → 사용자, 즉시 응답 -->
  <line x1="342" y1="400" x2="93" y2="400" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-gl)"/>
  <text x="215" y="395" text-anchor="middle" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10" font-weight="700">즉시 응답 (~5ms)</text>

  <!-- Bottom note -->
  <text x="350" y="455" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">TTL 만료 시 캐시 무효화 → 다시 Origin Pull · Cache-Control: max-age 연동</text>
</svg>
