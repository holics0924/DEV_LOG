<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>혼잡 제어 시뮬레이터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--s1:#1e293b;--s2:#162032;--bd:#334155;--tx:#e2e8f0;--mu:#64748b;--bl:#3b82f6;--gr:#10b981;--rd:#ef4444;--am:#f59e0b}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;padding:24px 16px 48px;max-width:860px;margin:0 auto}
h1{font-size:1.05rem;color:#cbd5e1;margin-bottom:4px}
.sub{font-size:.78rem;color:var(--mu);margin-bottom:20px}
canvas{display:block;width:100%;border-radius:8px;border:1px solid var(--bd);margin:16px 0;background:#0d1117}
.stats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat{flex:1;min-width:110px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;text-align:center}
.stat-label{font-size:.68rem;color:var(--mu);margin-bottom:4px}
.stat-val{font-size:1.15rem;font-weight:700;font-family:monospace}
.phase-badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:.75rem;font-weight:700;margin-bottom:12px}
.step-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:16px;min-height:60px}
.step-label{font-size:.68rem;font-weight:700;text-transform:uppercase;color:var(--mu);margin-bottom:6px;letter-spacing:.5px}
.step-desc{font-size:.88rem;color:#cbd5e1;line-height:1.65}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
button{padding:9px 18px;border-radius:7px;font-size:.83rem;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.btn-next{background:#3b82f6;color:#fff}
.btn-next:hover{background:#2563eb}
.btn-timeout{background:#450a0a;color:#fca5a5;border:1px solid #ef4444}
.btn-timeout:hover{background:#7f1d1d}
.btn-dupAck{background:#451a03;color:#fcd34d;border:1px solid #f59e0b}
.btn-dupAck:hover{background:#78350f}
.btn-reset{background:var(--s1);color:var(--mu);border:1px solid var(--bd)}
.btn-reset:hover{color:var(--tx)}
button:disabled{opacity:.4;cursor:not-allowed}
.legend{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;font-size:.75rem}
.leg{display:flex;align-items:center;gap:6px}
.leg-line{width:24px;height:3px;border-radius:2px}
</style>
</head>
<body>
<h1>혼잡 제어 시뮬레이터</h1>
<p class="sub">RTT마다 다음 단계 →, 혼잡 이벤트는 버튼으로 트리거</p>

<div class="legend">
  <div class="leg"><div class="leg-line" style="background:#10b981"></div><span style="color:#10b981">cwnd</span></div>
  <div class="leg"><div class="leg-line" style="background:#f59e0b;border-top:2px dashed #f59e0b;background:none"></div><span style="color:#f59e0b">ssthresh</span></div>
</div>

<canvas id="chart" height="220"></canvas>

<div class="stats">
  <div class="stat"><div class="stat-label">현재 cwnd</div><div class="stat-val" id="sCwnd" style="color:#10b981">1</div></div>
  <div class="stat"><div class="stat-label">ssthresh</div><div class="stat-val" id="sSsthresh" style="color:#f59e0b">8</div></div>
  <div class="stat"><div class="stat-label">RTT</div><div class="stat-val" id="sRtt" style="color:#94a3b8">0</div></div>
  <div class="stat"><div class="stat-label">페이즈</div><div class="stat-val" id="sPhase" style="color:#10b981;font-size:.85rem">Slow Start</div></div>
</div>

<div class="step-card">
  <div class="step-label">설명</div>
  <div class="step-desc" id="stepDesc">cwnd=1에서 시작. Slow Start 구간은 ACK마다 +1 MSS → RTT마다 2배 증가. ssthresh(8)에 도달하면 혼잡 회피로 전환된다.</div>
</div>

<div class="btn-row">
  <button class="btn-reset" onclick="reset()">↺</button>
  <button class="btn-next" id="btnNext" onclick="nextRtt()">다음 RTT →</button>
  <button class="btn-dupAck" id="btnDup" onclick="triggerDupAck()">중복 ACK 3개</button>
  <button class="btn-timeout" id="btnTimeout" onclick="triggerTimeout()">타임아웃</button>
</div>

<script>
let history = [{cwnd:1, ssthresh:8, event:'start'}];
let cwnd = 1, ssthresh = 8, rtt = 0;

const MAX_CWND = 20;
const CANVAS_H = 220;
const CANVAS_W_REF = 820;

function phase() {
  if(cwnd < ssthresh) return 'Slow Start';
  return '혼잡 회피 (CA)';
}

function phaseColor() {
  return cwnd < ssthresh ? '#10b981' : '#3b82f6';
}

function descFor(event) {
  if(event==='start') return 'cwnd=1에서 시작. Slow Start 구간은 ACK마다 +1 MSS → RTT마다 2배 증가. ssthresh(8)에 도달하면 혼잡 회피로 전환된다.';
  if(event==='slow_start') return `Slow Start: cwnd가 ${cwnd}로 증가. ssthresh(${ssthresh})보다 작으므로 계속 지수 증가.`;
  if(event==='enter_ca') return `ssthresh(${ssthresh})에 도달. 이제 혼잡 회피(CA) 구간 — RTT마다 +1 MSS 선형 증가.`;
  if(event==='ca') return `혼잡 회피: cwnd=${cwnd}. 선형 증가 중. 손실 이벤트가 없으면 계속 +1.`;
  if(event==='dup_ack') return `중복 ACK 3개 감지 (Fast Retransmit). ssthresh=${ssthresh}, cwnd=${cwnd}로 절반 감소. Slow Start 없이 혼잡 회피 바로 진입 (Fast Recovery).`;
  if(event==='timeout') return `타임아웃 발생. 심각한 혼잡. ssthresh=${ssthresh}, cwnd=1로 초기화. Slow Start 재시작.`;
  return '';
}

function nextRtt() {
  const prev = cwnd;
  if(cwnd < ssthresh) {
    cwnd = Math.min(cwnd * 2, ssthresh);
    const ev = cwnd >= ssthresh ? 'enter_ca' : 'slow_start';
    rtt++;
    history.push({cwnd, ssthresh, event: ev});
  } else {
    cwnd = Math.min(cwnd + 1, MAX_CWND);
    rtt++;
    history.push({cwnd, ssthresh, event:'ca'});
  }
  render();
}

function triggerDupAck() {
  ssthresh = Math.max(Math.floor(cwnd / 2), 1);
  cwnd = ssthresh;
  rtt++;
  history.push({cwnd, ssthresh, event:'dup_ack'});
  render();
}

function triggerTimeout() {
  ssthresh = Math.max(Math.floor(cwnd / 2), 1);
  cwnd = 1;
  rtt++;
  history.push({cwnd, ssthresh, event:'timeout'});
  render();
}

function reset() {
  history = [{cwnd:1, ssthresh:8, event:'start'}];
  cwnd=1; ssthresh=8; rtt=0;
  render();
}

function drawChart() {
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const W = canvas.clientWidth || 780;
  canvas.width = W;
  canvas.height = CANVAS_H;

  ctx.clearRect(0, 0, W, CANVAS_H);

  const PAD_L=46, PAD_R=16, PAD_T=16, PAD_B=36;
  const gW = W - PAD_L - PAD_R;
  const gH = CANVAS_H - PAD_T - PAD_B;

  const maxCwnd = Math.max(MAX_CWND, ...history.map(h=>h.cwnd)) + 2;
  const maxRtt = Math.max(history.length + 3, 15);

  function tx(i) { return PAD_L + (i / (maxRtt-1)) * gW; }
  function ty(v) { return PAD_T + gH - (v / maxCwnd) * gH; }

  // grid
  ctx.strokeStyle='#21262d'; ctx.lineWidth=0.5;
  for(let v=0; v<=maxCwnd; v+=2) {
    ctx.beginPath(); ctx.moveTo(PAD_L, ty(v)); ctx.lineTo(PAD_L+gW, ty(v)); ctx.stroke();
    ctx.fillStyle='#6e7681'; ctx.font='9px Segoe UI,sans-serif'; ctx.textAlign='right';
    ctx.fillText(v, PAD_L-4, ty(v)+3);
  }
  ctx.textAlign='center';
  for(let i=0; i<maxRtt; i+=2) {
    ctx.fillStyle='#6e7681'; ctx.fillText(i, tx(i), CANVAS_H-PAD_B+14);
  }

  // ssthresh line (dashed, per segment)
  for(let i=0; i<history.length-1; i++) {
    const ss = history[i].ssthresh;
    ctx.beginPath();
    ctx.setLineDash([5,3]);
    ctx.strokeStyle='#f59e0b'; ctx.lineWidth=1.2;
    ctx.moveTo(tx(i), ty(ss)); ctx.lineTo(tx(i+1), ty(ss));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // cwnd path
  ctx.beginPath();
  ctx.strokeStyle='#10b981'; ctx.lineWidth=2.5;
  history.forEach((h,i) => {
    if(i===0) ctx.moveTo(tx(0), ty(h.cwnd));
    else {
      const prev = history[i-1];
      // vertical drop lines for loss events
      if(h.event==='dup_ack'||h.event==='timeout') {
        ctx.lineTo(tx(i), ty(prev.cwnd));
        ctx.stroke();
        ctx.beginPath();
        ctx.strokeStyle='#ef4444'; ctx.lineWidth=1.5; ctx.setLineDash([3,2]);
        ctx.moveTo(tx(i), ty(prev.cwnd));
        ctx.lineTo(tx(i), ty(h.cwnd));
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.strokeStyle='#10b981'; ctx.lineWidth=2.5;
        ctx.moveTo(tx(i), ty(h.cwnd));
      } else {
        ctx.lineTo(tx(i), ty(h.cwnd));
      }
    }
  });
  ctx.stroke();

  // dots
  history.forEach((h,i) => {
    ctx.beginPath();
    const isLoss = h.event==='dup_ack'||h.event==='timeout';
    ctx.fillStyle = isLoss ? '#ef4444' : '#10b981';
    ctx.arc(tx(i), ty(h.cwnd), 4, 0, Math.PI*2);
    ctx.fill();
  });

  // axis labels
  ctx.fillStyle='#6e7681'; ctx.font='10px Segoe UI,sans-serif'; ctx.textAlign='center';
  ctx.fillText('RTT', PAD_L + gW/2, CANVAS_H-2);
  ctx.save(); ctx.translate(12, PAD_T+gH/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('cwnd (MSS)', 0, 0); ctx.restore();
}

function render() {
  const cur = history[history.length-1];
  document.getElementById('sCwnd').textContent = cwnd;
  document.getElementById('sSsthresh').textContent = ssthresh;
  document.getElementById('sRtt').textContent = rtt;
  document.getElementById('sPhase').textContent = phase();
  document.getElementById('sPhase').style.color = phaseColor();
  document.getElementById('stepDesc').textContent = descFor(cur.event);
  document.getElementById('btnNext').disabled = cwnd >= MAX_CWND;
  drawChart();
}

render();
window.addEventListener('resize', drawChart);
</script>
</body>
</html>
