<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');</style>
  </defs>

  <rect width="700" height="380" fill="#0d1117" rx="12"/>

  <!-- Header row background -->
  <rect x="15" y="15" width="670" height="40" fill="#161b22" rx="8"/>

  <!-- Column headers -->
  <text x="175" y="40" text-anchor="middle" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="13" font-weight="700" fill="#6e7681">항목</text>
  <rect x="355" y="20" width="150" height="30" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="6"/>
  <text x="430" y="40" text-anchor="middle" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="13" font-weight="700" fill="#3fb950">SSE</text>
  <rect x="520" y="20" width="150" height="30" fill="#2a2210" stroke="#e3b341" stroke-width="1.5" rx="6"/>
  <text x="595" y="40" text-anchor="middle" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="13" font-weight="700" fill="#e3b341">WebSocket</text>

  <!-- Divider -->
  <line x1="350" y1="55" x2="350" y2="365" stroke="#21262d" stroke-width="1"/>
  <line x1="515" y1="55" x2="515" y2="365" stroke="#21262d" stroke-width="1"/>

  <!-- Row 1: 통신 방향 -->
  <rect x="15" y="60" width="670" height="44" fill="#161b22" rx="0"/>
  <text x="175" y="86" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" font-weight="700" fill="#6e7681">통신 방향</text>
  <text x="430" y="82" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" fill="#3fb950">서버 → 클라이언트</text>
  <text x="430" y="97" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">단방향</text>
  <text x="595" y="82" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" fill="#e3b341">서버 ↔ 클라이언트</text>
  <text x="595" y="97" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">양방향</text>

  <!-- Row 2: 프로토콜 -->
  <rect x="15" y="104" width="670" height="44" fill="#0d1117" rx="0"/>
  <text x="175" y="130" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" font-weight="700" fill="#6e7681">프로토콜</text>
  <text x="430" y="126" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" fill="#3fb950">HTTP 그대로</text>
  <text x="430" y="141" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">응답이 끊기지 않는 HTTP</text>
  <text x="595" y="126" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" fill="#e3b341">HTTP → WebSocket 전환</text>
  <text x="595" y="141" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">101 Switching Protocols</text>

  <!-- Row 3: 방화벽 -->
  <rect x="15" y="148" width="670" height="44" fill="#161b22" rx="0"/>
  <text x="175" y="174" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" font-weight="700" fill="#6e7681">방화벽 호환성</text>
  <text x="430" y="170" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" fill="#3fb950">안전</text>
  <text x="430" y="185" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">순수 HTTP라 그대로 통과</text>
  <text x="595" y="170" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" fill="#e3b341">주의 필요</text>
  <text x="595" y="185" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">구형 프록시가 Upgrade 차단 가능</text>

  <!-- Row 4: 메시지 오버헤드 -->
  <rect x="15" y="192" width="670" height="44" fill="#0d1117" rx="0"/>
  <text x="175" y="218" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" font-weight="700" fill="#6e7681">메시지 오버헤드</text>
  <text x="430" y="214" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" fill="#3fb950">상대적으로 큼</text>
  <text x="430" y="229" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">HTTP 헤더 매번 포함</text>
  <text x="595" y="214" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" fill="#e3b341">경량</text>
  <text x="595" y="229" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">프레임 헤더 2~10바이트</text>

  <!-- Row 5: 구현 복잡도 -->
  <rect x="15" y="236" width="670" height="44" fill="#161b22" rx="0"/>
  <text x="175" y="262" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" font-weight="700" fill="#6e7681">구현 복잡도</text>
  <text x="430" y="258" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" fill="#3fb950">낮음</text>
  <text x="430" y="273" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">기본 HTTP 기능으로 충분</text>
  <text x="595" y="258" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" fill="#e3b341">높음</text>
  <text x="595" y="273" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">연결 상태 관리, heartbeat 등</text>

  <!-- Row 6: 적합한 상황 -->
  <rect x="15" y="280" width="670" height="55" fill="#0d1117" rx="0"/>
  <text x="175" y="312" text-anchor="middle" font-family="Nunito,sans-serif" font-size="11" font-weight="700" fill="#6e7681">적합한 상황</text>
  <text x="430" y="300" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#3fb950">알림 · 주식 시세 · 뉴스 피드</text>
  <text x="430" y="316" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">서버→클라이언트 단방향으로 충분한 경우</text>
  <text x="595" y="300" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#e3b341">채팅 · 게임 · 협업 편집</text>
  <text x="595" y="316" text-anchor="middle" font-family="Nunito,sans-serif" font-size="10" fill="#6e7681">양방향 실시간 통신이 필요한 경우</text>

  <!-- Bottom border -->
  <rect x="15" y="335" width="670" height="30" fill="#161b22" rx="0" opacity="0.5"/>
  <text x="350" y="355" text-anchor="middle" font-family="Nunito,sans-serif" font-size="9" fill="#6e7681">단방향으로 충분하면 SSE · 양방향이 필요하면 WebSocket</text>

  <!-- Outer border -->
  <rect x="15" y="15" width="670" height="350" fill="none" stroke="#21262d" stroke-width="1" rx="8"/>
</svg>
