<svg xmlns="http://www.w3.org/2000/svg" width="760" height="205" viewBox="0 0 760 205">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');</style>
    <marker id="h-arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="h-arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="h-arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6e7681"/>
    </marker>
  </defs>

  <rect width="760" height="205" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">DNS 조회 흐름</text>

  <!-- 브라우저 -->
  <rect x="10" y="45" width="108" height="70" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="64" y="68" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">브라우저</text>
  <text x="64" y="86" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">로컬 캐시</text>
  <text x="64" y="103" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">MISS → 리졸버</text>

  <!-- 로컬 리졸버 -->
  <rect x="163" y="45" width="118" height="70" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="222" y="68" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">로컬 리졸버</text>
  <text x="222" y="86" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">8.8.8.8 · 1.1.1.1</text>
  <text x="222" y="103" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">캐싱 + 대신 조회</text>

  <!-- 루트 DNS -->
  <rect x="336" y="45" width="108" height="70" fill="#2a2210" stroke="#e3b341" stroke-width="1.5" rx="8"/>
  <text x="390" y="68" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">루트 DNS</text>
  <text x="390" y="86" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">13개 클러스터</text>
  <text x="390" y="103" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">TLD 위치 알려줌</text>

  <!-- TLD DNS -->
  <rect x="499" y="45" width="98" height="70" fill="#2a1f1f" stroke="#f0883e" stroke-width="1.5" rx="8"/>
  <text x="548" y="68" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">TLD DNS</text>
  <text x="548" y="86" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">.com · .kr</text>
  <text x="548" y="103" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">권한 DNS 알려줌</text>

  <!-- 권한 DNS -->
  <rect x="652" y="45" width="100" height="70" fill="#1c2d3a" stroke="#79c0ff" stroke-width="1.5" rx="8"/>
  <text x="702" y="68" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">권한 DNS</text>
  <text x="702" y="86" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">ns1.google.com</text>
  <text x="702" y="103" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">실제 IP 보유</text>

  <!-- Query arrows (y=58, in gaps, going right) -->
  <line x1="118" y1="58" x2="161" y2="58" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#h-arr-b)"/>
  <line x1="281" y1="58" x2="334" y2="58" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#h-arr-g)"/>
  <line x1="444" y1="58" x2="497" y2="58" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#h-arr-g)"/>
  <line x1="597" y1="58" x2="650" y2="58" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#h-arr-g)"/>

  <!-- Arrow labels -->
  <text x="140" y="52" text-anchor="middle" fill="#58a6ff" font-size="9" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">재귀</text>
  <text x="308" y="52" text-anchor="middle" fill="#3fb950" font-size="9" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">반복</text>

  <!-- Response arrows (y=130, below boxes, going left) -->
  <line x1="650" y1="130" x2="285" y2="130" stroke="#6e7681" stroke-width="1.5" marker-end="url(#h-arr-gray)"/>
  <line x1="161" y1="130" x2="120" y2="130" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#h-arr-b)"/>
  <text x="468" y="148" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">142.250.x.x  +  TTL</text>

  <!-- Legend -->
  <line x1="20" y1="178" x2="50" y2="178" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="56" y="182" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">재귀적 조회</text>
  <line x1="145" y1="178" x2="175" y2="178" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="181" y="182" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">반복적 조회</text>
  <line x1="270" y1="178" x2="300" y2="178" stroke="#6e7681" stroke-width="1.5"/>
  <text x="306" y="182" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">IP 반환</text>
</svg>
