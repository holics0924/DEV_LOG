<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#334155"/>
    </marker>
  </defs>
  <rect width="720" height="380" rx="12" fill="#0d1117"/>

  <!-- Divider -->
  <line x1="360" y1="20" x2="360" y2="360" stroke="#21262d" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ===== LEFT: L4 ===== -->

  <!-- Title -->
  <rect x="20" y="20" width="320" height="45" rx="8" fill="#2a2210" stroke="#e3b341" stroke-width="1.5"/>
  <text x="180" y="40" text-anchor="middle" fill="#e3b341" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="13" font-weight="700">L4 로드밸런서</text>
  <text x="180" y="57" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">Transport Layer</text>

  <!-- Packet info box -->
  <rect x="40" y="85" width="280" height="145" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="105" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10" font-weight="700">PACKET</text>

  <!-- Visible fields -->
  <rect x="55" y="112" width="250" height="28" rx="5" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1"/>
  <text x="70" y="121" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9">IP</text>
  <text x="130" y="128" fill="#58a6ff" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">192.168.1.100</text>

  <rect x="55" y="146" width="250" height="28" rx="5" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1"/>
  <text x="70" y="155" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9">Port</text>
  <text x="130" y="162" fill="#58a6ff" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">443</text>

  <!-- Blocked HTTP fields -->
  <rect x="55" y="180" width="250" height="42" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="70" y="195" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9">HTTP</text>
  <text x="130" y="195" fill="#30363d" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">█████████████████</text>
  <text x="130" y="213" fill="#30363d" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">███████████</text>
  <text x="180" y="232" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9">읽지 않음</text>

  <!-- Decision box L4 -->
  <rect x="55" y="248" width="250" height="45" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="180" y="267" text-anchor="middle" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">라우팅 결정</text>
  <text x="180" y="283" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">IP · Port 기반 (Round Robin 등)</text>

  <!-- L4 note -->
  <text x="180" y="320" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">빠름 · URL 기반 라우팅 불가</text>

  <!-- ===== RIGHT: L7 ===== -->

  <!-- Title -->
  <rect x="380" y="20" width="320" height="45" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="540" y="40" text-anchor="middle" fill="#58a6ff" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="13" font-weight="700">L7 로드밸런서</text>
  <text x="540" y="57" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">Application Layer</text>

  <!-- Packet info box -->
  <rect x="400" y="85" width="300" height="145" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="420" y="105" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10" font-weight="700">HTTP REQUEST</text>

  <!-- Visible IP/Port -->
  <rect x="415" y="112" width="270" height="24" rx="5" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1"/>
  <text x="430" y="121" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9">IP / Port</text>
  <text x="510" y="128" fill="#58a6ff" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700">192.168.1.100 : 443</text>

  <!-- Visible HTTP fields -->
  <rect x="415" y="141" width="270" height="24" rx="5" fill="#1a3a27" stroke="#3fb950" stroke-width="1"/>
  <text x="430" y="150" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9">Method/Path</text>
  <text x="510" y="157" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700">GET /api/users</text>

  <rect x="415" y="170" width="270" height="24" rx="5" fill="#1a3a27" stroke="#3fb950" stroke-width="1"/>
  <text x="430" y="179" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9">Host</text>
  <text x="510" y="186" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700">api.example.com</text>

  <rect x="415" y="199" width="270" height="24" rx="5" fill="#1a3a27" stroke="#3fb950" stroke-width="1"/>
  <text x="430" y="208" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="9">Cookie</text>
  <text x="510" y="215" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700">session=abc123...</text>

  <!-- Decision box L7 -->
  <rect x="415" y="248" width="270" height="60" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="550" y="267" text-anchor="middle" fill="#3fb950" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="700">콘텐츠 기반 라우팅</text>
  <text x="550" y="283" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">/api/* → API 서버 클러스터</text>
  <text x="550" y="298" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">/images/* → 이미지 서버</text>

  <!-- L7 note -->
  <text x="540" y="330" text-anchor="middle" fill="#6e7681" font-family="Nunito,'Trebuchet MS',Arial,sans-serif" font-size="10">URL · 헤더 · 쿠키 기반 분산 · Nginx · AWS ALB</text>
</svg>
