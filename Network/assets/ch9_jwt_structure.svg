<svg width="720" height="300" viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
      text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }
    </style>
  </defs>

  <rect width="720" height="300" rx="12" fill="#0d1117"/>

  <!-- 제목 -->
  <text x="360" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="#6e7681">JWT 구조</text>

  <!-- 토큰 문자열 배경 -->
  <rect x="20" y="48" width="680" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- 헤더 부분 -->
  <rect x="22" y="50" width="190" height="36" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="117" y="65" text-anchor="middle" font-size="9" fill="#58a6ff" font-weight="700">eyJhbGciOiJIUzI1NiJ9</text>
  <text x="117" y="79" text-anchor="middle" font-size="9" fill="#6e7681">헤더 (Base64)</text>

  <!-- 점 구분자 1 -->
  <text x="217" y="72" text-anchor="middle" font-size="16" font-weight="700" fill="#6e7681">.</text>

  <!-- 페이로드 부분 -->
  <rect x="226" y="50" width="250" height="36" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="351" y="65" text-anchor="middle" font-size="9" fill="#3fb950" font-weight="700">eyJ1c2VyX2lkIjo0Miwicm9sZSI6InVzZXIifQ</text>
  <text x="351" y="79" text-anchor="middle" font-size="9" fill="#6e7681">페이로드 (Base64)</text>

  <!-- 점 구분자 2 -->
  <text x="481" y="72" text-anchor="middle" font-size="16" font-weight="700" fill="#6e7681">.</text>

  <!-- 서명 부분 -->
  <rect x="490" y="50" width="208" height="36" rx="6" fill="#2a2210" stroke="#e3b341" stroke-width="1.5"/>
  <text x="594" y="65" text-anchor="middle" font-size="9" fill="#e3b341" font-weight="700">SflKxwRJSMeKKF2QT4fwpMeJf36P</text>
  <text x="594" y="79" text-anchor="middle" font-size="9" fill="#6e7681">서명 (HMAC-SHA256)</text>

  <!-- 헤더 상세 -->
  <rect x="20" y="120" width="200" height="60" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="120" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#58a6ff">헤더</text>
  <text x="120" y="158" text-anchor="middle" font-size="10" fill="#8b949e">{ "alg": "HS256",</text>
  <text x="120" y="172" text-anchor="middle" font-size="10" fill="#8b949e">  "typ": "JWT" }</text>

  <!-- 페이로드 상세 -->
  <rect x="255" y="120" width="210" height="76" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="360" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#3fb950">페이로드</text>
  <text x="360" y="158" text-anchor="middle" font-size="10" fill="#8b949e">{ "user_id": 42,</text>
  <text x="360" y="172" text-anchor="middle" font-size="10" fill="#8b949e">  "role": "user",</text>
  <text x="360" y="186" text-anchor="middle" font-size="10" fill="#8b949e">  "exp": 1750000000 }</text>

  <!-- 서명 상세 -->
  <rect x="498" y="120" width="202" height="76" rx="8" fill="#2a2210" stroke="#e3b341" stroke-width="1.5"/>
  <text x="599" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#e3b341">서명</text>
  <text x="599" y="158" text-anchor="middle" font-size="10" fill="#8b949e">HMAC_SHA256(</text>
  <text x="599" y="172" text-anchor="middle" font-size="10" fill="#8b949e">  헤더 + "." + 페이로드,</text>
  <text x="599" y="186" text-anchor="middle" font-size="10" fill="#8b949e">  비밀 키 )</text>

  <!-- 연결선 -->
  <line x1="117" y1="86" x2="117" y2="118" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="360" y1="86" x2="360" y2="118" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="594" y1="86" x2="594" y2="118" stroke="#e3b341" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 하단 설명 -->
  <rect x="20" y="218" width="680" height="62" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="360" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#8b949e">핵심: 페이로드는 Base64 인코딩 — 누구든 디코딩하면 읽힌다 (암호화 아님)</text>
  <text x="360" y="256" text-anchor="middle" font-size="10" fill="#6e7681">서명은 위조 방지 용도. 서버는 서명을 복호화하는 것이 아니라 재계산 후 대조한다.</text>
  <text x="360" y="272" text-anchor="middle" font-size="10" fill="#6e7681">비밀 키 없이는 올바른 서명을 만들 수 없어 페이로드를 바꿀 수 없다.</text>
</svg>
