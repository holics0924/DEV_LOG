<svg width="800" height="460" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
    text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  </defs>

  <rect width="800" height="460" fill="#0d1117" rx="12"/>
  <text x="400" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">TLS Handshake 흐름</text>

  <!-- 클라이언트 / 서버 라벨 -->
  <rect x="18" y="38" width="160" height="36" fill="#21262d" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <text x="98" y="61" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="700">클라이언트</text>
  <rect x="622" y="38" width="160" height="36" fill="#21262d" rx="8" stroke="#30363d" stroke-width="1.5"/>
  <text x="702" y="61" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="700">서버</text>

  <!-- 타임라인 -->
  <line x1="98" y1="74" x2="98" y2="434" stroke="#30363d" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="702" y1="74" x2="702" y2="434" stroke="#30363d" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ===== TCP 블록 ===== -->
  <rect x="98" y="84" width="604" height="44" fill="#21262d" rx="6" stroke="#8b949e" stroke-width="1"/>
  <text x="400" y="111" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="700">TCP 3-way Handshake</text>
  <text x="720" y="111" fill="#6e7681" font-size="11">1 RTT</text>

  <!-- ===== TLS Handshake ===== -->
  <text x="30" y="160" fill="#3d7db8" font-size="10" font-weight="700">TLS</text>

  <!-- Client Hello → -->
  <line x1="108" y1="168" x2="690" y2="168" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="690,163 702,168 690,173" fill="#58a6ff"/>
  <text x="400" y="160" text-anchor="middle" fill="#58a6ff" font-size="12">Client Hello  —  지원하는 암호화 방식 목록</text>

  <!-- ← Server Hello + 인증서 -->
  <line x1="692" y1="210" x2="110" y2="210" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="110,205 98,210 110,215" fill="#58a6ff"/>
  <text x="400" y="202" text-anchor="middle" fill="#58a6ff" font-size="12">Server Hello + 인증서  (공개키 포함)</text>

  <!-- 클라이언트 검증 -->
  <rect x="108" y="222" width="186" height="24" fill="#0d1b2e" rx="5" stroke="#2d5480" stroke-width="1"/>
  <text x="201" y="238" text-anchor="middle" fill="#6e7681" font-size="10">CA 서명 검증 → 공개키 확인</text>

  <!-- 대칭키 → -->
  <line x1="108" y1="266" x2="690" y2="266" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="690,261 702,266 690,271" fill="#58a6ff"/>
  <text x="400" y="258" text-anchor="middle" fill="#58a6ff" font-size="12">대칭키  (서버 공개키로 암호화해서 전송)</text>

  <!-- 서버 복호화 -->
  <rect x="506" y="278" width="186" height="24" fill="#0d1b2e" rx="5" stroke="#2d5480" stroke-width="1"/>
  <text x="599" y="294" text-anchor="middle" fill="#6e7681" font-size="10">개인키로 복호화 → 대칭키 획득</text>

  <!-- ← Finished -->
  <line x1="692" y1="322" x2="110" y2="322" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="110,317 98,322 110,327" fill="#58a6ff"/>
  <text x="400" y="314" text-anchor="middle" fill="#58a6ff" font-size="12">Finished  —  이제 양쪽 모두 대칭키 보유</text>

  <!-- TLS RTT 브라켓 -->
  <line x1="752" y1="168" x2="762" y2="168" stroke="#6e7681" stroke-width="1"/>
  <line x1="762" y1="168" x2="762" y2="322" stroke="#6e7681" stroke-width="1"/>
  <line x1="752" y1="322" x2="762" y2="322" stroke="#6e7681" stroke-width="1"/>
  <text x="768" y="241" fill="#6e7681" font-size="10" font-weight="700">~1</text>
  <text x="768" y="255" fill="#6e7681" font-size="10" font-weight="700">RTT</text>

  <!-- ===== HTTP 통신 ===== -->
  <text x="30" y="370" fill="#286e40" font-size="10" font-weight="700">HTTP</text>

  <!-- 양방향 통신 -->
  <line x1="108" y1="378" x2="690" y2="378" stroke="#3fb950" stroke-width="2"/>
  <polygon points="690,373 702,378 690,383" fill="#3fb950"/>
  <line x1="692" y1="404" x2="110" y2="404" stroke="#3fb950" stroke-width="2"/>
  <polygon points="110,399 98,404 110,409" fill="#3fb950"/>
  <text x="400" y="370" text-anchor="middle" fill="#3fb950" font-size="12">HTTP 요청  (대칭키로 암호화)</text>
  <text x="400" y="396" text-anchor="middle" fill="#3fb950" font-size="12">HTTP 응답  (대칭키로 암호화)</text>

  <!-- 하단 설명 -->
  <text x="400" y="446" text-anchor="middle" fill="#6e7681" font-size="10">도청해도 대칭키 없으면 읽기 불가  ✓</text>
</svg>
