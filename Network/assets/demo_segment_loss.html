<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>세그먼트 유실 — Fast Retransmit</title>
<style>
  :root { --bg:#0f172a; --s1:#1e293b; --bd:#334155; --tx:#e2e8f0; --mu:#64748b; --bl:#3b82f6; --gr:#10b981; --rd:#ef4444; --am:#f59e0b; --pu:#d2a8ff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--tx); font-family:'Segoe UI',system-ui,sans-serif; padding:24px 16px 48px; max-width:860px; margin:0 auto; }
  h1 { font-size:1.1rem; color:#cbd5e1; margin-bottom:6px; }
  p.sub { font-size:.78rem; color:var(--mu); margin-bottom:20px; }
  svg { display:block; width:100%; }
  .dup-counter { display:flex; align-items:center; gap:12px; background:var(--s1); border:1px solid var(--bd); border-radius:8px; padding:10px 16px; margin:12px 0; }
  .dup-label { font-size:.75rem; color:var(--mu); }
  .dup-dots { display:flex; gap:8px; }
  .dot { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:700; border:2px solid; transition:all .3s; }
  .dot-empty { background:#1e293b; border-color:#334155; color:#64748b; }
  .dot-filled { background:#451a03; border-color:#f59e0b; color:#fcd34d; }
  .dot-trigger { background:#450a0a; border-color:#ef4444; color:#fca5a5; transform:scale(1.15); }
  .dup-msg { font-size:.78rem; color:var(--mu); margin-left:4px; transition:color .3s; }
  .step-card { background:var(--s1); border:1px solid var(--bd); border-radius:10px; padding:14px 18px; margin:12px 0; min-height:64px; }
  .step-label { font-size:.68rem; font-weight:700; text-transform:uppercase; color:var(--mu); margin-bottom:6px; letter-spacing:.5px; }
  .step-desc { font-size:.88rem; color:#cbd5e1; line-height:1.65; }
  .btns { display:flex; gap:10px; }
  button { padding:9px 18px; border-radius:7px; font-size:.85rem; font-weight:700; cursor:pointer; border:none; font-family:inherit; }
  .btn-next { background:var(--bl); color:#fff; }
  .btn-next:disabled { background:#334155; color:#64748b; cursor:not-allowed; }
  .btn-reset { background:var(--s1); color:var(--mu); border:1px solid var(--bd); }
</style>
</head>
<body>
<h1>세그먼트 유실 → Fast Retransmit</h1>
<p class="sub">중복 ACK 3개 누적 시 타임아웃 없이 즉시 재전송 — 패킷 흐름을 단계별로 확인한다</p>

<svg id="diagram" viewBox="0 0 700 480" style="height:480px">
  <defs>
    <marker id="a-data" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="a-ack" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="a-dup" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="a-dup3" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="a-retrans" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d2a8ff"/>
    </marker>
  </defs>

  <!-- 서버 (왼쪽) -->
  <rect x="10" y="10" width="130" height="34" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="6"/>
  <text x="75" y="32" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">서버</text>

  <!-- 클라이언트 (오른쪽) -->
  <rect x="560" y="10" width="130" height="34" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5" rx="6"/>
  <text x="625" y="32" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#58a6ff" text-anchor="middle">클라이언트</text>

  <!-- 타임라인 -->
  <line x1="75" y1="44" x2="75" y2="470" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,3" opacity="0.25"/>
  <line x1="625" y1="44" x2="625" y2="470" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3" opacity="0.25"/>

  <!-- g0: seg 1 전송 (서버→클라이언트) -->
  <g id="g0" opacity="0" style="transition:opacity .4s">
    <line x1="75" y1="65" x2="610" y2="80" stroke="#3b82f6" stroke-width="2" marker-end="url(#a-data)"/>
    <text x="350" y="61" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#3b82f6" text-anchor="middle">seq=0 (1~1459 byte)</text>
  </g>

  <!-- g1: seg 2 전송 -->
  <g id="g1" opacity="0" style="transition:opacity .4s">
    <line x1="75" y1="96" x2="610" y2="111" stroke="#3b82f6" stroke-width="2" marker-end="url(#a-data)"/>
    <text x="350" y="92" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#3b82f6" text-anchor="middle">seq=1460 (1460~2919 byte)</text>
  </g>

  <!-- g2: seg 3 유실 (점선 + X) -->
  <g id="g2" opacity="0" style="transition:opacity .4s">
    <line x1="75" y1="127" x2="350" y2="135" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="350" y="123" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">seq=2920 ✗ 라우터에서 드랍</text>
    <text x="352" y="142" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#ef4444" text-anchor="middle">✗</text>
  </g>

  <!-- g3: seg 4 전송 -->
  <g id="g3" opacity="0" style="transition:opacity .4s">
    <line x1="75" y1="158" x2="610" y2="173" stroke="#3b82f6" stroke-width="2" marker-end="url(#a-data)"/>
    <text x="350" y="154" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#3b82f6" text-anchor="middle">seq=4380 (4380~5839 byte)</text>
  </g>

  <!-- g4: seg 5 전송 -->
  <g id="g4" opacity="0" style="transition:opacity .4s">
    <line x1="75" y1="186" x2="610" y2="201" stroke="#3b82f6" stroke-width="2" marker-end="url(#a-data)"/>
    <text x="350" y="182" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#3b82f6" text-anchor="middle">seq=5840 (5840~7299 byte)</text>
  </g>

  <!-- g5: ACK=1460 (정상) -->
  <g id="g5" opacity="0" style="transition:opacity .4s">
    <line x1="625" y1="218" x2="90" y2="233" stroke="#10b981" stroke-width="2" marker-end="url(#a-ack)"/>
    <text x="350" y="214" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#10b981" text-anchor="middle">ACK num=1460 (seg 1 확인)</text>
  </g>

  <!-- g6: ACK=2920 (정상) -->
  <g id="g6" opacity="0" style="transition:opacity .4s">
    <line x1="625" y1="246" x2="90" y2="261" stroke="#10b981" stroke-width="2" marker-end="url(#a-ack)"/>
    <text x="350" y="242" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#10b981" text-anchor="middle">ACK num=2920 (seg 2 확인)</text>
  </g>

  <!-- g7: 중복 ACK #1 -->
  <g id="g7" opacity="0" style="transition:opacity .4s">
    <line x1="625" y1="278" x2="90" y2="293" stroke="#f59e0b" stroke-width="2" marker-end="url(#a-dup)"/>
    <text x="350" y="274" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle">ACK num=2920 (seg 4 받았지만 3 없음) ← 중복 #1</text>
  </g>

  <!-- g8: 중복 ACK #2 -->
  <g id="g8" opacity="0" style="transition:opacity .4s">
    <line x1="625" y1="308" x2="90" y2="323" stroke="#f59e0b" stroke-width="2" marker-end="url(#a-dup)"/>
    <text x="350" y="304" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle">ACK num=2920 (seg 5 받았지만 3 없음) ← 중복 #2</text>
  </g>

  <!-- g9: 중복 ACK #3 (트리거) -->
  <g id="g9" opacity="0" style="transition:opacity .4s">
    <line x1="625" y1="338" x2="90" y2="353" stroke="#ef4444" stroke-width="2.5" marker-end="url(#a-dup3)"/>
    <text x="350" y="334" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">ACK num=2920 ← 중복 #3 🚨 Fast Retransmit 발동</text>
  </g>

  <!-- g10: seg 3 재전송 -->
  <g id="g10" opacity="0" style="transition:opacity .4s">
    <line x1="75" y1="380" x2="610" y2="395" stroke="#d2a8ff" stroke-width="2.5" marker-end="url(#a-retrans)"/>
    <text x="350" y="376" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#d2a8ff" text-anchor="middle">seq=2920 재전송 (타임아웃 없이 즉시)</text>
  </g>

  <!-- g11: ACK=7300 (최종) -->
  <g id="g11" opacity="0" style="transition:opacity .4s">
    <line x1="625" y1="420" x2="90" y2="435" stroke="#10b981" stroke-width="2.5" marker-end="url(#a-ack)"/>
    <text x="350" y="416" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#10b981" text-anchor="middle">ACK num=7300 (전체 확인 — 버퍼에 대기 중이던 4, 5 포함)</text>
  </g>

  <!-- 상태 텍스트 -->
  <text id="st-server" x="75" y="472" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">대기 중</text>
  <text id="st-client" x="625" y="472" font-family="'Segoe UI',sans-serif" font-size="10" fill="#64748b" text-anchor="middle">대기 중</text>
</svg>

<div class="dup-counter">
  <span class="dup-label">중복 ACK</span>
  <div class="dup-dots">
    <div class="dot dot-empty" id="dot0">1</div>
    <div class="dot dot-empty" id="dot1">2</div>
    <div class="dot dot-empty" id="dot2">3</div>
  </div>
  <span class="dup-msg" id="dupMsg">3개 누적 시 Fast Retransmit</span>
</div>

<div class="step-card">
  <div class="step-label">현재 단계</div>
  <div class="step-desc" id="desc">다음 단계 버튼을 눌러 패킷 흐름을 시작한다.</div>
</div>

<div class="btns">
  <button class="btn-reset" onclick="reset()">↺</button>
  <button class="btn-next" id="btn" onclick="next()">다음 단계 →</button>
</div>

<script>
const steps = [
  { id:'g0', dots:[0,0,0], sv:'전송 중', cl:'수신 대기', svC:'#f59e0b', clC:'#64748b',
    desc:'서버가 세그먼트 1을 전송한다. seq=0, 바이트 0~1459. cwnd가 충분하므로 ACK 없이 다음 세그먼트도 계속 보낼 수 있다.' },
  { id:'g1', dots:[0,0,0], sv:'전송 중', cl:'수신 중', svC:'#f59e0b', clC:'#f59e0b',
    desc:'세그먼트 2 전송. seq=1460. 서버는 세그먼트 3도 바로 전송하지만 라우터 큐에서 드랍된다.' },
  { id:'g2', dots:[0,0,0], sv:'전송 중', cl:'seg 3 대기', svC:'#f59e0b', clC:'#ef4444',
    desc:'세그먼트 3(seq=2920)이 네트워크에서 드랍됐다. 클라이언트는 받지 못했지만, 서버는 아직 이 사실을 모른다. 세그먼트 4, 5 전송은 계속된다.' },
  { id:'g3', dots:[0,0,0], sv:'전송 중', cl:'seg 3 대기', svC:'#f59e0b', clC:'#ef4444',
    desc:'세그먼트 4 전송. 클라이언트는 4를 수신하지만 3이 없어서 수신 버퍼에 쌓아두고 대기한다.' },
  { id:'g4', dots:[0,0,0], sv:'전송 중', cl:'seg 3 대기', svC:'#f59e0b', clC:'#ef4444',
    desc:'세그먼트 5 전송. 마찬가지로 클라이언트 수신 버퍼에 보관. ACK num은 여전히 2920에서 멈춰있다.' },
  { id:'g5', dots:[0,0,0], sv:'ACK 수신', cl:'ACK 전송 중', svC:'#10b981', clC:'#f59e0b',
    desc:'클라이언트가 세그먼트 1에 대한 ACK를 보낸다. ACK num=1460: "0~1459 받았어, 다음엔 1460번 줘." 정상 응답이다.' },
  { id:'g6', dots:[0,0,0], sv:'ACK 수신', cl:'ACK 전송 중', svC:'#10b981', clC:'#f59e0b',
    desc:'세그먼트 2에 대한 ACK. ACK num=2920. 여기까지는 정상이다. 이제 세그먼트 3이 없어서 ACK num이 더 이상 올라가지 않는다.' },
  { id:'g7', dots:[1,0,0], sv:'중복 ACK 감지', cl:'중복 ACK 전송', svC:'#f59e0b', clC:'#f59e0b',
    desc:'세그먼트 4가 도착했지만 3이 없다. 클라이언트는 ACK num을 2920에서 올릴 수 없다. ACK num=2920을 다시 전송한다. 중복 ACK 1번째.' },
  { id:'g8', dots:[1,1,0], sv:'중복 ACK #2', cl:'중복 ACK 전송', svC:'#f59e0b', clC:'#f59e0b',
    desc:'세그먼트 5도 도착했지만 여전히 3이 없다. 다시 ACK num=2920. 중복 ACK 2번째. 1~2개는 패킷 순서가 일시적으로 바뀐 reordering일 수도 있어서 아직 대기한다.' },
  { id:'g9', dots:[1,1,1], sv:'Fast Retransmit!', cl:'중복 ACK #3', svC:'#ef4444', clC:'#ef4444',
    desc:'중복 ACK 3번째. 이 정도면 reordering이 아닌 유실이다. 서버는 타임아웃(수백 ms)을 기다리지 않고 즉시 세그먼트 3을 재전송한다. Fast Retransmit.', trigger:true },
  { id:'g10', dots:[1,1,1], sv:'재전송 완료', cl:'seg 3 수신', svC:'#d2a8ff', clC:'#d2a8ff',
    desc:'서버가 세그먼트 3(seq=2920)을 즉시 재전송한다. 동시에 ssthresh = cwnd/2, cwnd = ssthresh로 설정하고 혼잡 회피 구간으로 진입한다 (Fast Recovery).' },
  { id:'g11', dots:[1,1,1], sv:'전송 완료', cl:'수신 완료', svC:'#10b981', clC:'#10b981',
    desc:'클라이언트가 세그먼트 3을 수신하자마자 수신 버퍼에 대기 중이던 4, 5가 한꺼번에 확인된다. ACK num=7300으로 점프. 누적 ACK 덕분이다.' },
];

let cur = -1;
const ALL_IDS = ['g0','g1','g2','g3','g4','g5','g6','g7','g8','g9','g10','g11'];

function next() {
  cur++;
  const s = steps[cur];
  document.getElementById(s.id).style.opacity = '1';
  document.getElementById('desc').textContent = s.desc;
  document.getElementById('st-server').textContent = s.sv;
  document.getElementById('st-server').setAttribute('fill', s.svC);
  document.getElementById('st-client').textContent = s.cl;
  document.getElementById('st-client').setAttribute('fill', s.clC);
  for (let i = 0; i < 3; i++) {
    const d = document.getElementById('dot' + i);
    d.className = 'dot ' + (s.dots[i] === 0 ? 'dot-empty' : (s.trigger && i === 2 ? 'dot-trigger' : 'dot-filled'));
  }
  const dm = document.getElementById('dupMsg');
  if (s.trigger) { dm.textContent = '🚨 Fast Retransmit 발동'; dm.style.color = '#ef4444'; }
  else { dm.textContent = '3개 누적 시 Fast Retransmit'; dm.style.color = 'var(--mu)'; }
  if (cur >= steps.length - 1) document.getElementById('btn').disabled = true;
}

function reset() {
  cur = -1;
  ALL_IDS.forEach(id => document.getElementById(id).style.opacity = '0');
  document.getElementById('desc').textContent = '다음 단계 버튼을 눌러 패킷 흐름을 시작한다.';
  document.getElementById('st-server').textContent = '대기 중';
  document.getElementById('st-server').setAttribute('fill','#64748b');
  document.getElementById('st-client').textContent = '대기 중';
  document.getElementById('st-client').setAttribute('fill','#64748b');
  for (let i = 0; i < 3; i++) document.getElementById('dot' + i).className = 'dot dot-empty';
  document.getElementById('dupMsg').textContent = '3개 누적 시 Fast Retransmit';
  document.getElementById('dupMsg').style.color = 'var(--mu)';
  document.getElementById('btn').disabled = false;
}
</script>
</body>
</html>
