<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');</style>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">UDP 헤더 구조</text>

  <!-- UDP section label -->
  <text x="40" y="58" fill="#e3b341" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">UDP HEADER — 총 8 byte</text>

  <!-- Row 1: Source Port | Destination Port -->
  <rect x="40" y="68" width="295" height="52" fill="#2a2210" stroke="#e3b341" stroke-width="1.5" rx="8"/>
  <text x="187" y="90" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">Source Port</text>
  <text x="187" y="108" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">16 bit</text>

  <rect x="365" y="68" width="295" height="52" fill="#2a2210" stroke="#e3b341" stroke-width="1.5" rx="8"/>
  <text x="512" y="90" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">Destination Port</text>
  <text x="512" y="108" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">16 bit</text>

  <!-- Row 2: Length | Checksum -->
  <rect x="40" y="134" width="295" height="52" fill="#2a2210" stroke="#e3b341" stroke-width="1.5" rx="8"/>
  <text x="187" y="156" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">Length</text>
  <text x="187" y="174" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">16 bit — 헤더 + 데이터 전체 길이</text>

  <rect x="365" y="134" width="295" height="52" fill="#2a2210" stroke="#e3b341" stroke-width="1.5" rx="8"/>
  <text x="512" y="156" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">Checksum</text>
  <text x="512" y="174" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">16 bit — 데이터 깨짐 감지</text>

  <!-- Divider -->
  <line x1="40" y1="210" x2="660" y2="210" stroke="#30363d" stroke-width="1"/>

  <!-- TCP-only section label -->
  <text x="40" y="234" fill="#6e7681" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">TCP 헤더에만 있는 필드 — UDP에 없음</text>

  <!-- Missing fields: 3 boxes -->
  <rect x="40" y="246" width="192" height="42" fill="#21262d" stroke="#30363d" stroke-width="1.5" rx="8"/>
  <text x="136" y="262" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">Seq / ACK Number</text>
  <text x="136" y="280" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">순서 보장·재전송 없으므로</text>

  <rect x="254" y="246" width="192" height="42" fill="#21262d" stroke="#30363d" stroke-width="1.5" rx="8"/>
  <text x="350" y="262" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">Flags (SYN/FIN/ACK)</text>
  <text x="350" y="280" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">연결 수립·종료 없으므로</text>

  <rect x="468" y="246" width="192" height="42" fill="#21262d" stroke="#30363d" stroke-width="1.5" rx="8"/>
  <text x="564" y="262" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">Window Size</text>
  <text x="564" y="280" text-anchor="middle" fill="#6e7681" font-size="10" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">흐름 제어 없으므로</text>

  <!-- Size comparison -->
  <text x="40" y="316" fill="#6e7681" font-size="11" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">헤더 크기 비교</text>

  <!-- UDP bar: 8 byte → 76px -->
  <rect x="40" y="326" width="76" height="16" fill="#2a2210" stroke="#e3b341" stroke-width="1.5" rx="4"/>
  <text x="126" y="339" fill="#e3b341" font-size="10" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">UDP  8 byte</text>

  <!-- TCP bar: 20 byte → 190px (ratio 2.5x) -->
  <rect x="40" y="352" width="190" height="16" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5" rx="4"/>
  <text x="240" y="365" fill="#3fb950" font-size="10" font-weight="700" font-family="'Nunito','Trebuchet MS',Arial,sans-serif">TCP  20 byte+</text>
</svg>
