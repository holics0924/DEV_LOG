<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300">
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <rect width="640" height="300" fill="#0f172a" rx="12"/>

  <!-- 제목 -->
  <text x="320" y="28" text-anchor="middle" fill="#94a3b8" font-size="12.5" font-family="system-ui,sans-serif" font-weight="700">notify() vs notifyAll()</text>

  <!-- 구분선 -->
  <line x1="320" y1="40" x2="320" y2="270" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ── 왼쪽: notify() ── -->
  <text x="160" y="55" text-anchor="middle" fill="#10b981" font-size="12" font-family="system-ui,sans-serif" font-weight="700">notify()</text>
  <text x="160" y="68" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">대기 중인 스레드 중 하나만 깨운다</text>

  <!-- 잠든 스레드들 (왼쪽) -->
  <!-- Thread A: 깨어남 -->
  <rect x="55" y="85" width="80" height="32" rx="6" fill="#052e16" stroke="#10b981" stroke-width="2"/>
  <text x="95" y="105" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="system-ui,sans-serif" font-weight="700">Thread A</text>

  <!-- Thread B: 계속 잠 -->
  <rect x="55" y="130" width="80" height="32" rx="6" fill="#0c1a2e" stroke="#334155" stroke-width="1.5"/>
  <text x="95" y="150" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Thread B 💤</text>

  <!-- Thread C: 계속 잠 -->
  <rect x="55" y="175" width="80" height="32" rx="6" fill="#0c1a2e" stroke="#334155" stroke-width="1.5"/>
  <text x="95" y="195" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">Thread C 💤</text>

  <!-- notify 소스 -->
  <rect x="190" y="128" width="90" height="36" rx="6" fill="#0d2818" stroke="#10b981" stroke-width="1.5"/>
  <text x="235" y="147" text-anchor="middle" fill="#34d399" font-size="11" font-family="system-ui,sans-serif" font-weight="700">notify()</text>
  <text x="235" y="159" text-anchor="middle" fill="#10b981" font-size="9" font-family="system-ui,sans-serif">1개만 깨움</text>

  <!-- notify → A 화살표 (초록) -->
  <line x1="190" y1="140" x2="137" y2="105" stroke="#10b981" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- B, C 화살표 없음 표시 -->
  <text x="155" y="152" fill="#334155" font-size="14" font-family="system-ui,sans-serif">✗</text>
  <text x="155" y="197" fill="#334155" font-size="14" font-family="system-ui,sans-serif">✗</text>

  <!-- 결과 -->
  <rect x="55" y="225" width="215" height="32" rx="6" fill="#0d2818" stroke="#064e3b" stroke-width="1"/>
  <text x="162" y="239" text-anchor="middle" fill="#6ee7b7" font-size="10" font-family="system-ui,sans-serif">A만 깨어남 → 처리 후 B, C는 계속 잠</text>
  <text x="162" y="251" text-anchor="middle" fill="#10b981" font-size="10" font-family="system-ui,sans-serif" font-weight="700">컨텍스트 스위칭 최소화</text>

  <!-- ── 오른쪽: notifyAll() ── -->
  <text x="480" y="55" text-anchor="middle" fill="#3b82f6" font-size="12" font-family="system-ui,sans-serif" font-weight="700">notifyAll()</text>
  <text x="480" y="68" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">대기 중인 스레드를 모두 깨운다</text>

  <!-- 잠든 스레드들 (오른쪽) — 모두 깨어남 -->
  <rect x="335" y="85" width="80" height="32" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="2"/>
  <text x="375" y="105" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="system-ui,sans-serif" font-weight="700">Thread A</text>

  <rect x="335" y="130" width="80" height="32" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="2"/>
  <text x="375" y="150" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="system-ui,sans-serif" font-weight="700">Thread B</text>

  <rect x="335" y="175" width="80" height="32" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="2"/>
  <text x="375" y="195" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="system-ui,sans-serif" font-weight="700">Thread C</text>

  <!-- notifyAll 소스 -->
  <rect x="460" y="128" width="100" height="36" rx="6" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="510" y="147" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="system-ui,sans-serif" font-weight="700">notifyAll()</text>
  <text x="510" y="159" text-anchor="middle" fill="#3b82f6" font-size="9" font-family="system-ui,sans-serif">전부 깨움</text>

  <!-- notifyAll → A, B, C 화살표 -->
  <line x1="460" y1="135" x2="417" y2="105" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="460" y1="146" x2="417" y2="146" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>
  <line x1="460" y1="157" x2="417" y2="187" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <!-- 결과 -->
  <rect x="335" y="225" width="215" height="32" rx="6" fill="#0c1a2e" stroke="#334155" stroke-width="1"/>
  <text x="442" y="239" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui,sans-serif">셋 다 깨어나 뮤텍스 경쟁</text>
  <text x="442" y="251" text-anchor="middle" fill="#f59e0b" font-size="10" font-family="system-ui,sans-serif" font-weight="700">조건 맞는 1개만 처리 → 나머지 다시 잠</text>

  <!-- 하단 요약 -->
  <rect x="60" y="268" width="520" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="320" y="283" text-anchor="middle" fill="#64748b" font-size="10" font-family="system-ui,sans-serif">확신이 없다면 notifyAll() — 잘못 깨어난 스레드는 while이 다시 잠재운다</text>
</svg>
