<svg width="320" height="440" viewBox="0 0 320 440" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="arr-down" markerWidth="8" markerHeight="8" refX="4" refY="7" orient="auto">
    <path d="M0,0 L8,0 L4,8 z" fill="#f85149"/>
  </marker>
  <marker id="arr-up" markerWidth="8" markerHeight="8" refX="4" refY="1" orient="auto">
    <path d="M0,8 L8,8 L4,0 z" fill="#3fb950"/>
  </marker></defs>
  <rect width="320" height="440" fill="#0d1117" rx="12"/>
  <text x="160" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">프로세스 가상 주소 공간</text>

  <!-- Address labels -->
  <text x="14" y="58" fill="#484f58" font-size="10">높은 주소</text>
  <text x="14" y="412" fill="#484f58" font-size="10">낮은 주소</text>

  <!-- Stack region (top) -->
  <rect x="80" y="48" width="160" height="70" rx="4" fill="#2a1515" stroke="#f85149" stroke-width="1.5"/>
  <text x="160" y="76" text-anchor="middle" fill="#f85149" font-size="13" font-weight="700">스택</text>
  <text x="160" y="94" text-anchor="middle" fill="#8b949e" font-size="10">함수 호출 프레임</text>
  <text x="160" y="110" text-anchor="middle" fill="#8b949e" font-size="10">지역 변수, 반환 주소</text>

  <!-- Down arrow for stack growth -->
  <line x1="160" y1="120" x2="160" y2="150" stroke="#f85149" stroke-width="2" marker-end="url(#arr-down)"/>
  <text x="174" y="140" fill="#f85149" font-size="11" font-weight="700">↓ 성장</text>

  <!-- Empty space (middle) -->
  <rect x="80" y="158" width="160" height="110" rx="4" fill="#161b22" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="160" y="205" text-anchor="middle" fill="#484f58" font-size="12">빈 공간</text>
  <text x="160" y="222" text-anchor="middle" fill="#484f58" font-size="10">(둘이 만나면</text>
  <text x="160" y="236" text-anchor="middle" fill="#484f58" font-size="10">메모리 고갈)</text>

  <!-- Up arrow for heap growth -->
  <line x1="160" y1="258" x2="160" y2="288" stroke="#3fb950" stroke-width="2" marker-end="url(#arr-up)"/>
  <text x="174" y="278" fill="#3fb950" font-size="11" font-weight="700">↑ 성장</text>

  <!-- Heap region -->
  <rect x="80" y="290" width="160" height="60" rx="4" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="160" y="318" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="700">힙</text>
  <text x="160" y="336" text-anchor="middle" fill="#8b949e" font-size="10">동적 할당 (malloc, new)</text>

  <!-- Data region -->
  <rect x="80" y="358" width="160" height="34" rx="4" fill="#2d1b69" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="160" y="380" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">데이터 영역</text>

  <!-- Code region -->
  <rect x="80" y="398" width="160" height="30" rx="4" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="160" y="417" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">코드 영역</text>
</svg>
