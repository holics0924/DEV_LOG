<svg width="720" height="240" viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#6e7681"/>
  </marker></defs>
  <rect width="720" height="240" fill="#0d1117" rx="12"/>
  <text x="360" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">가상 주소 → 물리 주소 변환</text>

  <!-- Step labels -->
  <text x="100" y="50" text-anchor="middle" fill="#484f58" font-size="11">① 가상 주소</text>
  <text x="360" y="50" text-anchor="middle" fill="#484f58" font-size="11">② 페이지 테이블 조회</text>
  <text x="610" y="50" text-anchor="middle" fill="#484f58" font-size="11">③ 물리 주소</text>

  <!-- Virtual address box -->
  <rect x="20" y="58" width="160" height="90" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="100" y="80" text-anchor="middle" fill="#8b949e" font-size="11">가상 주소</text>
  <text x="100" y="100" text-anchor="middle" fill="#58a6ff" font-size="13" font-family="monospace" font-weight="700">0x00003ABC</text>
  <rect x="30" y="112" width="62" height="22" rx="4" fill="#1c3a5e"/>
  <text x="61" y="127" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="monospace">VPN = 3</text>
  <rect x="100" y="112" width="70" height="22" rx="4" fill="#1a3a27"/>
  <text x="135" y="127" text-anchor="middle" fill="#3fb950" font-size="11" font-family="monospace">off=ABC</text>

  <!-- Arrow 1 -->
  <line x1="183" y1="103" x2="230" y2="103" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Page table box -->
  <rect x="232" y="58" width="256" height="130" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="360" y="80" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">페이지 테이블</text>
  <rect x="242" y="88" width="236" height="20" rx="3" fill="#1e2329"/>
  <text x="360" y="103" text-anchor="middle" fill="#484f58" font-size="10" font-family="monospace">페이지 0  →  PFN 2</text>
  <rect x="242" y="112" width="236" height="20" rx="3" fill="#1e2329"/>
  <text x="360" y="127" text-anchor="middle" fill="#484f58" font-size="10" font-family="monospace">페이지 1  →  PFN 5</text>
  <rect x="242" y="136" width="236" height="20" rx="3" fill="#1e2329"/>
  <text x="360" y="151" text-anchor="middle" fill="#484f58" font-size="10" font-family="monospace">페이지 2  →  PFN 1</text>
  <rect x="242" y="160" width="236" height="22" rx="3" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1"/>
  <text x="360" y="175" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="monospace">페이지 3  →  PFN 7   ← 조회</text>

  <!-- Arrow 2 -->
  <line x1="490" y1="171" x2="536" y2="130" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Physical address box -->
  <rect x="538" y="58" width="162" height="130" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="619" y="80" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">물리 주소</text>
  <text x="548" y="106" fill="#8b949e" font-size="11" font-family="monospace">PFN × 4KB</text>
  <text x="548" y="126" fill="#8b949e" font-size="11" font-family="monospace">+ offset</text>
  <line x1="548" y1="133" x2="690" y2="133" stroke="#484f58" stroke-width="1"/>
  <text x="548" y="152" fill="#8b949e" font-size="11" font-family="monospace">7 × 0x1000</text>
  <text x="548" y="170" fill="#8b949e" font-size="11" font-family="monospace">+ 0xABC</text>
  <rect x="548" y="176" width="142" height="4" rx="2" fill="#1a3a27"/>
  <text x="619" y="200" text-anchor="middle" fill="#3fb950" font-size="14" font-family="monospace" font-weight="700">0x7ABC</text>

  <!-- Bottom note -->
  <text x="360" y="225" text-anchor="middle" fill="#484f58" font-size="11">offset 0xABC는 변환 전후 동일 — 페이지 안의 위치는 바뀌지 않는다</text>
</svg>
