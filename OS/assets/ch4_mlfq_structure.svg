<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
    text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6e7681"/>
    </marker>
    <marker id="arrD" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="arrU" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e3b341"/>
    </marker>
  </defs>
  <rect width="680" height="260" fill="#0d1117" rx="12"/>

  <!-- New process arrow -->
  <text x="30" y="55" fill="#6e7681" font-size="11">신규 프로세스</text>
  <line x1="30" y1="60" x2="148" y2="60" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Queue 0 -->
  <rect x="150" y="30" width="360" height="52" rx="10" fill="#1c3a5e" stroke="#58a6ff" stroke-width="2"/>
  <text x="180" y="60" fill="#58a6ff" font-size="13" font-weight="700">큐 0</text>
  <text x="260" y="60" fill="#8b949e" font-size="12">quantum = 8ms</text>
  <text x="540" y="60" text-anchor="end" fill="#3fb950" font-size="11" font-weight="600">최고 우선순위</text>

  <!-- Demotion arrow 0→1 -->
  <line x1="330" y1="84" x2="330" y2="102" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrD)"/>
  <text x="340" y="97" fill="#f0883e" font-size="10">quantum 초과 → 강등</text>

  <!-- Queue 1 -->
  <rect x="150" y="105" width="360" height="52" rx="10" fill="#1f2d1f" stroke="#6e7681" stroke-width="2"/>
  <text x="180" y="135" fill="#e6edf3" font-size="13" font-weight="700">큐 1</text>
  <text x="260" y="135" fill="#8b949e" font-size="12">quantum = 16ms</text>

  <!-- Demotion arrow 1→2 -->
  <line x1="330" y1="159" x2="330" y2="177" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrD)"/>
  <text x="340" y="172" fill="#f0883e" font-size="10">quantum 초과 → 강등</text>

  <!-- Queue 2 -->
  <rect x="150" y="180" width="360" height="52" rx="10" fill="#2a1f1f" stroke="#6e7681" stroke-width="2"/>
  <text x="180" y="210" fill="#e6edf3" font-size="13" font-weight="700">큐 2</text>
  <text x="260" y="210" fill="#8b949e" font-size="12">FCFS</text>
  <text x="540" y="210" text-anchor="end" fill="#f0883e" font-size="11" font-weight="600">최저 우선순위</text>

  <!-- Aging arrow -->
  <path d="M 150 206 Q 80 206 80 130 Q 80 56 150 56" fill="none" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrU)"/>
  <text x="30" y="135" text-anchor="middle" fill="#e3b341" font-size="10" font-weight="600">에이징</text>
  <text x="30" y="148" text-anchor="middle" fill="#e3b341" font-size="10">(승급)</text>

  <text x="340" y="248" text-anchor="middle" fill="#6e7681" font-size="11">MLFQ — 다단계 피드백 큐</text>
</svg>
