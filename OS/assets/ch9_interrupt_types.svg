<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="360" fill="#0d1117" rx="12"/>

  <!-- 제목 -->
  <text x="400" y="36" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600" letter-spacing="0.05em">인터럽트 종류</text>

  <!-- 루트 박스 -->
  <rect x="300" y="54" width="200" height="42" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="80" text-anchor="middle" fill="#c9d1d9" font-size="14" font-weight="600">인터럽트</text>

  <!-- 루트 → 분기 -->
  <line x1="400" y1="96" x2="400" y2="114" stroke="#30363d" stroke-width="1.5"/>
  <line x1="210" y1="114" x2="590" y2="114" stroke="#30363d" stroke-width="1.5"/>
  <line x1="210" y1="114" x2="210" y2="130" stroke="#30363d" stroke-width="1.5"/>
  <line x1="590" y1="114" x2="590" y2="130" stroke="#30363d" stroke-width="1.5"/>

  <!-- 하드웨어 인터럽트 박스 -->
  <rect x="110" y="130" width="200" height="42" rx="8" fill="#1f4068" stroke="#388bfd" stroke-width="1.5"/>
  <text x="210" y="156" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600">하드웨어 인터럽트</text>

  <!-- 소프트웨어 인터럽트 박스 -->
  <rect x="490" y="130" width="200" height="42" rx="8" fill="#3d1f1f" stroke="#da3633" stroke-width="1.5"/>
  <text x="590" y="148" text-anchor="middle" fill="#ff7b72" font-size="13" font-weight="600">소프트웨어 인터럽트</text>
  <text x="590" y="164" text-anchor="middle" fill="#ff7b72" font-size="11">(트랩, Trap)</text>

  <!-- 하드웨어 → 3개 예시 분기 -->
  <line x1="210" y1="172" x2="210" y2="192" stroke="#388bfd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70"  y1="192" x2="350" y2="192" stroke="#388bfd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="70"  y1="192" x2="70"  y2="208" stroke="#388bfd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="210" y1="192" x2="210" y2="208" stroke="#388bfd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="350" y1="192" x2="350" y2="208" stroke="#388bfd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 예시 박스 1: 디스크 완료 -->
  <rect x="20" y="208" width="100" height="48" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="70" y="228" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">디스크 완료</text>
  <text x="70" y="246" text-anchor="middle" fill="#6e7681" font-size="10">DMA 전송 끝</text>

  <!-- 예시 박스 2: 키보드/마우스 -->
  <rect x="160" y="208" width="100" height="48" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="210" y="228" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">키보드/마우스</text>
  <text x="210" y="246" text-anchor="middle" fill="#6e7681" font-size="10">입력 이벤트</text>

  <!-- 예시 박스 3: 타이머 -->
  <rect x="300" y="208" width="100" height="48" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="350" y="228" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">타이머</text>
  <text x="350" y="246" text-anchor="middle" fill="#6e7681" font-size="10">선점 스케줄링</text>

  <!-- 소프트웨어 → 2개 예시 분기 -->
  <line x1="590" y1="172" x2="590" y2="192" stroke="#da3633" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="192" x2="680" y2="192" stroke="#da3633" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="500" y1="192" x2="500" y2="208" stroke="#da3633" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="680" y1="192" x2="680" y2="208" stroke="#da3633" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 예시 박스 4: 시스템 콜 -->
  <rect x="440" y="208" width="120" height="48" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="500" y="228" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">시스템 콜</text>
  <text x="500" y="246" text-anchor="middle" fill="#6e7681" font-size="10">의도적 커널 호출</text>

  <!-- 예시 박스 5: 예외 -->
  <rect x="620" y="208" width="120" height="48" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="680" y="228" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">예외 (Exception)</text>
  <text x="680" y="246" text-anchor="middle" fill="#6e7681" font-size="10">0 나누기, 세그폴트</text>

  <!-- 구분선 -->
  <line x1="40" y1="286" x2="760" y2="286" stroke="#21262d" stroke-width="1"/>

  <!-- 공통 처리 흐름 -->
  <text x="400" y="308" text-anchor="middle" fill="#6e7681" font-size="11">공통 처리 흐름</text>
  <rect x="80" y="318" width="640" height="26" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="335" text-anchor="middle" fill="#8b949e" font-size="11">신호 감지  →  인터럽트 벡터 테이블 조회  →  ISR 실행  →  원래 흐름 복귀</text>
</svg>
