<svg width="680" height="160" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style></defs>
  <rect width="680" height="160" fill="#0d1117" rx="12"/>

  <text x="340" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">SJF  —  평균 대기 시간 3ms</text>

  <!-- P2 (0~3ms): x=40, w=60 -->
  <rect x="40" y="38" width="60" height="44" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="70" y="65" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">P2</text>

  <!-- P3 (3~6ms): x=100, w=60 -->
  <rect x="100" y="38" width="60" height="44" rx="6" fill="#3a2210" stroke="#f0883e" stroke-width="1.5"/>
  <text x="130" y="65" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">P3</text>

  <!-- P1 (6~30ms): x=160, w=480 -->
  <rect x="160" y="38" width="480" height="44" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="400" y="65" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="700">P1  (24ms)</text>

  <!-- Timeline -->
  <line x1="40" y1="92" x2="642" y2="92" stroke="#30363d" stroke-width="1"/>

  <line x1="40" y1="88" x2="40" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="40" y="110" text-anchor="middle" fill="#8b949e" font-size="11">0</text>

  <line x1="100" y1="88" x2="100" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="100" y="110" text-anchor="middle" fill="#8b949e" font-size="11">3</text>

  <line x1="160" y1="88" x2="160" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="160" y="110" text-anchor="middle" fill="#8b949e" font-size="11">6</text>

  <line x1="640" y1="88" x2="640" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="640" y="110" text-anchor="middle" fill="#8b949e" font-size="11">30ms</text>

  <text x="40" y="138" fill="#3fb950" font-size="11">P2 대기 0ms</text>
  <text x="200" y="138" fill="#f0883e" font-size="11">P3 대기 3ms</text>
  <text x="380" y="138" fill="#58a6ff" font-size="11">P1 대기 6ms</text>
</svg>
