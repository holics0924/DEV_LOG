<svg width="720" height="230" viewBox="0 0 720 230" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style></defs>
  <rect width="720" height="230" fill="#0d1117" rx="12"/>
  <text x="360" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">스래싱 — 프로세스 수와 CPU 이용률</text>

  <!-- Axes -->
  <line x1="60" y1="180" x2="660" y2="180" stroke="#484f58" stroke-width="1.5"/>
  <line x1="60" y1="50" x2="60" y2="182" stroke="#484f58" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="360" y="205" text-anchor="middle" fill="#6e7681" font-size="11">프로세스 수</text>
  <text x="22" y="120" text-anchor="middle" fill="#6e7681" font-size="11" transform="rotate(-90 22 120)">CPU 이용률</text>

  <!-- Curve: rises then falls sharply -->
  <path d="M80,165 C120,130 160,90 210,68 C240,57 270,55 300,56 C330,57 350,62 370,72 C410,92 440,115 480,138 C520,160 560,170 620,175"
        fill="none" stroke="#58a6ff" stroke-width="2.5"/>

  <!-- Fill under curve (subtle) -->
  <path d="M80,165 C120,130 160,90 210,68 C240,57 270,55 300,56 C330,57 350,62 370,72 C410,92 440,115 480,138 C520,160 560,170 620,175 L620,180 L80,180 Z"
        fill="#1c3a5e" opacity="0.25"/>

  <!-- Thrashing zone highlight -->
  <rect x="370" y="50" width="260" height="130" rx="4" fill="#f85149" opacity="0.07"/>
  <text x="500" y="72" text-anchor="middle" fill="#f85149" font-size="11" font-weight="700">스래싱 구간</text>
  <text x="500" y="88" text-anchor="middle" fill="#484f58" font-size="10">CPU가 페이지 교체만 반복</text>
  <text x="500" y="102" text-anchor="middle" fill="#484f58" font-size="10">실제 연산 거의 없음</text>

  <!-- Peak marker -->
  <line x1="300" y1="56" x2="300" y2="180" stroke="#d29922" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="300" y="46" text-anchor="middle" fill="#d29922" font-size="10">이 지점 이후</text>

  <!-- OS misread annotation -->
  <text x="450" y="148" text-anchor="middle" fill="#484f58" font-size="10">CPU 이용률 하락</text>
  <text x="450" y="162" text-anchor="middle" fill="#f85149" font-size="10">→ OS: "프로세스 더 올리자"</text>
  <text x="450" y="176" text-anchor="middle" fill="#f85149" font-size="10">→ 더 나빠짐</text>
</svg>
