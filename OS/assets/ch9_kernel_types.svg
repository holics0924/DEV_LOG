<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="460" fill="#0d1117" rx="12"/>

  <!-- 제목 -->
  <text x="200" y="34" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="700">모놀리식 커널</text>
  <text x="600" y="34" text-anchor="middle" fill="#e3b341" font-size="14" font-weight="700">마이크로 커널</text>
  <text x="200" y="52" text-anchor="middle" fill="#6e7681" font-size="11">Linux, Windows</text>
  <text x="600" y="52" text-anchor="middle" fill="#6e7681" font-size="11">QNX, L4</text>

  <!-- 중앙 구분선 -->
  <line x1="400" y1="18" x2="400" y2="440" stroke="#21262d" stroke-width="1.5"/>

  <!-- ===== 모놀리식 ===== -->

  <!-- 유저 모드 -->
  <rect x="30" y="66" width="340" height="54" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="46" y="86" fill="#6e7681" font-size="10" font-weight="600">유저 모드</text>
  <rect x="46" y="92" width="120" height="22" rx="5" fill="#21262d"/>
  <text x="106" y="107" text-anchor="middle" fill="#8b949e" font-size="11">앱 프로세스</text>

  <!-- syscall 화살표 -->
  <line x1="200" y1="120" x2="200" y2="142" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="218" y="134" fill="#58a6ff" font-size="11">syscall (트랩)</text>

  <!-- 커널 모드 큰 박스 -->
  <rect x="30" y="142" width="340" height="170" rx="8" fill="#0e1d33" stroke="#388bfd" stroke-width="1.5"/>
  <text x="46" y="162" fill="#388bfd" font-size="10" font-weight="600">커널 모드</text>

  <!-- 커널 컴포넌트 3개 -->
  <rect x="46" y="170" width="96" height="40" rx="6" fill="#1a3252" stroke="#388bfd" stroke-width="1"/>
  <text x="94" y="190" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600">파일 시스템</text>
  <text x="94" y="205" text-anchor="middle" fill="#4a7fa8" font-size="10">kernel space</text>

  <rect x="152" y="170" width="96" height="40" rx="6" fill="#1a3252" stroke="#388bfd" stroke-width="1"/>
  <text x="200" y="190" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600">디스크 드라이버</text>
  <text x="200" y="205" text-anchor="middle" fill="#4a7fa8" font-size="10">kernel space</text>

  <rect x="258" y="170" width="96" height="40" rx="6" fill="#1a3252" stroke="#388bfd" stroke-width="1"/>
  <text x="306" y="190" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="600">네트워크 스택</text>
  <text x="306" y="205" text-anchor="middle" fill="#4a7fa8" font-size="10">kernel space</text>

  <!-- 함수 호출 화살표 -->
  <line x1="142" y1="190" x2="152" y2="190" stroke="#56d364" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="248" y1="190" x2="258" y2="190" stroke="#56d364" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="200" y="234" text-anchor="middle" fill="#56d364" font-size="12" font-weight="600">함수 호출</text>
  <text x="200" y="250" text-anchor="middle" fill="#3a6644" font-size="11">모드 전환 없음</text>
  <text x="200" y="266" text-anchor="middle" fill="#3a6644" font-size="10">같은 주소 공간</text>

  <!-- 하드웨어 -->
  <rect x="46" y="286" width="308" height="16" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="200" y="298" text-anchor="middle" fill="#484f58" font-size="10">하드웨어</text>

  <!-- 장단점 -->
  <text x="46" y="340" fill="#56d364" font-size="12">+ 빠름 (함수 호출로 통신)</text>
  <text x="46" y="360" fill="#ff7b72" font-size="12">- 드라이버 버그 → 커널 전체 크래시</text>

  <!-- ===== 마이크로 커널 ===== -->

  <!-- 유저 모드 큰 박스 -->
  <rect x="430" y="66" width="340" height="170" rx="8" fill="#1a1a0a" stroke="#bb8009" stroke-width="1.5"/>
  <text x="446" y="86" fill="#bb8009" font-size="10" font-weight="600">유저 모드</text>

  <!-- 유저모드 컴포넌트 3개 -->
  <rect x="446" y="94" width="96" height="40" rx="6" fill="#2b280e" stroke="#bb8009" stroke-width="1"/>
  <text x="494" y="114" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="600">파일 시스템</text>
  <text x="494" y="129" text-anchor="middle" fill="#7a6a20" font-size="10">user space</text>

  <rect x="552" y="94" width="96" height="40" rx="6" fill="#2b280e" stroke="#bb8009" stroke-width="1"/>
  <text x="600" y="114" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="600">디스크 드라이버</text>
  <text x="600" y="129" text-anchor="middle" fill="#7a6a20" font-size="10">user space</text>

  <rect x="658" y="94" width="96" height="40" rx="6" fill="#2b280e" stroke="#bb8009" stroke-width="1"/>
  <text x="706" y="114" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="600">네트워크 스택</text>
  <text x="706" y="129" text-anchor="middle" fill="#7a6a20" font-size="10">user space</text>

  <!-- 앱 프로세스 -->
  <rect x="540" y="154" width="120" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="600" y="176" text-anchor="middle" fill="#8b949e" font-size="12">앱 프로세스</text>

  <!-- IPC 표시 -->
  <text x="600" y="222" text-anchor="middle" fill="#ff7b72" font-size="11" font-weight="600">↕ IPC (syscall 경유)</text>
  <text x="600" y="238" text-anchor="middle" fill="#6e2a28" font-size="10">컴포넌트마다 모드 전환 발생</text>

  <!-- syscall 화살표 (유저 → 커널) -->
  <line x1="600" y1="246" x2="600" y2="264" stroke="#da3633" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- 커널 모드 작은 박스 -->
  <rect x="430" y="264" width="340" height="56" rx="8" fill="#1a0a0a" stroke="#da3633" stroke-width="1.5"/>
  <text x="446" y="282" fill="#da3633" font-size="10" font-weight="600">커널 모드 (최소)</text>
  <rect x="446" y="286" width="90" height="26" rx="5" fill="#2e1515" stroke="#6e2a28" stroke-width="1"/>
  <text x="491" y="303" text-anchor="middle" fill="#ff7b72" font-size="11">IPC 라우팅</text>
  <rect x="546" y="286" width="90" height="26" rx="5" fill="#2e1515" stroke="#6e2a28" stroke-width="1"/>
  <text x="591" y="303" text-anchor="middle" fill="#ff7b72" font-size="11">프로세스 관리</text>
  <rect x="646" y="286" width="108" height="26" rx="5" fill="#2e1515" stroke="#6e2a28" stroke-width="1"/>
  <text x="700" y="303" text-anchor="middle" fill="#ff7b72" font-size="11">기본 메모리 관리</text>

  <!-- 장단점 -->
  <text x="446" y="340" fill="#56d364" font-size="12">+ 드라이버 죽어도 커널 생존</text>
  <text x="446" y="360" fill="#ff7b72" font-size="12">- IPC마다 모드 전환 → 느림</text>

  <!-- 하단 표 -->
  <rect x="30" y="390" width="740" height="58" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <line x1="30" y1="408" x2="770" y2="408" stroke="#21262d" stroke-width="1"/>
  <line x1="220" y1="390" x2="220" y2="448" stroke="#21262d" stroke-width="1"/>
  <line x1="490" y1="390" x2="490" y2="448" stroke="#21262d" stroke-width="1"/>

  <text x="125" y="403" text-anchor="middle" fill="#6e7681" font-size="10" font-weight="600"></text>
  <text x="355" y="403" text-anchor="middle" fill="#6e7681" font-size="10" font-weight="600">모놀리식</text>
  <text x="630" y="403" text-anchor="middle" fill="#6e7681" font-size="10" font-weight="600">마이크로</text>

  <text x="125" y="422" text-anchor="middle" fill="#8b949e" font-size="11">컴포넌트 통신</text>
  <text x="355" y="422" text-anchor="middle" fill="#56d364" font-size="11">함수 호출 (빠름)</text>
  <text x="630" y="422" text-anchor="middle" fill="#ff7b72" font-size="11">IPC / 모드 전환 (느림)</text>

  <text x="125" y="440" text-anchor="middle" fill="#8b949e" font-size="11">드라이버 크래시</text>
  <text x="355" y="440" text-anchor="middle" fill="#ff7b72" font-size="11">커널 전체 영향</text>
  <text x="630" y="440" text-anchor="middle" fill="#56d364" font-size="11">해당 프로세스만</text>

  <!-- 화살표 마커 -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388bfd"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#56d364"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#da3633"/>
    </marker>
  </defs>
</svg>
