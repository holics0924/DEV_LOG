<svg width="720" height="230" viewBox="0 0 720 230" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
  </marker>
  <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#d29922"/>
  </marker></defs>
  <rect width="720" height="230" fill="#0d1117" rx="12"/>
  <text x="360" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">TLB 처리 흐름</text>

  <!-- CPU -->
  <rect x="20" y="80" width="90" height="44" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="65" y="100" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">CPU</text>
  <text x="65" y="116" text-anchor="middle" fill="#8b949e" font-size="10">가상 주소</text>

  <!-- TLB -->
  <rect x="150" y="80" width="90" height="44" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="195" y="100" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">TLB</text>
  <text x="195" y="116" text-anchor="middle" fill="#8b949e" font-size="10">CPU 내부 캐시</text>

  <!-- Arrow CPU -> TLB -->
  <line x1="112" y1="102" x2="148" y2="102" stroke="#6e7681" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- HIT path (top) -->
  <text x="310" y="56" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">히트 (수 사이클)</text>
  <path d="M242,88 Q310,58 378,88" fill="none" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Physical address (hit) -->
  <rect x="380" y="76" width="110" height="44" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="435" y="96" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">물리 주소</text>
  <text x="435" y="112" text-anchor="middle" fill="#8b949e" font-size="10">바로 반환</text>

  <!-- MISS path (bottom) -->
  <text x="310" y="194" text-anchor="middle" fill="#d29922" font-size="11" font-weight="700">미스 (수십~수백 사이클)</text>
  <path d="M242,116 Q310,155 340,148" fill="none" stroke="#d29922" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ao)"/>

  <!-- RAM page table -->
  <rect x="342" y="130" width="120" height="44" rx="8" fill="#2d1f0e" stroke="#d29922" stroke-width="1.5"/>
  <text x="402" y="150" text-anchor="middle" fill="#d29922" font-size="11" font-weight="700">RAM 페이지 테이블</text>
  <text x="402" y="166" text-anchor="middle" fill="#8b949e" font-size="10">커널 영역 조회</text>

  <!-- Arrow: page table -> physical + TLB update -->
  <line x1="464" y1="152" x2="498" y2="152" stroke="#d29922" stroke-width="1.5" marker-end="url(#ao)"/>
  <rect x="500" y="130" width="100" height="44" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="550" y="150" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">물리 주소</text>
  <text x="550" y="166" text-anchor="middle" fill="#8b949e" font-size="10">TLB 갱신 후 반환</text>

  <text x="360" y="218" text-anchor="middle" fill="#484f58" font-size="11">다음 번 같은 주소 접근 시 TLB 히트 → 빠른 경로</text>
</svg>
