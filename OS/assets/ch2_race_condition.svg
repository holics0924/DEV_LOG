<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style></defs>
  <rect width="680" height="260" fill="#0d1117" rx="12"/>
  <text x="340" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">Race Condition — count += 1 동시 실행</text>

  <!-- Thread A column -->
  <text x="170" y="48" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">스레드 A</text>
  <!-- Thread B column -->
  <text x="510" y="48" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">스레드 B</text>
  <!-- Shared -->
  <text x="340" y="48" text-anchor="middle" fill="#6e7681" font-size="11">count = 0</text>

  <!-- Step 1: A reads -->
  <rect x="50" y="60" width="240" height="34" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="170" y="82" text-anchor="middle" fill="#58a6ff" font-size="12">READ → count=0</text>

  <!-- Step 2: B reads (before A writes) -->
  <rect x="390" y="100" width="240" height="34" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="510" y="122" text-anchor="middle" fill="#3fb950" font-size="12">READ → count=0</text>

  <!-- Danger label -->
  <text x="340" y="118" text-anchor="middle" fill="#f0883e" font-size="10">← A가 쓰기 전에 B가 읽어버림!</text>

  <!-- Step 3: A writes 1 -->
  <rect x="50" y="140" width="240" height="34" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="170" y="162" text-anchor="middle" fill="#58a6ff" font-size="12">ADD(1), WRITE → count=1</text>

  <!-- Step 4: B writes 1 (overwrites) -->
  <rect x="390" y="180" width="240" height="34" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="510" y="202" text-anchor="middle" fill="#3fb950" font-size="12">ADD(1), WRITE → count=1</text>

  <!-- Result -->
  <rect x="200" y="228" width="280" height="20" rx="6" fill="#3a1010" stroke="#f0883e" stroke-width="1.5"/>
  <text x="340" y="243" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">결과: count = 1  (2가 되어야 함)</text>
</svg>
