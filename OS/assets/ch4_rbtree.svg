<svg width="680" height="240" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style></defs>
  <rect width="680" height="240" fill="#0d1117" rx="12"/>

  <text x="340" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">CFS — 레드-블랙 트리 (vruntime 기준 정렬)</text>

  <!-- Root node: vruntime=5 -->
  <circle cx="340" cy="80" r="34" fill="#1c3a5e" stroke="#58a6ff" stroke-width="2"/>
  <text x="340" y="76" text-anchor="middle" fill="#8b949e" font-size="9">vruntime</text>
  <text x="340" y="91" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="700">5</text>

  <!-- Left child: vruntime=2 -->
  <line x1="312" y1="104" x2="228" y2="146" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="210" cy="160" r="34" fill="#1a3a27" stroke="#3fb950" stroke-width="2"/>
  <text x="210" y="156" text-anchor="middle" fill="#8b949e" font-size="9">vruntime</text>
  <text x="210" y="171" text-anchor="middle" fill="#3fb950" font-size="16" font-weight="700">2</text>

  <!-- Right child: vruntime=8 -->
  <line x1="368" y1="104" x2="452" y2="146" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="470" cy="160" r="34" fill="#161b22" stroke="#6e7681" stroke-width="2"/>
  <text x="470" y="156" text-anchor="middle" fill="#8b949e" font-size="9">vruntime</text>
  <text x="470" y="171" text-anchor="middle" fill="#6e7681" font-size="16" font-weight="700">8</text>

  <!-- Left-left child: vruntime=1 (next to run) -->
  <line x1="185" y1="183" x2="130" y2="198" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="112" cy="207" r="28" fill="#3a2210" stroke="#e3b341" stroke-width="2.5"/>
  <text x="112" y="203" text-anchor="middle" fill="#8b949e" font-size="8">vruntime</text>
  <text x="112" y="216" text-anchor="middle" fill="#e3b341" font-size="14" font-weight="700">1</text>

  <!-- Next run label -->
  <text x="56" y="207" text-anchor="end" fill="#e3b341" font-size="11" font-weight="700">▶ 다음 실행</text>
  <line x1="58" y1="207" x2="82" y2="207" stroke="#e3b341" stroke-width="1.5"/>

  <!-- Left-right child: vruntime=3 -->
  <line x1="236" y1="183" x2="288" y2="198" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="306" cy="207" r="28" fill="#161b22" stroke="#6e7681" stroke-width="2"/>
  <text x="306" y="203" text-anchor="middle" fill="#8b949e" font-size="8">vruntime</text>
  <text x="306" y="216" text-anchor="middle" fill="#6e7681" font-size="14" font-weight="700">3</text>

  <text x="340" y="215" text-anchor="middle" fill="#6e7681" font-size="10">O(log n) 삽입/삭제 — 가장 왼쪽 노드를 항상 먼저 실행</text>
</svg>
