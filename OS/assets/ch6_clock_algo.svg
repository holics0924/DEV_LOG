<svg width="720" height="280" viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="ptr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L0,6 L10,3 z" fill="#d29922"/>
  </marker></defs>
  <rect width="720" height="280" fill="#0d1117" rx="12"/>
  <text x="360" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">Clock 알고리즘</text>

  <!-- Circular page frames (6 pages in a circle) -->
  <!-- Center: 280, 148 / radius 100 -->
  <!-- Positions: top(280,48), topright(367,73), botright(367,223), bot(280,248), botleft(193,223), topleft(193,73) -->

  <!-- Page 0 (top) - ref=1, blue -->
  <rect x="248" y="38" width="64" height="42" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="280" y="56" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">페이지 2</text>
  <text x="280" y="72" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="monospace">ref = 1</text>

  <!-- Page 1 (topright) - ref=1, blue -->
  <rect x="355" y="78" width="64" height="42" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="387" y="96" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">페이지 5</text>
  <text x="387" y="112" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="monospace">ref = 1</text>

  <!-- Page 2 (botright) - ref=0, gray → EVICT -->
  <rect x="355" y="168" width="64" height="42" rx="6" fill="#2a1a1a" stroke="#f85149" stroke-width="2"/>
  <text x="387" y="186" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">페이지 1</text>
  <text x="387" y="202" text-anchor="middle" fill="#f85149" font-size="11" font-family="monospace">ref = 0</text>

  <!-- Page 3 (bot) - ref=0, gray -->
  <rect x="248" y="208" width="64" height="42" rx="6" fill="#161b22" stroke="#484f58" stroke-width="1.5"/>
  <text x="280" y="226" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700">페이지 3</text>
  <text x="280" y="242" text-anchor="middle" fill="#484f58" font-size="11" font-family="monospace">ref = 0</text>

  <!-- Page 4 (botleft) - ref=1, blue -->
  <rect x="161" y="168" width="64" height="42" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="193" y="186" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">페이지 7</text>
  <text x="193" y="202" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="monospace">ref = 1</text>

  <!-- Page 5 (topleft) - ref=0, gray -->
  <rect x="161" y="78" width="64" height="42" rx="6" fill="#161b22" stroke="#484f58" stroke-width="1.5"/>
  <text x="193" y="96" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700">페이지 4</text>
  <text x="193" y="112" text-anchor="middle" fill="#484f58" font-size="11" font-family="monospace">ref = 0</text>

  <!-- Clock pointer (pointing to botright = evict) -->
  <line x1="316" y1="168" x2="353" y2="188" stroke="#d29922" stroke-width="2.5" marker-end="url(#ptr)"/>
  <text x="310" y="160" text-anchor="middle" fill="#d29922" font-size="11" font-weight="700">포인터</text>

  <!-- Legend and rules -->
  <rect x="490" y="50" width="210" height="170" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1"/>
  <text x="595" y="72" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">순회 규칙</text>
  <rect x="500" y="82" width="8" height="8" rx="2" fill="#58a6ff"/>
  <text x="515" y="92" fill="#8b949e" font-size="10">ref = 1</text>
  <text x="515" y="106" fill="#8b949e" font-size="10">→ 0으로 초기화 후 통과</text>
  <text x="515" y="118" fill="#484f58" font-size="10">  (한 번 더 기회 줌)</text>

  <rect x="500" y="130" width="8" height="8" rx="2" fill="#484f58"/>
  <text x="515" y="140" fill="#8b949e" font-size="10">ref = 0</text>
  <text x="515" y="154" fill="#8b949e" font-size="10">→ 교체 대상</text>
  <text x="515" y="168" fill="#484f58" font-size="10">  (두 번째 순회까지</text>
  <text x="515" y="180" fill="#484f58" font-size="10">   접근 없으면 아웃)</text>

  <rect x="500" y="193" width="8" height="8" rx="2" fill="#f85149"/>
  <text x="515" y="203" fill="#f85149" font-size="10">→ 이 순회에서 교체됨</text>

  <text x="360" y="268" text-anchor="middle" fill="#484f58" font-size="11">접근이 오면 하드웨어가 ref를 1로 세팅 — 다음 순회에서 살아남는다</text>
</svg>
