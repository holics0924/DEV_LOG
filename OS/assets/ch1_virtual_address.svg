<svg width="680" height="180" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#6e7681"/>
  </marker></defs>
  <rect width="680" height="180" fill="#0d1117" rx="12"/>
  <text x="340" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">가상 주소 공간 격리</text>

  <!-- Process A -->
  <rect x="30" y="40" width="180" height="50" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="120" y="62" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">프로세스 A</text>
  <text x="120" y="80" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">가상주소 0x1000</text>

  <!-- Process B -->
  <rect x="30" y="110" width="180" height="50" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="120" y="132" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">프로세스 B</text>
  <text x="120" y="150" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">가상주소 0x1000</text>

  <!-- Physical memory -->
  <rect x="460" y="35" width="190" height="50" rx="8" fill="#2a1f3a" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="555" y="57" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="700">물리 메모리</text>
  <text x="555" y="75" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">0x3A00</text>

  <rect x="460" y="105" width="190" height="50" rx="8" fill="#2a1f3a" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="555" y="127" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="700">물리 메모리</text>
  <text x="555" y="145" text-anchor="middle" fill="#8b949e" font-size="11" font-family="monospace">0x7F00</text>

  <!-- OS / Paging box -->
  <rect x="270" y="68" width="140" height="44" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="340" y="87" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">OS / 페이징</text>
  <text x="340" y="103" text-anchor="middle" fill="#6e7681" font-size="10">가상→물리 변환</text>

  <!-- Arrows -->
  <line x1="212" y1="65" x2="268" y2="82" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="212" y1="135" x2="268" y2="98" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="412" y1="82" x2="458" y2="60" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="412" y1="98" x2="458" y2="130" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="340" y="162" text-anchor="middle" fill="#6e7681" font-size="10">같은 가상 주소 → 다른 물리 주소 → 충돌 없음</text>
</svg>
