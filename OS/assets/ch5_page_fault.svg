<svg width="720" height="260" viewBox="0 0 720 260" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#6e7681"/>
  </marker>
  <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
  </marker>
  <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#d29922"/>
  </marker></defs>
  <rect width="720" height="260" fill="#0d1117" rx="12"/>
  <text x="360" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">페이지 폴트 처리 과정</text>

  <!-- Process box -->
  <rect x="20" y="100" width="110" height="44" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="75" y="120" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">프로세스</text>
  <text x="75" y="136" text-anchor="middle" fill="#8b949e" font-size="10">가상 주소 접근</text>

  <!-- Arrow to PTE check -->
  <line x1="132" y1="122" x2="168" y2="122" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PTE check -->
  <rect x="170" y="100" width="110" height="44" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="225" y="120" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">PTE 확인</text>
  <text x="225" y="136" text-anchor="middle" fill="#8b949e" font-size="10">valid bit?</text>

  <!-- valid = 1 path (top, green) -->
  <line x1="282" y1="108" x2="380" y2="75" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="320" y="84" text-anchor="middle" fill="#3fb950" font-size="10">valid = 1</text>

  <rect x="382" y="58" width="130" height="34" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="447" y="72" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">물리 주소 반환</text>
  <text x="447" y="86" text-anchor="middle" fill="#8b949e" font-size="10">빠른 경로</text>

  <!-- valid = 0 path (bottom, orange) -->
  <line x1="282" y1="136" x2="380" y2="162" stroke="#d29922" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="324" y="162" text-anchor="middle" fill="#d29922" font-size="10">valid = 0</text>

  <!-- Page fault -->
  <rect x="382" y="148" width="110" height="34" rx="8" fill="#2d1f0e" stroke="#d29922" stroke-width="1.5"/>
  <text x="437" y="163" text-anchor="middle" fill="#d29922" font-size="11" font-weight="700">페이지 폴트</text>
  <text x="437" y="177" text-anchor="middle" fill="#8b949e" font-size="10">OS에 처리 위임</text>

  <!-- Arrow to disk -->
  <line x1="494" y1="165" x2="530" y2="165" stroke="#d29922" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Disk -->
  <rect x="532" y="148" width="80" height="34" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1.5"/>
  <text x="572" y="163" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700">디스크</text>
  <text x="572" y="177" text-anchor="middle" fill="#484f58" font-size="10">페이지 탐색</text>

  <!-- Arrow to RAM -->
  <line x1="614" y1="165" x2="650" y2="165" stroke="#d29922" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- RAM -->
  <rect x="652" y="148" width="52" height="34" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="678" y="163" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">RAM</text>
  <text x="678" y="177" text-anchor="middle" fill="#8b949e" font-size="10">적재</text>

  <!-- Arrow back to PTE update -->
  <path d="M678,184 Q678,220 437,220 Q300,220 225,190" fill="none" stroke="#d29922" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="437" y="214" text-anchor="middle" fill="#484f58" font-size="10">PTE 갱신 (valid=1) 후 프로세스 재개</text>

  <!-- Note -->
  <text x="360" y="248" text-anchor="middle" fill="#484f58" font-size="11">프로세스는 이 과정을 모른다 — 잠깐 멈췄다가 재개되는 것처럼 느낄 뿐</text>
</svg>
