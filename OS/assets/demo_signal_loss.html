<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wait() 원자성 — 신호 유실</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f172a;--s1:#1e293b;--s2:#162032;--bd:#334155;--tx:#e2e8f0;--mu:#64748b;--bl:#3b82f6;--gr:#10b981;--rd:#ef4444;--am:#f59e0b}
    body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;padding:24px 16px 48px;max-width:960px;margin:0 auto}
    h1{font-size:1.15rem;color:#cbd5e1;margin-bottom:4px}
    .sub{font-size:0.78rem;color:var(--mu);margin-bottom:22px}

    .mode-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .mode-btn{padding:8px 18px;border:1px solid var(--bd);border-radius:7px;background:var(--s1);color:#94a3b8;font-size:0.83rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s}
    .mode-btn:hover{background:#334155;color:var(--tx)}
    .mode-btn.on-bad {background:#450a0a;border-color:var(--rd);color:#fca5a5}
    .mode-btn.on-good{background:#052e16;border-color:var(--gr);color:#6ee7b7}

    .arena{display:grid;grid-template-columns:1fr 140px 1fr;gap:16px;margin-bottom:20px;align-items:start}

    /* 스레드 코드 패널 */
    .thread-box{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px}
    .thread-title{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
    .t-player  .thread-title{color:#60a5fa}
    .t-download .thread-title{color:#fbbf24}

    .code-lines{font-family:monospace;font-size:0.76rem}
    .code-line{display:flex;gap:8px;align-items:flex-start;padding:5px 8px;border-radius:6px;border:1px solid transparent;margin-bottom:3px;transition:all .2s;min-height:28px}
    .code-line .ln{color:#475569;min-width:16px;flex-shrink:0;padding-top:2px;user-select:none}
    .code-line .code{color:#64748b;flex:1;line-height:1.5;white-space:pre}
    .code-line.idle{}
    .code-line.done{background:#0d2818;border-color:#064e3b;opacity:.5}
    .code-line.hl-player  {background:#172554;border-color:var(--bl);box-shadow:0 0 10px #3b82f622}
    .code-line.hl-player .code  {color:#bfdbfe}
    .code-line.hl-download{background:#1f1a00;border-color:var(--am);box-shadow:0 0 10px #f59e0b22}
    .code-line.hl-download .code{color:#fde68a}
    .code-line.hl-warn    {background:#450a0a;border-color:var(--rd);box-shadow:0 0 12px #ef444433}
    .code-line.hl-warn .code    {color:#fca5a5}
    .code-line.hl-dead    {background:#300808;border-color:#7f1d1d;animation:pulseD .7s ease-in-out infinite alternate}
    .code-line.hl-dead .code    {color:#fca5a5}
    .code-line.hl-ok      {background:#052e16;border-color:var(--gr);box-shadow:0 0 10px #10b98122}
    .code-line.hl-ok .code      {color:#86efac}
    @keyframes pulseD{from{opacity:.6}to{opacity:1}}

    /* 중앙 상태 패널 */
    .state-box{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px;text-align:center;display:flex;flex-direction:column;gap:12px}
    .st-item{}
    .st-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:5px}
    .st-val{font-size:0.82rem;font-weight:700;padding:6px 8px;border-radius:7px;background:var(--bg);border:1px solid var(--bd);color:var(--mu);transition:all .25s;line-height:1.35}
    .st-val.by-player  {background:#172554;border-color:var(--bl);color:#93c5fd}
    .st-val.by-download{background:#1f1a00;border-color:var(--am);color:#fde68a}
    .st-val.buf-full   {background:#1f1a00;border-color:var(--am);color:#fde68a}
    .st-val.sig-lost   {background:#450a0a;border-color:var(--rd);color:#fca5a5;animation:pulseD .7s ease-in-out infinite alternate}
    .st-val.sig-ok     {background:#052e16;border-color:var(--gr);color:#6ee7b7}

    .gap-badge{padding:7px 8px;border-radius:7px;font-size:0.7rem;font-weight:700;background:#450a0a;border:1px solid var(--rd);color:#fca5a5;display:none;line-height:1.4}
    .gap-badge.show{display:block}

    /* 설명 */
    .step-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:14px}
    .step-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:5px}
    .step-desc{font-size:0.9rem;color:#cbd5e1;line-height:1.6}
    .step-desc .wt{color:#fca5a5;font-weight:700}
    .step-desc .ok{color:#6ee7b7;font-weight:700}

    .result-box{padding:12px 16px;border-radius:8px;font-size:0.9rem;font-weight:700;text-align:center;margin-bottom:14px;display:none}
    .result-box.bad {background:#450a0a;border:1px solid var(--rd);color:#fca5a5}
    .result-box.good{background:#052e16;border:1px solid #059669;color:#34d399}

    .controls{display:flex;gap:9px}
    button{padding:9px 18px;border:none;border-radius:7px;cursor:pointer;font-size:0.85rem;font-weight:700;font-family:inherit;transition:all .12s}
    #btnNext{background:var(--bl);color:#fff;flex:1}
    #btnNext:hover:not(:disabled){background:#2563eb}
    #btnNext:disabled{background:#1e3a5f;color:#334155;cursor:not-allowed}
    #btnReset{background:var(--s1);color:var(--mu);border:1px solid var(--bd)}
    #btnReset:hover{background:#334155}
  </style>
</head>
<body>

<h1>wait()의 원자성 — 신호 유실이 일어나는 이유</h1>
<p class="sub">재생 스레드 (버퍼가 빌 때 기다림)  ·  다운로드 스레드 (버퍼에 데이터를 채움)</p>

<div class="mode-bar">
  <button class="mode-btn" id="btnBad"  onclick="setMode('bad')">원자적이지 않은 경우 — 신호 유실</button>
  <button class="mode-btn" id="btnGood" onclick="setMode('good')">wait()이 원자적인 경우 — 올바른 동작</button>
</div>

<div class="arena">
  <div class="thread-box t-player">
    <div class="thread-title">재생 스레드</div>
    <div class="code-lines" id="code-player"></div>
  </div>

  <div class="state-box">
    <div class="st-item">
      <div class="st-label">Mutex</div>
      <div class="st-val" id="st-mutex">free</div>
    </div>
    <div class="st-item">
      <div class="st-label">Buffer</div>
      <div class="st-val" id="st-buf">비어있음</div>
    </div>
    <div class="st-item">
      <div class="st-label">Signal</div>
      <div class="st-val" id="st-sig">—</div>
    </div>
    <div class="gap-badge" id="gap-badge">⚠ 위험 구간<br>아직 안 잠든 상태</div>
  </div>

  <div class="thread-box t-download">
    <div class="thread-title">다운로드 스레드</div>
    <div class="code-lines" id="code-download"></div>
  </div>
</div>

<div class="step-card">
  <div class="step-label" id="stepLabel">초기 상태</div>
  <div class="step-desc"  id="stepDesc">모드를 선택하세요.</div>
</div>

<div id="resultBox" class="result-box"></div>

<div class="controls">
  <button id="btnReset">↺ 처음</button>
  <button id="btnNext">다음 단계 →</button>
</div>

<script>
const CODE_PLAYER_BAD = [
  'mutex.lock()',
  'while buffer is empty:',
  '    mutex.unlock()    # ① 먼저 반납',
  '    # ↑ 여기서 다운로드 스레드가 치고 들어올 수 있음',
  '    sleep()           # ② 이제야 잠든다',
  'data = buffer.pop()',
  'mutex.unlock()',
];
const CODE_PLAYER_GOOD = [
  'mutex.lock()',
  'while buffer is empty:',
  '    wait(mutex)       # 반납 + 잠듦 (원자적)',
  'data = buffer.pop()',
  'mutex.unlock()',
];
const CODE_DOWNLOAD = [
  'mutex.lock()',
  'buffer.append(data)',
  'notify()',
  'mutex.unlock()',
];

// { label, desc, pLine, pCls, dLine, dCls, mutex, buf, sig, gap, done, result }
const STEPS_BAD = [
  { label:'초기 상태',
    desc:'재생 스레드가 뮤텍스를 잡고 버퍼를 확인합니다. 비어있어 기다려야 합니다.',
    pLine:1, pCls:'hl-player', dLine:-1, dCls:null,
    mutex:'player', buf:false, sig:null, gap:false },

  { label:'Step 1 — 뮤텍스 반납',
    desc:'<span class="wt">잠들기 전에 뮤텍스를 먼저 반납합니다.</span> 이 순간부터 다운로드 스레드가 언제든 진입할 수 있습니다.',
    pLine:2, pCls:'hl-warn', dLine:-1, dCls:null,
    mutex:null, buf:false, sig:null, gap:true },

  { label:'Step 2 — ⚠ 위험 구간: 다운로드 진입',
    desc:'<span class="wt">바로 이 틈에</span> 다운로드 스레드가 뮤텍스를 잡습니다. 재생 스레드는 아직 <code>sleep()</code>을 호출하지 않았습니다.',
    pLine:3, pCls:'hl-warn', dLine:0, dCls:'hl-download',
    mutex:'download', buf:false, sig:null, gap:true },

  { label:'Step 3 — 버퍼에 데이터 추가',
    desc:'다운로드 스레드가 버퍼에 데이터를 넣습니다. 이제 재생 스레드가 깨어날 조건이 만들어졌습니다.',
    pLine:3, pCls:'hl-warn', dLine:1, dCls:'hl-download',
    mutex:'download', buf:true, sig:null, gap:true },

  { label:'Step 4 — ✗ notify() 발사, 신호 유실',
    desc:'<span class="wt">notify()를 발사합니다. 하지만 재생 스레드는 아직 sleep() 전입니다.</span> 신호는 잠든 스레드에게만 전달됩니다. 아직 깨어있는 재생 스레드는 신호를 받지 못합니다.',
    pLine:3, pCls:'hl-warn', dLine:2, dCls:'hl-warn',
    mutex:'download', buf:true, sig:'lost', gap:true },

  { label:'Step 5 — 다운로드 완료',
    desc:'다운로드 스레드가 뮤텍스를 반납하고 종료됩니다. 버퍼에 데이터가 있지만, 신호는 이미 사라졌습니다.',
    pLine:3, pCls:'hl-warn', dLine:3, dCls:null,
    mutex:null, buf:true, sig:'lost', gap:false },

  { label:'Step 6 — 💀 영원히 잠든다',
    desc:'<span class="wt">재생 스레드가 이제야 sleep()을 호출합니다. 신호는 이미 지나갔고, 깨워줄 사람이 없습니다. 영원히 잠듭니다.</span> 버퍼에 데이터가 있는데도 재생이 멈춥니다.',
    pLine:4, pCls:'hl-dead', dLine:-1, dCls:null,
    mutex:null, buf:true, sig:'lost', gap:false,
    done:true, result:'bad' },
];

const STEPS_GOOD = [
  { label:'초기 상태',
    desc:'재생 스레드가 뮤텍스를 잡고 버퍼를 확인합니다. 비어있어 wait()을 호출할 준비를 합니다.',
    pLine:1, pCls:'hl-player', dLine:-1, dCls:null,
    mutex:'player', buf:false, sig:null, gap:false },

  { label:'Step 1 — wait() 호출 (원자적)',
    desc:'<span class="ok">wait(mutex)를 호출합니다. 뮤텍스 반납과 잠듦이 끊김 없이 처리됩니다.</span> 틈이 생기지 않습니다. 재생 스레드는 즉시 대기 큐에 등록됩니다.',
    pLine:2, pCls:'hl-ok', dLine:-1, dCls:null,
    mutex:null, buf:false, sig:null, gap:false },

  { label:'Step 2 — 다운로드 뮤텍스 획득',
    desc:'다운로드 스레드가 뮤텍스를 획득합니다. <span class="ok">재생 스레드는 이미 안전하게 잠들어 대기 큐에 있습니다.</span>',
    pLine:2, pCls:'hl-ok', dLine:0, dCls:'hl-download',
    mutex:'download', buf:false, sig:null, gap:false },

  { label:'Step 3 — 버퍼에 데이터 추가',
    desc:'다운로드 스레드가 버퍼에 데이터를 넣습니다.',
    pLine:2, pCls:'hl-ok', dLine:1, dCls:'hl-download',
    mutex:'download', buf:true, sig:null, gap:false },

  { label:'Step 4 — ✓ notify() 수신 성공',
    desc:'<span class="ok">notify()를 발사합니다. 재생 스레드는 이미 wait() 안에서 잠들어 있으므로 신호를 정상 수신합니다.</span>',
    pLine:2, pCls:'hl-ok', dLine:2, dCls:'hl-ok',
    mutex:'download', buf:true, sig:'ok', gap:false },

  { label:'Step 5 — 재생 스레드 깨어남',
    desc:'다운로드 스레드가 뮤텍스를 반납하고, 재생 스레드가 깨어나 뮤텍스를 재획득합니다.',
    pLine:2, pCls:'hl-player', dLine:3, dCls:null,
    mutex:'player', buf:true, sig:'ok', gap:false },

  { label:'Step 6 — ✓ 정상 처리',
    desc:'<span class="ok">while 조건을 재확인합니다. 버퍼에 데이터가 있으므로 루프를 빠져나가 데이터를 꺼냅니다. 정상 처리됩니다.</span>',
    pLine:3, pCls:'hl-ok', dLine:-1, dCls:null,
    mutex:'player', buf:false, sig:'ok', gap:false,
    done:true, result:'good' },
];

// ── 상태 ──────────────────────────────────────────────────────────
let mode = null, steps = [], cur = -1;
const donePL = new Set(), doneDL = new Set();

function setMode(m) {
  mode = m;
  steps = m === 'bad' ? STEPS_BAD : STEPS_GOOD;
  document.getElementById('btnBad').className  = 'mode-btn' + (m==='bad'  ? ' on-bad'  : '');
  document.getElementById('btnGood').className = 'mode-btn' + (m==='good' ? ' on-good' : '');
  const pCode = m === 'bad' ? CODE_PLAYER_BAD : CODE_PLAYER_GOOD;
  buildCode('code-player',   pCode, 'p');
  buildCode('code-download', CODE_DOWNLOAD, 'd');
  cur = -1; donePL.clear(); doneDL.clear();
  resetUI();
}

function buildCode(id, lines, prefix) {
  document.getElementById(id).innerHTML = lines.map((c, i) =>
    `<div class="code-line idle" id="${prefix}l${i}"><span class="ln">${i+1}</span><span class="code">${esc(c)}</span></div>`
  ).join('');
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function resetUI() {
  document.querySelectorAll('.code-line').forEach(el => el.className='code-line idle');
  setSt('st-mutex', 'free', '');
  setSt('st-buf', '비어있음', '');
  setSt('st-sig', '—', '');
  document.getElementById('gap-badge').className = 'gap-badge';
  document.getElementById('stepLabel').textContent = '초기 상태';
  document.getElementById('stepDesc').innerHTML = '다음 단계 버튼을 눌러 진행하세요.';
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('btnNext').disabled = false;
}

function setSt(id, text, cls) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'st-val' + (cls ? ' '+cls : '');
}

function applyStep(s) {
  const pLen = (mode==='bad' ? CODE_PLAYER_BAD : CODE_PLAYER_GOOD).length;
  const dLen = CODE_DOWNLOAD.length;

  // clear non-done
  for (let i=0;i<pLen;i++) { const el=document.getElementById('pl'+i); if(el&&!donePL.has(i)) el.className='code-line idle'; }
  for (let i=0;i<dLen;i++) { const el=document.getElementById('dl'+i); if(el&&!doneDL.has(i)) el.className='code-line idle'; }

  // mark prev as done
  if (cur > 0) {
    const prev = steps[cur-1];
    if (prev.pLine>=0 && !donePL.has(prev.pLine)) { donePL.add(prev.pLine); const el=document.getElementById('pl'+prev.pLine); if(el) el.className='code-line done'; }
    if (prev.dLine>=0 && !doneDL.has(prev.dLine)) { doneDL.add(prev.dLine); const el=document.getElementById('dl'+prev.dLine); if(el) el.className='code-line done'; }
  }

  // active
  if (s.pLine>=0) { const el=document.getElementById('pl'+s.pLine); if(el) el.className='code-line '+(s.pCls||'hl-player'); }
  if (s.dLine>=0) { const el=document.getElementById('dl'+s.dLine); if(el) el.className='code-line '+(s.dCls||'hl-download'); }

  document.getElementById('stepLabel').textContent = s.label;
  document.getElementById('stepDesc').innerHTML = s.desc;
  document.getElementById('gap-badge').className = 'gap-badge' + (s.gap?' show':'');

  // state values
  const mv = document.getElementById('st-mutex');
  mv.className = 'st-val' + (s.mutex==='player'?' by-player':s.mutex==='download'?' by-download':'');
  mv.textContent = s.mutex==='player'?'재생 스레드':s.mutex==='download'?'다운로드 스레드':'free';

  const bv = document.getElementById('st-buf');
  bv.className = 'st-val' + (s.buf?' buf-full':'');
  bv.textContent = s.buf ? '📦 데이터 있음' : '비어있음';

  const sv = document.getElementById('st-sig');
  sv.className = 'st-val' + (s.sig==='lost'?' sig-lost':s.sig==='ok'?' sig-ok':'');
  sv.textContent = s.sig==='lost'?'✗ 유실됨':s.sig==='ok'?'✓ 수신됨':'—';

  const rb = document.getElementById('resultBox');
  if (s.done) {
    rb.style.display = 'block';
    rb.className = 'result-box ' + s.result;
    rb.textContent = s.result==='bad'
      ? '✗  신호 유실 — 재생 스레드가 영원히 잠든다. 버퍼에 데이터가 있어도 재생이 불가능해진다.'
      : '✓  wait()의 원자성이 신호 유실을 막는다. 재생 스레드가 정상적으로 깨어나 처리를 이어간다.';
    document.getElementById('btnNext').disabled = true;
  } else {
    rb.style.display = 'none';
    document.getElementById('btnNext').disabled = false;
  }
}

function next() {
  if (!mode || cur >= steps.length-1) return;
  cur++;
  applyStep(steps[cur]);
}

document.getElementById('btnNext').addEventListener('click', next);
document.getElementById('btnReset').addEventListener('click', () => setMode(mode||'bad'));

setMode('bad');
</script>
</body>
</html>
