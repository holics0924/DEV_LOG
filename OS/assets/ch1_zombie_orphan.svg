<svg width="560" height="270" viewBox="0 0 560 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'Trebuchet MS', Arial, sans-serif; }</style>
    <marker id="arr"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6e7681"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3fb950"/></marker>
  </defs>

  <rect width="560" height="270" fill="#0d1117" rx="12"/>

  <!-- Divider -->
  <line x1="280" y1="20" x2="280" y2="258" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: Zombie -->
  <text x="140" y="22" text-anchor="middle" fill="#f85149" font-size="11" font-weight="700">Zombie 프로세스</text>

  <rect x="65" y="38" width="150" height="36" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="140" y="56" text-anchor="middle" fill="#e6edf3" font-size="11">부모 (살아있음)</text>
  <text x="140" y="69" text-anchor="middle" fill="#6e7681" font-size="9">wait() 호출 안 함</text>

  <line x1="140" y1="74" x2="140" y2="108" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="50" y="110" width="180" height="42" rx="8" fill="#2d0f0f" stroke="#f85149" stroke-width="1.5"/>
  <text x="140" y="128" text-anchor="middle" fill="#f85149" font-size="12" font-weight="700">자식 (Zombie)</text>
  <text x="140" y="144" text-anchor="middle" fill="#8b949e" font-size="9">자원 해제됨 — PCB만 잔존</text>

  <text x="140" y="182" text-anchor="middle" fill="#6e7681" font-size="10">메모리 해제 ✓  |  PID 점유 중 ✗</text>
  <text x="140" y="200" text-anchor="middle" fill="#f85149" font-size="10">쌓이면 PID 고갈 → fork() 실패</text>

  <!-- RIGHT: Orphan -->
  <text x="420" y="22" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">고아 (Orphan) 프로세스</text>

  <rect x="340" y="38" width="160" height="36" rx="8" fill="#2d0f0f" stroke="#f85149" stroke-width="1.5"/>
  <text x="420" y="56" text-anchor="middle" fill="#f85149" font-size="11">부모 (사망 ✗)</text>
  <text x="420" y="69" text-anchor="middle" fill="#6e7681" font-size="9">먼저 종료됨</text>

  <rect x="345" y="115" width="150" height="36" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="420" y="138" text-anchor="middle" fill="#d29922" font-size="11">자식 (고아)</text>

  <line x1="420" y1="151" x2="420" y2="182" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="440" y="170" fill="#3fb950" font-size="9">즉시 재입양</text>

  <rect x="360" y="184" width="120" height="36" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="2"/>
  <text x="420" y="202" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">PID 1 (init)</text>
  <text x="420" y="215" text-anchor="middle" fill="#6e7681" font-size="9">wait()으로 수거</text>
</svg>
