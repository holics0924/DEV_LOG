<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
  </marker>
  <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
  </marker></defs>
  <rect width="680" height="200" fill="#0d1117" rx="12"/>
  <text x="340" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">소켓 — 양방향 통신</text>

  <!-- Process A -->
  <rect x="20" y="40" width="140" height="44" rx="10" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="90" y="62" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">프로세스 A</text>
  <text x="90" y="78" text-anchor="middle" fill="#8b949e" font-size="10">send() / recv()</text>

  <!-- A send buffer -->
  <rect x="180" y="40" width="120" height="44" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="240" y="62" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="700">A send 버퍼</text>
  <text x="240" y="78" text-anchor="middle" fill="#6e7681" font-size="9">커널 관리</text>

  <!-- OS transfer -->
  <rect x="270" y="88" width="140" height="34" rx="8" fill="#2a1f3a" stroke="#6e7681" stroke-width="1.5"/>
  <text x="340" y="110" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="700">OS / 네트워크 스택</text>

  <!-- B recv buffer -->
  <rect x="380" y="40" width="120" height="44" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="440" y="62" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="700">B recv 버퍼</text>
  <text x="440" y="78" text-anchor="middle" fill="#6e7681" font-size="9">커널 관리</text>

  <!-- Process B -->
  <rect x="520" y="40" width="140" height="44" rx="10" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="590" y="62" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">프로세스 B</text>
  <text x="590" y="78" text-anchor="middle" fill="#8b949e" font-size="10">send() / recv()</text>

  <!-- Forward arrows -->
  <line x1="302" y1="62" x2="378" y2="62" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrR)"/>
  <line x1="302" y1="54" x2="302" y2="86" stroke="#f0883e" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="378" y1="86" x2="378" y2="54" stroke="#f0883e" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Return arrows -->
  <line x1="378" y1="72" x2="302" y2="72" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrG)"/>

  <text x="340" y="58" text-anchor="middle" fill="#f0883e" font-size="9">A→B</text>
  <text x="340" y="79" text-anchor="middle" fill="#3fb950" font-size="9">B→A</text>

  <!-- Same machine note -->
  <rect x="60" y="142" width="250" height="34" rx="8" fill="#1f2937" stroke="#6e7681" stroke-width="1"/>
  <text x="185" y="158" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">같은 컴퓨터</text>
  <text x="185" y="170" text-anchor="middle" fill="#6e7681" font-size="10">Unix domain socket</text>

  <!-- Different machine note -->
  <rect x="370" y="142" width="250" height="34" rx="8" fill="#1f2937" stroke="#6e7681" stroke-width="1"/>
  <text x="495" y="158" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">다른 컴퓨터</text>
  <text x="495" y="170" text-anchor="middle" fill="#6e7681" font-size="10">TCP/IP socket → 네트워크 카드 경유</text>

  <text x="340" y="192" text-anchor="middle" fill="#6e7681" font-size="10">양방향 / 무관한 프로세스 간 가능 / 다른 컴퓨터도 가능</text>
</svg>
