<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
  </marker>
  <marker id="arrO" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
  </marker>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#6e7681"/>
  </marker></defs>
  <rect width="680" height="200" fill="#0d1117" rx="12"/>
  <text x="340" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">TLB (Translation Lookaside Buffer)</text>

  <!-- Memory request -->
  <rect x="20" y="80" width="130" height="40" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="85" y="105" text-anchor="middle" fill="#e6edf3" font-size="11">메모리 접근 요청</text>

  <line x1="152" y1="100" x2="198" y2="100" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TLB box -->
  <rect x="200" y="68" width="140" height="64" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="2"/>
  <text x="270" y="92" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">TLB</text>
  <text x="270" y="110" text-anchor="middle" fill="#6e7681" font-size="10">주소 변환 캐시</text>
  <text x="270" y="124" text-anchor="middle" fill="#6e7681" font-size="9">(하드웨어)</text>

  <!-- Hit path -->
  <line x1="342" y1="84" x2="430" y2="60" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrG)"/>
  <rect x="432" y="38" width="220" height="40" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="542" y="55" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">TLB 히트 ✓</text>
  <text x="542" y="71" text-anchor="middle" fill="#6e7681" font-size="10">물리 주소 바로 반환 (빠름)</text>
  <text x="385" y="52" fill="#3fb950" font-size="10">있음</text>

  <!-- Miss path -->
  <line x1="342" y1="116" x2="430" y2="140" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrO)"/>
  <rect x="432" y="122" width="220" height="40" rx="8" fill="#3a2210" stroke="#f0883e" stroke-width="1.5"/>
  <text x="542" y="139" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="700">TLB 미스 ✗</text>
  <text x="542" y="155" text-anchor="middle" fill="#6e7681" font-size="10">페이지 테이블 탐색 (느림)</text>
  <text x="385" y="148" fill="#f0883e" font-size="10">없음</text>

  <text x="340" y="185" text-anchor="middle" fill="#6e7681" font-size="10">프로세스 전환 시 TLB 플러시 → 이후 접근마다 미스 → 느림</text>
</svg>
