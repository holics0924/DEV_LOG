<svg width="680" height="180" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style></defs>
  <rect width="680" height="180" fill="#0d1117" rx="12"/>
  <text x="340" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">뮤텍스 vs 스핀락 — 락 대기 중 CPU 사용량</text>

  <!-- Mutex bar -->
  <text x="160" y="55" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">뮤텍스</text>
  <rect x="40" y="62" width="240" height="44" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="160" y="90" text-anchor="middle" fill="#6e7681" font-size="22" font-weight="700">0%</text>
  <text x="160" y="124" text-anchor="middle" fill="#6e7681" font-size="10">잠들어 있음 (sleep)</text>
  <text x="160" y="137" text-anchor="middle" fill="#6e7681" font-size="10">컨텍스트 스위칭 발생</text>

  <!-- Spinlock bar -->
  <text x="510" y="55" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">스핀락</text>
  <rect x="390" y="62" width="240" height="44" rx="8" fill="#3a2210" stroke="#f0883e" stroke-width="2"/>
  <text x="510" y="90" text-anchor="middle" fill="#f0883e" font-size="22" font-weight="700">100%</text>
  <text x="510" y="124" text-anchor="middle" fill="#f0883e" font-size="10">루프 대기 (spin)</text>
  <text x="510" y="137" text-anchor="middle" fill="#6e7681" font-size="10">컨텍스트 스위칭 없음</text>

  <text x="340" y="163" text-anchor="middle" fill="#6e7681" font-size="10">락을 짧게 쥘 때 → 스핀락 유리  |  락을 오래 쥘 때 → 뮤텍스 유리</text>
</svg>
