<svg width="680" height="160" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style></defs>
  <rect width="680" height="160" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">FCFS  —  평균 대기 시간 17ms</text>

  <!-- P1 (0~24ms): x=40+(0*20)=40, w=480 -->
  <rect x="40" y="38" width="480" height="44" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="280" y="65" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="700">P1  (24ms)</text>

  <!-- P2 (24~27ms): x=40+480=520, w=60 -->
  <rect x="520" y="38" width="60" height="44" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="550" y="65" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">P2</text>

  <!-- P3 (27~30ms): x=580, w=60 -->
  <rect x="580" y="38" width="60" height="44" rx="6" fill="#3a2210" stroke="#f0883e" stroke-width="1.5"/>
  <text x="610" y="65" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">P3</text>

  <!-- Timeline -->
  <line x1="40" y1="92" x2="642" y2="92" stroke="#30363d" stroke-width="1"/>

  <!-- Tick marks and labels -->
  <line x1="40" y1="88" x2="40" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="40" y="110" text-anchor="middle" fill="#8b949e" font-size="11">0</text>

  <line x1="520" y1="88" x2="520" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="520" y="110" text-anchor="middle" fill="#8b949e" font-size="11">24</text>

  <line x1="580" y1="88" x2="580" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="580" y="110" text-anchor="middle" fill="#8b949e" font-size="11">27</text>

  <line x1="640" y1="88" x2="640" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="640" y="110" text-anchor="middle" fill="#8b949e" font-size="11">30</text>

  <!-- Wait time labels -->
  <text x="40" y="138" fill="#8b949e" font-size="11">P1 대기 0ms</text>
  <text x="210" y="138" fill="#58a6ff" font-size="11">P2 대기 24ms</text>
  <text x="420" y="138" fill="#f0883e" font-size="11">P3 대기 27ms</text>

  <text x="640" y="110" text-anchor="middle" fill="#8b949e" font-size="11">ms</text>
</svg>
