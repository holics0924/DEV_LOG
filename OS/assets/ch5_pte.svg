<svg width="720" height="170" viewBox="0 0 720 170" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style></defs>
  <rect width="720" height="170" fill="#0d1117" rx="12"/>
  <text x="360" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">페이지 테이블 엔트리 (PTE) 구조</text>

  <!-- PFN field -->
  <rect x="20" y="38" width="280" height="50" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="160" y="60" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700">물리 프레임 번호 (PFN)</text>
  <text x="160" y="78" text-anchor="middle" fill="#8b949e" font-size="11">이 가상 페이지가 RAM 어디에 있는지</text>

  <!-- valid bit -->
  <rect x="310" y="38" width="90" height="50" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="355" y="60" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">valid</text>
  <text x="355" y="78" text-anchor="middle" fill="#8b949e" font-size="10">RAM 존재 여부</text>
  <text x="355" y="104" text-anchor="middle" fill="#484f58" font-size="10">0 = 디스크에 있음</text>
  <text x="355" y="116" text-anchor="middle" fill="#484f58" font-size="10">→ 접근 시 페이지 폴트</text>

  <!-- reference bit -->
  <rect x="410" y="38" width="90" height="50" rx="6" fill="#2d1f0e" stroke="#d29922" stroke-width="1.5"/>
  <text x="455" y="60" text-anchor="middle" fill="#d29922" font-size="12" font-weight="700">ref</text>
  <text x="455" y="78" text-anchor="middle" fill="#8b949e" font-size="10">최근 접근 여부</text>
  <text x="455" y="104" text-anchor="middle" fill="#484f58" font-size="10">접근 시 H/W가</text>
  <text x="455" y="116" text-anchor="middle" fill="#484f58" font-size="10">자동으로 1 세팅</text>

  <!-- dirty bit -->
  <rect x="510" y="38" width="90" height="50" rx="6" fill="#2a1a1a" stroke="#f85149" stroke-width="1.5"/>
  <text x="555" y="60" text-anchor="middle" fill="#f85149" font-size="12" font-weight="700">dirty</text>
  <text x="555" y="78" text-anchor="middle" fill="#8b949e" font-size="10">수정 여부</text>
  <text x="555" y="104" text-anchor="middle" fill="#484f58" font-size="10">1 = 수정된 상태</text>
  <text x="555" y="116" text-anchor="middle" fill="#484f58" font-size="10">교체 시 write-back</text>

  <!-- rwx bits -->
  <rect x="610" y="38" width="90" height="50" rx="6" fill="#2a1f3a" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="655" y="60" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="700">rwx</text>
  <text x="655" y="78" text-anchor="middle" fill="#8b949e" font-size="10">읽기/쓰기/실행</text>
  <text x="655" y="110" text-anchor="middle" fill="#484f58" font-size="10">위반 시 segfault</text>
</svg>
