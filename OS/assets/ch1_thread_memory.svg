<svg width="500" height="220" viewBox="0 0 500 220" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style></defs>
  <rect width="500" height="220" fill="#0d1117" rx="12"/>
  <text x="250" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">스레드 메모리 구조</text>

  <!-- Process outer box -->
  <rect x="30" y="36" width="440" height="168" rx="10" fill="#161b22" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="250" y="56" text-anchor="middle" fill="#6e7681" font-size="11">프로세스</text>

  <!-- Shared area -->
  <rect x="50" y="64" width="400" height="52" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="250" y="84" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">코드  |  데이터  |  힙</text>
  <text x="250" y="102" text-anchor="middle" fill="#6e7681" font-size="10">← 스레드가 공유</text>

  <!-- Stack A -->
  <rect x="50" y="126" width="190" height="60" rx="8" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="145" y="152" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">스택 A</text>
  <text x="145" y="170" text-anchor="middle" fill="#6e7681" font-size="10">스레드 A 독립</text>

  <!-- Stack B -->
  <rect x="260" y="126" width="190" height="60" rx="8" fill="#3a1a27" stroke="#f0883e" stroke-width="1.5"/>
  <text x="355" y="152" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">스택 B</text>
  <text x="355" y="170" text-anchor="middle" fill="#6e7681" font-size="10">스레드 B 독립</text>

  <text x="145" y="205" text-anchor="middle" fill="#3fb950" font-size="11">스레드 A</text>
  <text x="355" y="205" text-anchor="middle" fill="#f0883e" font-size="11">스레드 B</text>
</svg>
