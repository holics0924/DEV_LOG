<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style></defs>
  <rect width="500" height="200" fill="#0d1117" rx="12"/>
  <text x="250" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">공유 메모리</text>

  <!-- Process A -->
  <rect x="20" y="60" width="130" height="60" rx="10" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="85" y="86" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">프로세스 A</text>
  <text x="85" y="108" text-anchor="middle" fill="#6e7681" font-size="10">직접 읽고 씀</text>

  <!-- Process B -->
  <rect x="350" y="60" width="130" height="60" rx="10" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="415" y="86" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">프로세스 B</text>
  <text x="415" y="108" text-anchor="middle" fill="#6e7681" font-size="10">직접 읽고 씀</text>

  <!-- Shared memory region -->
  <rect x="165" y="50" width="170" height="80" rx="10" fill="#2a1f3a" stroke="#bc8cff" stroke-width="2"/>
  <text x="250" y="78" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="700">공유 메모리</text>
  <text x="250" y="96" text-anchor="middle" fill="#8b949e" font-size="10">OS가 두 프로세스</text>
  <text x="250" y="110" text-anchor="middle" fill="#8b949e" font-size="10">주소 공간에 매핑</text>

  <!-- Lines from processes to shared memory -->
  <line x1="152" y1="90" x2="163" y2="90" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="337" y1="90" x2="336" y2="90" stroke="#3fb950" stroke-width="1.5"/>

  <rect x="100" y="158" width="300" height="30" rx="6" fill="#3a1010" stroke="#f0883e" stroke-width="1.5"/>
  <text x="250" y="172" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">Race Condition 주의 → 뮤텍스로 보호 필요</text>
  <text x="250" y="184" text-anchor="middle" fill="#6e7681" font-size="9">IPC 중 가장 빠름 (커널 경유 없이 직접 접근)</text>
</svg>
