<svg width="500" height="280" viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
  </marker>
  <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
  </marker></defs>
  <rect width="500" height="280" fill="#0d1117" rx="12"/>
  <text x="250" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">데드락 — 순환 대기</text>

  <!-- Thread A -->
  <rect x="30" y="100" width="130" height="50" rx="10" fill="#1c3a5e" stroke="#58a6ff" stroke-width="2"/>
  <text x="95" y="122" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">스레드 A</text>
  <text x="95" y="140" text-anchor="middle" fill="#8b949e" font-size="10">자원 1 보유 중</text>

  <!-- Thread B -->
  <rect x="340" y="100" width="130" height="50" rx="10" fill="#1a3a27" stroke="#3fb950" stroke-width="2"/>
  <text x="405" y="122" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">스레드 B</text>
  <text x="405" y="140" text-anchor="middle" fill="#8b949e" font-size="10">자원 2 보유 중</text>

  <!-- Resource 1 -->
  <rect x="60" y="200" width="100" height="44" rx="10" fill="#2a1f3a" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="110" y="227" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="700">자원 1</text>

  <!-- Resource 2 -->
  <rect x="340" y="200" width="100" height="44" rx="10" fill="#2a1f3a" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="390" y="227" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="700">자원 2</text>

  <!-- A holds 1, wants 2 -->
  <path d="M 95 150 Q 95 240 160 222" fill="none" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="3,2"/>
  <path d="M 162 125 Q 250 80 338 125" fill="none" stroke="#f0883e" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrR)"/>
  <text x="250" y="70" text-anchor="middle" fill="#f0883e" font-size="10">A → 자원 2 요청 (대기 중)</text>

  <!-- B holds 2, wants 1 -->
  <path d="M 405 150 Q 405 240 342 222" fill="none" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="3,2"/>
  <path d="M 338 135 Q 250 188 162 135" fill="none" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrB)"/>
  <text x="250" y="188" text-anchor="middle" fill="#58a6ff" font-size="10">B → 자원 1 요청 (대기 중)</text>

  <text x="250" y="262" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="700">서로를 기다리며 영원히 멈춤</text>
</svg>
