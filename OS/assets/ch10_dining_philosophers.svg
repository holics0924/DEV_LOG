<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 520" width="540" height="520">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arr-want" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef444488"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="540" height="520" fill="#0f172a" rx="12"/>

  <!-- 제목 -->
  <text x="270" y="30" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="0.5">데드락 상태 — 모두가 왼쪽 포크만 들고 오른쪽을 기다린다</text>

  <!-- 테이블 원 -->
  <circle cx="270" cy="275" r="80" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="270" y="271" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">원형</text>
  <text x="270" y="286" text-anchor="middle" fill="#475569" font-size="11" font-family="system-ui,sans-serif">테이블</text>

  <!-- ===== 철학자 위치 =====
    P0: (270, 115)  — 위
    P1: (415, 207)  — 우상
    P2: (357, 388)  — 우하
    P3: (183, 388)  — 좌하
    P4: (125, 207)  — 좌상
  -->

  <!-- ===== 포크 위치 (철학자 사이, 반경 95) =====
    F0 (P0-P1): (342, 178)
    F1 (P1-P2): (375, 295)
    F2 (P2-P3): (270, 365)
    F3 (P3-P4): (165, 295)
    F4 (P4-P0): (198, 178)
  -->

  <!-- 포크 (철학자가 왼쪽 포크를 들었으므로 왼쪽 포크 색상 변경) -->
  <!-- F0 held by P1 (P1의 왼쪽) → 색상: P1 color -->
  <!-- F1 held by P2 → P2 color -->
  <!-- F2 held by P3 → P3 color -->
  <!-- F3 held by P4 → P4 color -->
  <!-- F4 held by P0 → P0 color -->

  <!-- 포크 F0 — P1이 보유 (파란색) -->
  <rect x="333" y="163" width="18" height="32" rx="4" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5" transform="rotate(-26 342 179)"/>
  <text x="355" y="162" fill="#60a5fa" font-size="10" font-family="system-ui,sans-serif" font-weight="700">F0</text>

  <!-- 포크 F1 — P2가 보유 (초록색) -->
  <rect x="366" y="280" width="18" height="32" rx="4" fill="#052e16" stroke="#10b981" stroke-width="1.5" transform="rotate(54 375 296)"/>
  <text x="387" y="292" fill="#34d399" font-size="10" font-family="system-ui,sans-serif" font-weight="700">F1</text>

  <!-- 포크 F2 — P3가 보유 (보라색) -->
  <rect x="261" y="350" width="18" height="32" rx="4" fill="#2e1065" stroke="#a78bfa" stroke-width="1.5" transform="rotate(0 270 366)"/>
  <text x="282" y="380" fill="#c4b5fd" font-size="10" font-family="system-ui,sans-serif" font-weight="700">F2</text>

  <!-- 포크 F3 — P4가 보유 (주황색) -->
  <rect x="156" y="280" width="18" height="32" rx="4" fill="#431407" stroke="#f97316" stroke-width="1.5" transform="rotate(-54 165 296)"/>
  <text x="132" y="292" fill="#fb923c" font-size="10" font-family="system-ui,sans-serif" font-weight="700">F3</text>

  <!-- 포크 F4 — P0가 보유 (빨간색/핑크) -->
  <rect x="189" y="163" width="18" height="32" rx="4" fill="#4c0519" stroke="#f43f5e" stroke-width="1.5" transform="rotate(26 198 179)"/>
  <text x="170" y="162" fill="#fb7185" font-size="10" font-family="system-ui,sans-serif" font-weight="700">F4</text>

  <!-- ===== 철학자들 ===== -->

  <!-- P0 (위, 핑크) — F4 보유, F0 원함 -->
  <circle cx="270" cy="115" r="32" fill="#1e0f1f" stroke="#f43f5e" stroke-width="2"/>
  <text x="270" y="110" text-anchor="middle" fill="#fda4af" font-size="11" font-family="system-ui,sans-serif" font-weight="700">P0</text>
  <text x="270" y="124" text-anchor="middle" fill="#f43f5e" font-size="9" font-family="system-ui,sans-serif">F4 보유</text>
  <!-- P0가 F0을 원함 → 빨간 점선 화살표 -->
  <line x1="292" y1="127" x2="335" y2="162" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-want)"/>

  <!-- P1 (우상, 파랑) — F0 보유, F1 원함 -->
  <circle cx="415" cy="207" r="32" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="415" y="202" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="system-ui,sans-serif" font-weight="700">P1</text>
  <text x="415" y="216" text-anchor="middle" fill="#3b82f6" font-size="9" font-family="system-ui,sans-serif">F0 보유</text>
  <!-- P1이 F1을 원함 -->
  <line x1="409" y1="237" x2="387" y2="278" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-want)"/>

  <!-- P2 (우하, 초록) — F1 보유, F2 원함 -->
  <circle cx="357" cy="388" r="32" fill="#0a1f14" stroke="#10b981" stroke-width="2"/>
  <text x="357" y="383" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="system-ui,sans-serif" font-weight="700">P2</text>
  <text x="357" y="397" text-anchor="middle" fill="#10b981" font-size="9" font-family="system-ui,sans-serif">F1 보유</text>
  <!-- P2가 F2를 원함 -->
  <line x1="330" y1="395" x2="290" y2="370" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-want)"/>

  <!-- P3 (좌하, 보라) — F2 보유, F3 원함 -->
  <circle cx="183" cy="388" r="32" fill="#170f2e" stroke="#a78bfa" stroke-width="2"/>
  <text x="183" y="383" text-anchor="middle" fill="#ddd6fe" font-size="11" font-family="system-ui,sans-serif" font-weight="700">P3</text>
  <text x="183" y="397" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="system-ui,sans-serif">F2 보유</text>
  <!-- P3가 F3을 원함 -->
  <line x1="170" y1="360" x2="163" y2="310" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-want)"/>

  <!-- P4 (좌상, 주황) — F3 보유, F4 원함 -->
  <circle cx="125" cy="207" r="32" fill="#1c0f04" stroke="#f97316" stroke-width="2"/>
  <text x="125" y="202" text-anchor="middle" fill="#fdba74" font-size="11" font-family="system-ui,sans-serif" font-weight="700">P4</text>
  <text x="125" y="216" text-anchor="middle" fill="#f97316" font-size="9" font-family="system-ui,sans-serif">F3 보유</text>
  <!-- P4가 F4를 원함 -->
  <line x1="141" y1="181" x2="185" y2="162" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-want)"/>

  <!-- 범례 -->
  <rect x="20" y="450" width="500" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="36" y="466" width="14" height="14" rx="3" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="56" y="477" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">보유 중인 포크 (실선)</text>
  <line x1="190" y1="473" x2="220" y2="473" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-want)"/>
  <text x="228" y="477" fill="#94a3b8" font-size="11" font-family="system-ui,sans-serif">원하는 포크 (점선)</text>
  <text x="36" y="494" fill="#ef4444" font-size="11" font-family="system-ui,sans-serif" font-weight="700">→ 5개의 순환 대기 → 데드락. 아무도 식사를 시작할 수 없다.</text>
</svg>
