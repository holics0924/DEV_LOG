<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#6e7681"/>
  </marker></defs>
  <rect width="680" height="200" fill="#0d1117" rx="12"/>
  <text x="340" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">뮤텍스 동작</text>

  <!-- Thread A flow -->
  <text x="180" y="48" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">스레드 A</text>

  <rect x="40" y="58" width="280" height="34" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="180" y="80" text-anchor="middle" fill="#58a6ff" font-size="12">lock() 획득</text>

  <line x1="180" y1="94" x2="180" y2="114" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="40" y="116" width="280" height="34" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="180" y="138" text-anchor="middle" fill="#3fb950" font-size="12">임계 구역 실행</text>

  <line x1="180" y1="152" x2="180" y2="172" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="40" y="174" width="280" height="20" rx="6" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="180" y="188" text-anchor="middle" fill="#8b949e" font-size="11">unlock()</text>

  <!-- Thread B flow -->
  <text x="510" y="48" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">스레드 B</text>

  <rect x="370" y="58" width="280" height="34" rx="6" fill="#3a2210" stroke="#f0883e" stroke-width="1.5"/>
  <text x="510" y="80" text-anchor="middle" fill="#f0883e" font-size="12">lock() 호출 → 대기</text>

  <!-- Wait arrow (B waits while A runs) -->
  <line x1="510" y1="94" x2="510" y2="172" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="640" y="140" text-anchor="middle" fill="#f0883e" font-size="10">A가 unlock</text>
  <text x="640" y="153" text-anchor="middle" fill="#f0883e" font-size="10">할 때까지</text>
  <text x="640" y="166" text-anchor="middle" fill="#f0883e" font-size="10">sleep</text>

  <rect x="370" y="174" width="280" height="20" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="510" y="188" text-anchor="middle" fill="#58a6ff" font-size="11">lock() 획득 후 실행</text>
</svg>
