<svg width="580" height="290" viewBox="0 0 580 290" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'Trebuchet MS', Arial, sans-serif; }</style>
    <marker id="arrB" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#58a6ff"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3fb950"/></marker>
    <marker id="arrY" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#d29922"/></marker>
    <marker id="arrGr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6e7681"/></marker>
  </defs>

  <rect width="580" height="290" fill="#0d1117" rx="12"/>
  <text x="290" y="20" text-anchor="middle" fill="#6e7681" font-size="11" font-weight="700">스케줄러 세 단계</text>

  <!-- Disk (New) -->
  <rect x="20" y="90" width="110" height="50" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="75" y="112" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">디스크</text>
  <text x="75" y="128" text-anchor="middle" fill="#6e7681" font-size="9">프로그램 파일</text>

  <!-- Ready Queue -->
  <rect x="220" y="90" width="120" height="50" rx="8" fill="#1c3a5e" stroke="#58a6ff" stroke-width="2"/>
  <text x="280" y="112" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">Ready 큐</text>
  <text x="280" y="128" text-anchor="middle" fill="#6e7681" font-size="9">메모리 상주</text>

  <!-- Running -->
  <rect x="440" y="90" width="110" height="50" rx="8" fill="#0d2818" stroke="#3fb950" stroke-width="2"/>
  <text x="495" y="112" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">Running</text>
  <text x="495" y="128" text-anchor="middle" fill="#6e7681" font-size="9">CPU 점유</text>

  <!-- Long-term arrow: Disk → Ready -->
  <line x1="132" y1="115" x2="217" y2="115" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="175" y="106" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="700">장기 스케줄러</text>
  <text x="175" y="130" text-anchor="middle" fill="#6e7681" font-size="8">드물게 실행</text>

  <!-- Short-term arrow: Ready → Running -->
  <line x1="342" y1="115" x2="437" y2="115" stroke="#3fb950" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="390" y="106" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="700">단기 스케줄러</text>
  <text x="390" y="130" text-anchor="middle" fill="#6e7681" font-size="8">ms 단위 실행</text>

  <!-- Running → Ready (preempt, back arrow) -->
  <path d="M 440 130 Q 390 155 342 130" fill="none" stroke="#6e7681" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrGr)"/>
  <text x="390" y="160" text-anchor="middle" fill="#484f58" font-size="8">선점 / 타임아웃</text>

  <!-- Suspended box -->
  <rect x="220" y="215" width="120" height="48" rx="8" fill="#1a1a1a" stroke="#d29922" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="280" y="237" text-anchor="middle" fill="#d29922" font-size="11" font-weight="600">Suspended</text>
  <text x="280" y="253" text-anchor="middle" fill="#6e7681" font-size="9">swap out (디스크)</text>

  <!-- Medium-term: Ready Queue ↔ Suspended -->
  <line x1="265" y1="142" x2="258" y2="212" stroke="#d29922" stroke-width="2" marker-end="url(#arrY)"/>
  <text x="232" y="182" text-anchor="end" fill="#d29922" font-size="9" font-weight="700">중기 스케줄러</text>
  <text x="230" y="195" text-anchor="end" fill="#6e7681" font-size="8">스래싱 방지</text>

  <!-- Suspended → Ready (swap in) -->
  <line x1="298" y1="212" x2="298" y2="142" stroke="#d29922" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrY)"/>
  <text x="315" y="182" fill="#6e7681" font-size="8">swap in</text>
</svg>
