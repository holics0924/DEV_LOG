<svg width="680" height="160" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style></defs>
  <rect width="680" height="160" fill="#0d1117" rx="12"/>

  <text x="340" y="24" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">Round Robin  —  quantum = 4ms</text>

  <!-- P1 block 1: 0-4ms -->
  <rect x="40" y="38" width="80" height="44" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="80" y="65" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">P1</text>

  <!-- P2: 4-7ms -->
  <rect x="120" y="38" width="60" height="44" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="150" y="65" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">P2✓</text>

  <!-- P3: 7-10ms -->
  <rect x="180" y="38" width="60" height="44" rx="6" fill="#3a2210" stroke="#f0883e" stroke-width="1.5"/>
  <text x="210" y="65" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="700">P3✓</text>

  <!-- P1 blocks: 10-14, 14-18, 18-22, 22-26, 26-30 -->
  <rect x="240" y="38" width="80" height="44" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="280" y="65" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">P1</text>
  <rect x="320" y="38" width="80" height="44" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="360" y="65" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">P1</text>
  <rect x="400" y="38" width="80" height="44" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="440" y="65" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">P1</text>
  <rect x="480" y="38" width="80" height="44" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="520" y="65" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">P1</text>
  <rect x="560" y="38" width="80" height="44" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="600" y="65" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">P1✓</text>

  <!-- Timeline -->
  <line x1="40" y1="92" x2="642" y2="92" stroke="#30363d" stroke-width="1"/>
  <line x1="40" y1="88" x2="40" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="40" y="110" text-anchor="middle" fill="#8b949e" font-size="10">0</text>
  <line x1="120" y1="88" x2="120" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="120" y="110" text-anchor="middle" fill="#8b949e" font-size="10">4</text>
  <line x1="180" y1="88" x2="180" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="180" y="110" text-anchor="middle" fill="#8b949e" font-size="10">7</text>
  <line x1="240" y1="88" x2="240" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="240" y="110" text-anchor="middle" fill="#8b949e" font-size="10">10</text>
  <line x1="320" y1="88" x2="320" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="320" y="110" text-anchor="middle" fill="#8b949e" font-size="10">14</text>
  <line x1="400" y1="88" x2="400" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="400" y="110" text-anchor="middle" fill="#8b949e" font-size="10">18</text>
  <line x1="480" y1="88" x2="480" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="480" y="110" text-anchor="middle" fill="#8b949e" font-size="10">22</text>
  <line x1="560" y1="88" x2="560" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="560" y="110" text-anchor="middle" fill="#8b949e" font-size="10">26</text>
  <line x1="640" y1="88" x2="640" y2="96" stroke="#6e7681" stroke-width="1.5"/>
  <text x="640" y="110" text-anchor="middle" fill="#8b949e" font-size="10">30ms</text>

  <text x="150" y="140" text-anchor="middle" fill="#3fb950" font-size="11">P2, P3: 4ms 안에 완료</text>
  <text x="480" y="140" text-anchor="middle" fill="#58a6ff" font-size="11">P1: 큐 돌아오며 완료</text>
</svg>
