<svg width="720" height="310" viewBox="0 0 720 310" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style></defs>
  <rect width="720" height="310" fill="#0d1117" rx="12"/>
  <text x="360" y="26" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="700">외부 단편화 발생 과정</text>

  <!-- Labels -->
  <text x="120" y="50" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700">초기 상태</text>
  <text x="380" y="50" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700">B, D 종료 후</text>
  <text x="610" y="50" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="700">F (11KB) 할당 요청</text>

  <!-- === Panel 1: Initial state === -->
  <!-- Memory bar total width=200, height=180, at x=20 -->
  <!-- A코드 10KB → 10/50 * 180 = 36px -->
  <rect x="20" y="60" width="200" height="36" rx="0" fill="#1c3a5e" stroke="#0d1117" stroke-width="1"/>
  <text x="120" y="82" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">A 코드 10KB</text>

  <!-- B코드 8KB → 8/50*180 = 29 -->
  <rect x="20" y="96" width="200" height="29" rx="0" fill="#1a3a27" stroke="#0d1117" stroke-width="1"/>
  <text x="120" y="115" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">B 코드 8KB</text>

  <!-- C힙 12KB → 43 -->
  <rect x="20" y="125" width="200" height="43" rx="0" fill="#2d1b69" stroke="#0d1117" stroke-width="1"/>
  <text x="120" y="150" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">C 힙 12KB</text>

  <!-- D스택 5KB → 18 -->
  <rect x="20" y="168" width="200" height="18" rx="0" fill="#3b1a1a" stroke="#0d1117" stroke-width="1"/>
  <text x="120" y="181" text-anchor="middle" fill="#f85149" font-size="10" font-weight="700">D 스택 5KB</text>

  <!-- E코드 15KB → 54 -->
  <rect x="20" y="186" width="200" height="54" rx="0" fill="#1c3a5e" stroke="#0d1117" stroke-width="1"/>
  <text x="120" y="216" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">E 코드 15KB</text>

  <rect x="20" y="60" width="200" height="180" fill="none" stroke="#484f58" stroke-width="1.5" rx="4"/>

  <!-- === Panel 2: After B, D exit === -->
  <!-- A코드 -->
  <rect x="260" y="60" width="200" height="36" rx="0" fill="#1c3a5e" stroke="#0d1117" stroke-width="1"/>
  <text x="360" y="82" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">A 코드 10KB</text>

  <!-- 빈칸 8KB -->
  <rect x="260" y="96" width="200" height="29" rx="0" fill="#1a1a1a" stroke="#0d1117" stroke-width="1"/>
  <text x="360" y="115" text-anchor="middle" fill="#484f58" font-size="10">빈칸 8KB</text>
  <!-- Hatch pattern for empty -->
  <line x1="262" y1="98" x2="278" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="278" y1="98" x2="294" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="294" y1="98" x2="310" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="310" y1="98" x2="326" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="326" y1="98" x2="342" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="342" y1="98" x2="358" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="358" y1="98" x2="374" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="374" y1="98" x2="390" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="390" y1="98" x2="406" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="406" y1="98" x2="422" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="422" y1="98" x2="438" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="438" y1="98" x2="454" y2="123" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- C힙 -->
  <rect x="260" y="125" width="200" height="43" rx="0" fill="#2d1b69" stroke="#0d1117" stroke-width="1"/>
  <text x="360" y="150" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">C 힙 12KB</text>

  <!-- 빈칸 5KB -->
  <rect x="260" y="168" width="200" height="18" rx="0" fill="#1a1a1a" stroke="#0d1117" stroke-width="1"/>
  <text x="360" y="181" text-anchor="middle" fill="#484f58" font-size="10">빈칸 5KB</text>
  <line x1="262" y1="170" x2="276" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="276" y1="170" x2="290" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="290" y1="170" x2="304" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="304" y1="170" x2="318" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="318" y1="170" x2="332" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="332" y1="170" x2="346" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="346" y1="170" x2="360" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="360" y1="170" x2="374" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="374" y1="170" x2="388" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="388" y1="170" x2="402" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="402" y1="170" x2="416" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="416" y1="170" x2="430" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="430" y1="170" x2="444" y2="184" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- E코드 -->
  <rect x="260" y="186" width="200" height="54" rx="0" fill="#1c3a5e" stroke="#0d1117" stroke-width="1"/>
  <text x="360" y="216" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">E 코드 15KB</text>

  <rect x="260" y="60" width="200" height="180" fill="none" stroke="#484f58" stroke-width="1.5" rx="4"/>

  <!-- Total free label -->
  <text x="360" y="258" text-anchor="middle" fill="#d29922" font-size="11">빈 공간 합산: 8 + 5 = 13KB</text>

  <!-- === Panel 3: F 11KB request === -->
  <!-- Same as panel 2 -->
  <rect x="500" y="60" width="200" height="36" rx="0" fill="#1c3a5e" stroke="#0d1117" stroke-width="1"/>
  <text x="600" y="82" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">A 코드 10KB</text>

  <!-- 빈칸 8KB with red tint -->
  <rect x="500" y="96" width="200" height="29" rx="0" fill="#2a1515" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="600" y="109" text-anchor="middle" fill="#f85149" font-size="10">빈칸 8KB ✗</text>
  <text x="600" y="122" text-anchor="middle" fill="#484f58" font-size="9">11KB 불가</text>

  <rect x="500" y="125" width="200" height="43" rx="0" fill="#2d1b69" stroke="#0d1117" stroke-width="1"/>
  <text x="600" y="150" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">C 힙 12KB</text>

  <!-- 빈칸 5KB with red tint -->
  <rect x="500" y="168" width="200" height="18" rx="0" fill="#2a1515" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="600" y="181" text-anchor="middle" fill="#f85149" font-size="10">빈칸 5KB ✗</text>

  <rect x="500" y="186" width="200" height="54" rx="0" fill="#1c3a5e" stroke="#0d1117" stroke-width="1"/>
  <text x="600" y="216" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">E 코드 15KB</text>

  <rect x="500" y="60" width="200" height="180" fill="none" stroke="#484f58" stroke-width="1.5" rx="4"/>

  <!-- F request label -->
  <text x="600" y="258" text-anchor="middle" fill="#f85149" font-size="11" font-weight="700">F 11KB → 할당 실패</text>
  <text x="600" y="274" text-anchor="middle" fill="#484f58" font-size="10">C 힙이 막고 있어 합칠 수 없음</text>

  <!-- Bottom explanation -->
  <text x="360" y="298" text-anchor="middle" fill="#484f58" font-size="11">빈 공간 합산은 13KB지만 연속된 11KB 구간이 없음 — 외부 단편화</text>
</svg>
