<svg width="720" height="310" viewBox="0 0 720 310" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#6e7681"/>
  </marker>
  <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
  </marker>
  <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
  </marker></defs>
  <rect width="720" height="310" fill="#0d1117" rx="12"/>

  <!-- Titles -->
  <text x="175" y="26" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="700">C</text>
  <text x="545" y="26" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="700">Python</text>

  <!-- Divider -->
  <line x1="360" y1="36" x2="360" y2="290" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- === C Side === -->
  <!-- Stack box -->
  <rect x="20" y="44" width="200" height="140" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1.5"/>
  <text x="120" y="62" text-anchor="middle" fill="#484f58" font-size="11" font-weight="700">스택</text>

  <!-- y = 10 row: variable name / description / value 분리 배치 -->
  <rect x="32" y="70" width="176" height="44" rx="4" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1"/>
  <!-- variable name -->
  <text x="48" y="88" fill="#58a6ff" font-size="13" font-family="monospace" font-weight="700">y</text>
  <!-- description (아래줄) -->
  <text x="48" y="106" fill="#484f58" font-size="9">값을 직접 저장</text>
  <!-- value (오른쪽 정렬) -->
  <text x="196" y="96" text-anchor="end" fill="#e6edf3" font-size="13" font-family="monospace" font-weight="700">10</text>

  <!-- arr row -->
  <rect x="32" y="120" width="176" height="44" rx="4" fill="#1a3a27" stroke="#3fb950" stroke-width="1"/>
  <!-- variable name -->
  <text x="48" y="138" fill="#3fb950" font-size="13" font-family="monospace" font-weight="700">arr</text>
  <!-- description (아래줄) -->
  <text x="48" y="156" fill="#484f58" font-size="9">포인터 (힙 주소)</text>
  <!-- address value (오른쪽 정렬) -->
  <text x="196" y="146" text-anchor="end" fill="#3fb950" font-size="11" font-family="monospace">0x5A00</text>

  <!-- Heap box C -->
  <rect x="248" y="112" width="100" height="36" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="298" y="134" text-anchor="middle" fill="#3fb950" font-size="11" font-family="monospace">[40바이트]</text>
  <text x="298" y="108" text-anchor="middle" fill="#484f58" font-size="9">힙</text>

  <!-- Arrow from arr to heap -->
  <line x1="210" y1="142" x2="244" y2="132" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- C code labels -->
  <text x="175" y="206" text-anchor="middle" fill="#484f58" font-size="10" font-family="monospace">int y = 10;</text>
  <text x="175" y="222" text-anchor="middle" fill="#484f58" font-size="10" font-family="monospace">int* arr = malloc(40);</text>
  <rect x="20" y="232" width="316" height="1" fill="#2a2a2a"/>
  <text x="178" y="252" text-anchor="middle" fill="#d29922" font-size="11">y: 값 자체가 스택에 저장</text>
  <text x="178" y="268" text-anchor="middle" fill="#484f58" font-size="10">arr: 힙 주소만 스택에, 데이터는 힙에</text>

  <!-- === Python Side === -->
  <!-- Stack box Python -->
  <rect x="380" y="44" width="200" height="140" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1.5"/>
  <text x="480" y="62" text-anchor="middle" fill="#484f58" font-size="11" font-weight="700">스택 (참조만)</text>

  <!-- y row -->
  <rect x="392" y="70" width="176" height="44" rx="4" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1"/>
  <text x="408" y="88" fill="#58a6ff" font-size="13" font-family="monospace" font-weight="700">y</text>
  <text x="408" y="106" fill="#484f58" font-size="9">힙 객체 주소</text>
  <text x="556" y="96" text-anchor="end" fill="#58a6ff" font-size="11" font-family="monospace">0x5A30</text>

  <!-- x row -->
  <rect x="392" y="120" width="176" height="44" rx="4" fill="#1a3a27" stroke="#3fb950" stroke-width="1"/>
  <text x="408" y="138" fill="#3fb950" font-size="13" font-family="monospace" font-weight="700">x</text>
  <text x="408" y="156" fill="#484f58" font-size="9">힙 객체 주소</text>
  <text x="556" y="146" text-anchor="end" fill="#3fb950" font-size="11" font-family="monospace">0x6B20</text>

  <!-- Heap boxes Python -->
  <text x="648" y="62" text-anchor="middle" fill="#484f58" font-size="9">힙</text>
  <rect x="598" y="68" width="102" height="34" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="649" y="89" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="monospace">int(10)</text>

  <rect x="598" y="112" width="102" height="34" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="649" y="133" text-anchor="middle" fill="#3fb950" font-size="11" font-family="monospace">[1, 2, 3]</text>

  <!-- Arrows from stack to heap -->
  <line x1="570" y1="92" x2="594" y2="85" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="570" y1="142" x2="594" y2="129" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Python code labels -->
  <text x="480" y="206" text-anchor="middle" fill="#484f58" font-size="10" font-family="monospace">y = 10</text>
  <text x="480" y="222" text-anchor="middle" fill="#484f58" font-size="10" font-family="monospace">x = [1, 2, 3]</text>
  <rect x="380" y="232" width="320" height="1" fill="#2a2a2a"/>
  <text x="540" y="252" text-anchor="middle" fill="#d29922" font-size="11">모든 객체가 힙에 존재</text>
  <text x="540" y="268" text-anchor="middle" fill="#484f58" font-size="10">변수는 힙 객체를 가리키는 참조만 들고 있음</text>

  <!-- Bottom note -->
  <text x="360" y="294" text-anchor="middle" fill="#484f58" font-size="10">Python에서 y = "hello"로 바꾸면 스택의 참조만 교체 — int(10)은 참조 카운트 0 → GC 해제</text>
</svg>
