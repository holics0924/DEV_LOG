<svg width="720" height="290" viewBox="0 0 720 290" xmlns="http://www.w3.org/2000/svg">
  <defs><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;display=swap');
  text { font-family: 'Nunito','Trebuchet MS',Arial,sans-serif; }</style>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#6e7681"/>
  </marker>
  <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
  </marker>
  <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
  </marker></defs>
  <rect width="720" height="290" fill="#0d1117" rx="12"/>

  <!-- Titles -->
  <text x="180" y="26" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="700">C</text>
  <text x="540" y="26" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="700">Python</text>

  <!-- Divider -->
  <line x1="360" y1="36" x2="360" y2="270" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- === C Side === -->
  <!-- Stack box -->
  <rect x="20" y="44" width="180" height="120" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1.5"/>
  <text x="110" y="64" text-anchor="middle" fill="#484f58" font-size="11" font-weight="700">스택</text>

  <!-- y = 10 directly -->
  <rect x="34" y="72" width="152" height="28" rx="4" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1"/>
  <text x="68" y="91" fill="#58a6ff" font-size="12" font-family="monospace" font-weight="700">y</text>
  <text x="100" y="87" fill="#484f58" font-size="9">값을 직접 저장</text>
  <text x="150" y="91" text-anchor="middle" fill="#e6edf3" font-size="12" font-family="monospace" font-weight="700">10</text>

  <!-- arr pointer to heap -->
  <rect x="34" y="106" width="152" height="28" rx="4" fill="#1a3a27" stroke="#3fb950" stroke-width="1"/>
  <text x="60" y="125" fill="#3fb950" font-size="12" font-family="monospace" font-weight="700">arr</text>
  <text x="100" y="121" fill="#484f58" font-size="9">포인터(힙 주소)</text>
  <text x="162" y="125" text-anchor="middle" fill="#3fb950" font-size="11" font-family="monospace">0x5A00</text>

  <!-- Heap box C -->
  <rect x="234" y="98" width="110" height="34" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="289" y="120" text-anchor="middle" fill="#3fb950" font-size="11" font-family="monospace">[40바이트]</text>

  <!-- Arrow from arr to heap -->
  <line x1="188" y1="120" x2="230" y2="115" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- C label -->
  <text x="110" y="186" text-anchor="middle" fill="#484f58" font-size="10">int y = 10;</text>
  <text x="110" y="202" text-anchor="middle" fill="#484f58" font-size="10">int* arr = malloc(40);</text>
  <rect x="20" y="214" width="316" height="1" fill="#2a2a2a"/>
  <text x="168" y="234" text-anchor="middle" fill="#d29922" font-size="11">y: 값 자체가 스택에</text>
  <text x="168" y="252" text-anchor="middle" fill="#484f58" font-size="10">arr: 스택에 포인터, 데이터는 힙에</text>

  <!-- === Python Side === -->
  <!-- Stack box Python -->
  <rect x="380" y="44" width="180" height="130" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1.5"/>
  <text x="470" y="64" text-anchor="middle" fill="#484f58" font-size="11" font-weight="700">스택 (참조만)</text>

  <!-- y → heap int -->
  <rect x="394" y="72" width="152" height="28" rx="4" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1"/>
  <text x="420" y="91" fill="#58a6ff" font-size="12" font-family="monospace" font-weight="700">y</text>
  <text x="455" y="87" fill="#484f58" font-size="9">힙 주소</text>
  <text x="524" y="91" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="monospace">0x5A30</text>

  <!-- x → heap list -->
  <rect x="394" y="106" width="152" height="28" rx="4" fill="#1a3a27" stroke="#3fb950" stroke-width="1"/>
  <text x="420" y="125" fill="#3fb950" font-size="12" font-family="monospace" font-weight="700">x</text>
  <text x="455" y="121" fill="#484f58" font-size="9">힙 주소</text>
  <text x="524" y="125" text-anchor="middle" fill="#3fb950" font-size="11" font-family="monospace">0x6B20</text>

  <!-- Heap box Python - int(10) -->
  <rect x="582" y="64" width="118" height="30" rx="6" fill="#1c3a5e" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="641" y="83" text-anchor="middle" fill="#58a6ff" font-size="11" font-family="monospace">int(10)</text>

  <!-- Heap box Python - list -->
  <rect x="582" y="104" width="118" height="30" rx="6" fill="#1a3a27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="641" y="123" text-anchor="middle" fill="#3fb950" font-size="11" font-family="monospace">[1, 2, 3]</text>

  <!-- Arrows from stack to heap -->
  <line x1="548" y1="86" x2="578" y2="79" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="548" y1="120" x2="578" y2="119" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Heap label -->
  <text x="641" y="148" text-anchor="middle" fill="#484f58" font-size="9">힙</text>

  <!-- Python labels -->
  <text x="470" y="198" text-anchor="middle" fill="#484f58" font-size="10">y = 10</text>
  <text x="470" y="214" text-anchor="middle" fill="#484f58" font-size="10">x = [1, 2, 3]</text>
  <rect x="380" y="224" width="320" height="1" fill="#2a2a2a"/>
  <text x="540" y="244" text-anchor="middle" fill="#d29922" font-size="11">모든 객체가 힙에 존재</text>
  <text x="540" y="262" text-anchor="middle" fill="#484f58" font-size="10">변수는 힙 객체를 가리키는 참조만 들고 있음</text>

  <!-- Bottom note -->
  <text x="360" y="284" text-anchor="middle" fill="#484f58" font-size="10">Python에서 y = "hello"로 바꾸면 스택의 참조만 교체 — 힙의 int(10)은 참조 카운트 0 → GC 해제</text>
</svg>
